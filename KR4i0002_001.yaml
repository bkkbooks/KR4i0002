body:
  text: 文心雕龍輯注巻一詹事府詹事加吏部侍郎銜黄叔琳撰原道第一文之為徳也大矣與天地並生者何哉夫𤣥黄色雜方圓體分日月疊璧以垂麗天之象山川煥綺以鋪理地之形此葢道之文也仰觀吐曜俯察含章髙卑定位故兩儀既生矣惟人叅之性靈所鍾是謂三才為五行之秀實天地之心一本實上有人字心下有生字心生而言立言立而文明自然之道也傍及萬品動植皆文龍鳯以藻繪呈瑞虎豹以炳蔚凝姿雲霞雕色有踰畫工之妙草朩賁華無待錦匠之竒夫豈外飾盖自然耳至於林籟結響調如竽瑟泉石激韻和若球鍠故形立則章成矣聲發則文生矣夫以無識之物欝然有彩有心之器其無文歟人文之元肇自太極幽贊神明易象惟先庖犧畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉若迺河圖孕乎八卦洛書韞乎九疇玉版金鏤之實丹文緑牒之華誰其尸之亦神理而巳自鳥迹代繩文字始炳炎皡遺事紀在三墳而年世渺邈聲采靡追唐虞文章則焕乎始馮本作為盛元首載歌既發吟詠之志益稷陳謨元作謀楊改亦垂敷奏之風夏后氏興業峻鴻績九序惟歌勲徳彌縟逮及商周文勝其質雅頌所被英華日新文王患憂繇辭炳曜符采複隱精義堅深重以公旦多材振元作褥朱改其徽烈剬詩緝頌斧藻羣言至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令朩鐸起而千里應席珍流而萬世響冩天地之輝光曉生民之耳目矣爰自風姓暨於孔氏𤣥一作元聖創典素王述訓莫不原道心以敷章以敷一作裁文從御覽改研神理而設教取象乎河洛問數乎蓍龜觀天文以極變察人文以成化然後能經緯區宇彌綸彞憲發輝疑作揮事業彪炳辭義故知道沿聖以垂文聖因文而明道旁通而無滯一作涯從御覽改日用而不匱易曰鼓天下之動者者字從御覽增存乎辭辭之所以能鼔天下者迺道之文也贊曰道心惟㣲神理設教光采元聖炳燿仁孝龍圖獻體龜書呈貎天文斯觀民胥以俲𤣥黄易夫𤣥黄者天地之雜也天𤣥而地黄方圓大戴禮記天道曰圓地道曰方日月疊璧易坤靈圖至徳之萌日月若聨璧炳蔚易大人虎變其文炳也又曰君子豹變其文蔚也庖犧畫其始易繫辭包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情仲尼翼其終易通卦騐孔子作上彖下彖上象下象上繫下繫文言説卦序卦雜卦為十翼河圖易正義伏羲氏有天下龍馬負圖以出於河遂法之畫八卦洛書周書洪範天乃錫禹洪範九疇注易言河出圖洛出書聖人則之葢治水功成洛龜呈瑞玉版王子年拾遺記帝堯在位聖徳光洽河洛之濱得玉版方尺圖天地之形丹文緑牒宋書志序握河括地緑文赤字之書言之詳矣鳥迹許氏説文序黄帝之史蒼頡見鳥獸蹄迒之迹知分理之可相别異也初作書契代繩見徴聖篇象夬註三墳書久亡元呉萊三墳辨三墳書近出偽書也世或傳大扺言伏羲本山墳而作連山神農本氣墳而作歸藏黄帝本形墳而作乾坤無卦爻有卦象文鄙而義陋與周官太卜所掌異焉元首載歌見章句篇陳謨書有益稷篇九序惟歌書大禹謨篇文彌縟王充論衡徳彌盛者文彌縟文王憂患易傳夏商之末易道中㣲文王拘於羑里係以彖辭易道復興繇辭繇音宙杜預左傳注繇卜兆辭也續文章緣起繇夏后作鑄鼎繇繇卜辭也制詩緝頌剬韻㑹多官切整飭貎書周公居東二年乃為詩以貽王名之曰䲭鴞王亦未敢誚公國語周公之為頌曰思文后稷克配彼天斧藻揚子法言吾未見好斧藻其徳若斧藻其楶者鎔鈞董仲舒傳猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄顔師古曰鈞造瓦之法其中旋轉者鎔謂鑄器之模範也千里應易繫辭君子居其室出其言善則千里之外應之席珍禮記儒有席上之珍以待聘風姓史記伏羲氏以風為姓元聖班固典引縣象闇而恒文乖彞倫斁而舊章闕故先命元聖使綴學立制注元聖孔子也素王拾遺記夫子未生時有麟吐玉書於闕里文云水精之子繼衰周而為素王徴聖第二夫作者曰聖述者曰明陶鑄性情功在上哲夫子文章可得而聞則聖人之情見乎文辭矣先王聖化布在方冊夫子風采溢於格言是以逺稱唐世則煥乎為盛近褒周代則郁哉可從此政化貴文之徴也鄭伯入陳以文一作立辭為功宋置折俎以多文元作方孫改舉禮此事蹟貴文之徴也褒美子産則云言以足志文以足言泛論君子則云情欲信辭欲巧此修身貴文之徴也然則志元作忠謝改足而言文情信而辭巧迺含章之玉牒秉文之金科矣夫鑒周日月妙極機疑作㡬神文成規矩思合符契或簡言以達㫖或博文以該情或明理以立體或隱義以藏用故春秋一字以褒貶䘮服舉輕以包重此簡言以達㫖也邠詩聨章以積句儒行縟説以繁辭此博文以該情也書契斷決以象夬文章昭晰以象離此明理以立體也四象精義以曲隱五例㣲辭以婉晦此隱義以藏用也故知繁畧殊形隱顯異術抑引隨時變通㑹適徴之周孔則文有師矣是以子元脱揚補政論文必徴於聖稚圭勸學四字元脱揚補必宗於經易稱辨物正言斷辭則備書云辭尚體要弗惟好異故知正言所以立辨體要所以成辭辭成無好異之尤辨立有斷辭之義雖精義曲隱無傷其正言㣲辭婉晦不害其體要體要與㣲辭偕通正言共精義並用聖人之文章亦可見也顔闔以為仲尼飾羽而畫徒莊子作從事華辭雖欲訾聖訾字一作此言二字誤弗可得已然則聖文之雅麗固銜華而佩實者也天道難聞猶或鑽仰文章可見胡寧勿思若徴聖立言則文其庶矣贊曰妙極生知睿哲惟宰精理為文秀氣成采鑒懸日月辭富山海百齡影徂千載心在文辭為功左傳鄭子産獻㨗於晉晉人問陳之罪子産對之仲尼曰志有之言以足志文以足言晉為伯鄭入陳非文辭不為功慎辭哉多文舉禮左傳宋人享趙文子司馬置折俎禮也仲尼使舉是禮也以為多文辭注舉謂記録之也情欲信辭欲巧禮記表記篇文玉牒左思呉都賦玉牒石記注玉牒石記皆典䇿類也金科揚雄劇秦美新金科玉條注謂法令也言金玉佞辭也㡬神易惟㡬也故能成天下之務惟神也故不疾而速不行而至褒貶杜預春秋序春秋以一字為褒貶䘮服舉輕包重如舉緦不祭則重於緦之服其不祭不言可知舉小功不税則重於小功者其税可知皆語約而義該也邠詩詩傳周成王立年㓜不能莅阼周公以冢宰攝政乃述后稷公劉之化作詩以戒謂之豳風儒行禮記儒行篇哀公問曰敢問儒行孔子曰遽數之不能終其物悉數之乃留更僕未可終也象夬易繫辭上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬象離易離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下項安世曰日月麗乎天而成明百榖草木麗乎土而成文故離為文又為明四象易繫辭易有四象所以示也朱子本義四象謂隂陽老少五例春秋序為例之情有五一曰㣲而顯二曰志而晦三曰婉而成章四曰盡而不汚五曰懲惡而勸善子政漢書劉向字子政稚圭漢書匡衡字稚圭成帝即位上疏勸經學顔闔莊子哀公問於顔闔曰吾以仲尼為楨幹國其有瘳乎曰仲尼方且飾羽而畫從事華辭夫何足以上民宗經第三三極彞訓其書言經經也者恒久之至道不刋之鴻教也故象天地效鬼神叅物序制人紀洞性靈之奥區極文章之骨髓者也皇世三墳帝代五典重以八索申以九丘嵗歴綿曖條流紛糅自夫子刪述而大寳咸一作啓耀於是易張十翼書標七觀詩列四始禮正五經春秋五例義既極乎性情辭亦匠於文理故能開學養正昭明有融然而道心惟㣲聖謨元作謀改謨卓絶墻宇重峻而吐納自深譬萬鈞之洪鍾無錚錚之細響矣夫易惟談天夫字從御覽增入一作人從御覽改神致用故繫稱㫖逺辭文元作髙孫改言中事隱韋編三絶固哲人之驪淵也書實記言而訓詁茫昧通乎爾雅則文意曉然故子夏歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓同書摛風裁興藻辭譎喻温柔在誦故最附深衷矣禮以一作貴立體一本下有𢎞用二字據事剬範章條纎曲執而後顯採掇生疑作片言莫非寳也春秋辨理四句一十六字元脱朱按御覽補一字見義五石六鷁以詳畧成文雉門兩觀以先後顯㫖其婉章志晦諒以邃矣尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隱此聖人之殊致表裏之異體者也至根柢槃深枝葉峻茂辭約而㫖豐事近而喻逺是以往者雖舊餘味日新後進追取而非晚元作曉前修文一作運用而未先可謂太山徧雨河潤千里者也故論説辭序則易統其首一作㫖詔䇿章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳銘朱云當作移檄則春秋為根並窮髙以樹表極逺以啓疆所以百家騰躍終入環内者也若禀經以製式酌雅以富言是仰山而鑄銅煮海而為鹽也故文能宗經體有六義一則情深而不詭二則風清而不雜三則事信而不誕四則義直而不回五則體約而不蕪六則文麗而不淫揚子比雕玉以作器謂五經之含文也夫文以行立行以文傳四教所先符采相濟勵徳樹聲莫不師聖而建言修辭鮮克宗經是以楚豔漢侈流弊不還正末歸本不其懿歟贊曰三極彞道訓深稽古致化歸一分教斯五性靈鎔匠文章奥府淵哉鑠乎羣言之祖三極易六爻之動三極之道也孔頴達疏是天地人三才至極之道三墳五典八索九丘孔安國尚書序伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也八卦之説謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也紛糅楚辭九辯惟其紛糅而將落兮注紛糅衆雜也十翼見原道篇七觀尚書大傳六誓可以觀義五誥可以觀仁甫刑可以觀誠洪範可以觀度禹貢可以觀事臯陶可以觀治堯典可以觀美四始詩序注闗睢者風之始鹿鳴者小雅之始文王者大雅之始清廟者頌之始詩緯汎歴樞大明在亥水始也四牡在寅朩始也嘉魚在巳火始也鴻鴈在申金始也五經禮記祭義禮有五經莫重於祭五經謂吉㐫軍賓嘉五例見徴聖篇養正易䝉以養正聖功也萬鈞西京賦洪鐘萬鈞注三十斤曰鈞錚錚劉盆子傳鐵中錚錚説文曰錚錚金聲也鐵之錚錚言㣲有剛利也入神致用易精義入神以致用也㫖逺辭文言中事隱易繫辭其㫖逺其辭文其言曲而中其事肆而隱韋編漢書孔子晩而好易讀之韋編三絶故為之傳驪淵莊子夫千金之珠必在九重之淵而驪龍頷下爾雅爾雅序爾雅者所以通訓詁之指歸敘詩人之興詠總絶代之離辭辨同實而異號者也釋詁一篇周公所作釋言以下或言仲尼所増子夏所足叔孫通所益梁文所補子夏歎書尚書大傳子夏讀書畢見於夫子夫子問焉子何為於書子夏對曰書之論事也昭昭如日月之代明離離若參辰之錯行上有堯舜之道下有三王之義商所受於夫子志之於心弗敢忘也譎喻詩序主文而譎諫言之者無罪聞之者足以戒五石六鷁春秋僖公十六年正月隕石於宋五六鷁退飛過宋都公羊傳曷為先言隕而後言石隕石記聞聞其磌然視之則石察之則五曷為先言六而後言鷁退飛記見也視之則六察之則鷁徐而察之則退飛雉門兩觀春秋定公二年五月雉門及兩觀灾冬十月新作雉門及兩觀公羊傳雉門及兩觀灾何兩觀㣲也然則曷為不言雉門灾及兩觀主灾者兩觀也時灾者兩觀則曷為後言之不以㣲及大也婉章志晦見五例注大山徧雨河潤千里公羊傳觸石而出膚寸而合不崇朝而徧雨乎天下者唯太山爾河海潤於千里春秋考異郵河者水之氣四瀆之精所以流化故曰河潤千里揚子漢書揚雄字子雲著法言雕玉法言玉不雕璠璵不作器言不文典謨不作經是篇梅本書實記言以下有而訓詁茫昧通乎爾雅則文意曉然云云無然覽文以下十字章條纎曲下有執而後顯採掇生辭莫非寳也春秋辨理云云注四句十六字元脱朱從御覽補無觀辭立曉以下十二字諒以邃矣下有尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隱云云按爾雅本以釋詩無闗書之訓詁且五經分論不應獨舉書與春秋贅以覽文云云鬱儀所補四句辭亦不類宜從王惟儉本正緯第四夫神道闡幽天命㣲顯馬龍出而大易興神龜見而洪範燿故繫辭稱河出圖洛出書聖人則之斯之謂也但世夐文隱好生矯誕真雖存矣偽亦憑焉夫六經彪炳而緯候稠疊孝論昭晳元作哲許改而鉤䜟葳蕤按經驗緯其偽有四葢緯之成經其猶織綜絲麻不雜布帛乃成今經正緯竒倍擿千里其偽一矣經顯聖訓也緯隱神教也聖訓宜廣神教宜約而今緯多於經神理更繁其偽二矣有命自天迺稱符讖而八十一篇皆託於孔子則是堯造緑圖昌制丹書其偽三矣商周以前圖籙頻見春秋之末羣經方備先緯後經體乖織綜其偽四矣偽既倍疑作掊摘則義異自明經足訓矣緯何豫焉原夫圖籙之見迺昊天休命事以瑞聖義非配經故河不出圖夫子有歎如或可造無勞喟然昔康王河圖陳於東序故知前世符命歴代寳傳仲尼所撰序録而巳於是伎數之士附以詭術或説隂陽或序災異若鳥鳴似語蟲葉成字篇條滋蔓必假孔氏通儒討覈謂起哀平東序秘寳朱紫亂矣至於光武之世篤信斯術風化所靡學者比肩沛獻集緯以通經曹褒撰䜟以定禮乖道謬典亦已甚矣是以桓譚疾其虛偽尹敏戲疑作嚱其深瑕張衡發其僻謬荀悦明其詭誕四賢博練論之精矣若乃羲農軒皡之源山瀆鍾律之要白魚赤烏之符黄金紫玉之瑞元作理孫改事豐竒偉辭富膏腴無益經典而有助文章是以後來辭人採摭英華平子恐其迷學奏令禁絶仲豫惜其雜真未許煨燔前代配經故詳論焉贊曰榮河温洛是孕圖緯神寳藏用理隱文貴世歴二漢朱紫騰沸芟夷譎詭糅其雕蔚緯候後漢方術傳緯候之部緯七緯也候尚書中候也葳蕤司馬相如封禪文紛綸葳蕤注言衆多也八十一篇隋經籍志河圖九篇洛書六篇云自黄帝至周文王所受本文又三十篇云九聖之所増演又七經緯三十六篇並云孔氏所作合為八十一篇緑圖河圖挺佐輔黄帝至於翠媯之川鱸魚折溜而至蘭葉朱文以授黄帝名曰緑圖丹書尚書帝命驗季秋之月甲子赤爵衘丹書止於酆集於昌户其書曰敬勝怠者吉怠勝敬者滅大戴禮武王召尚父問曰黄帝顓頊之道存乎尚父曰在丹書王欲聞之則齋矣圖籙後漢方術傳光武尤信䜟言士之赴趣時宜者皆馳騁穿鑿争談之也故王梁孫咸名應圖籙越登槐鼎之任鄭興賈逵以附同稱顯桓譚尹敏以乖忤淪敗又謝夷吾傳綜校圖録東序書顧命河圖在東序符命揚雄傳爰清静作符命翰林志董景真曰吾聞帝王之興必有符命歴代寳傳書顧命傳河圖八卦伏羲王天下龍馬出河遂則其文以畫八卦謂之河圖歴代傳寳之序災異隋經籍志漢末郎中郗萌集圖緯䜟雜占為五十巻謂之春秋災異宋均鄭𤣥並為䜟律之註然其文辭淺俗顛倒舛謬不類聖人之㫖鳥鳴似語左傳鳥鳴於亳社如曰嘻嘻甲午宋大災宋伯姬卒蟲葉成字漢書昭帝時上林柳樹斷一朝起立生枝葉有蟲食葉成文字曰公孫病巳立宣帝本名病巳葢帝將膺大位之徴假孔氏隋經籍志説者曰孔子既敘六經以明天人之道知後世不能稽同其意故别立緯及䜟以遺來世其書出於前漢起哀平書洪範疏緯候之書不知誰作通人討覈謂起哀平秘寳班固典引御東序之秘寳以流其占光武東觀漢記光武避正殿讀䜟坐廡下淺露中風苦欬也風化所靡隋經籍志光武以圖䜟興遂盛行於世詔東平王蒼正五經章句皆命從䜟俗儒趨時益為其學篇巻第目轉相增廣言五經者皆憑䜟為説沛獻後漢書沛獻王輔好經書善説京氏易孝經論語傳及圖䜟作五經論時號之曰沛王通論曹褒後漢書曹褒受命次序禮事依準舊典雜以五經䜟記之文撰次天子至於庶人冠婚吉㐫終始制度以為百五十篇桓譚後漢書帝方信䜟多以决定嫌疑桓譚上疏曰觀先王之記述咸以仁義正道為本非有竒恠虛誕之事尹敏後漢書帝令尹敏校圖䜟敏對曰䜟書非聖人所作其中多近鄙别字頗類世俗之辭恐疑誤後生張衡後漢書自中興以後儒者争學圖緯張衡上疏曰立言於前有徴於後謂之䜟書自漢取秦莫或稱䜟若夏侯勝眭孟之徒以道術立名其所述著無䜟一言劉向父子領校秘書閲定九流亦無䜟録成哀之後乃始聞之殆必虛偽之徒以要世取資宜收藏圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣荀悦後漢書荀悦作申鑒俗嫌篇曰世稱緯書仲尼所作臣叔父􅐩辨之葢發其偽也有起於中興之前終張之徒之作乎山瀆顔延之曲水詩序晷緯昭應山瀆效靈鍾律漢藝文志有鍾律災應鍾律叢辰日苑鍾律消息白魚赤烏史記武王渡河中流白魚躍入王舟中王俯取以祭既渡有火自上復於下至於王屋流為烏其色赤其聲魄云黄金禮斗威儀君乗金而王其政平則黄金見深山紫玉雒書王者不藏金玉則紫玉見於深山未許煨燔荀悦辨緯書為偽或曰燔之曰仲尼之作則否有取焉則可曷其燔榮河尚書中候帝堯即政榮光出河休氣四塞温洛易乾鑿度帝盛徳之應洛水先温九日乃寒辨騷第五自風雅寢聲莫或抽緒竒文鬱起其離騷哉固巳軒翥詩人之後奮飛辭家之前豈去聖之未逺而楚人之多才乎昔漢武愛騷而淮南作傳以為國風好色而不淫小雅怨誹元作謗許改而不亂若離騷者可謂兼之蟬蜕穢濁之中浮游塵埃之外皭然湼而不緇雖與日月争光可也班固以為露才揚已忿懟沉江羿澆二姚與左氏不合崑崙懸一作𤣥圃非經義所載然其文辭麗雅為詞賦之宗雖非明哲可謂妙才王逸以為詩人提耳屈原婉順離騷之文依經立義駟虬乗翳則時乗六龍崑崙流沙則禹貢敷土名儒辭賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣􅀈歎以為皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳褒貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徴言焉故其陳堯舜之耿介稱湯武之祇敬典誥之體也譏桀紂之猖披傷羿澆之顛隕規諷之㫖也虬龍以喻君子雲蜺以譬讒邪比興之義也每一顧而掩涕歎君門之九重忠怨之辭也觀兹四事同於風雅者也至於託雲龍説迂恠豐隆求宓妃鴆鳥媒娀女詭異之辭也康回傾地夷羿彃元作蔽孫改日朩夫元作夫謝改九首土伯三目元作足朱改譎恠之談也依彭咸之遺則從子胥以自適狷狹之志也士女雜坐亂而不分指以為樂娯酒不廢沉湎日夜舉以為懽荒淫之意也摘此四事異乎經典者也故論其典誥則如彼語其夸誕則如此固知楚辭者體慢元作憲朱據宋本楚辭改於三代而風雅於戰國乃雅頌之博徒而詞賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情逺逰天問瓌詭而惠巧招魂招隱馮云招隱楚辭本作大招下云屈宋莫追疑大招為是耀豔而深華卜居標放言之致漁父寄獨往之才故能氣往轢古辭來切今驚采絶艷難與並能矣自九懐以下遽躡其跡而屈宋逸步莫之能追故其敘情怨則鬱伊而易感述離居則愴怏而難懐論山水則循聲而得貎言節候則披文而見時是以枚賈追風以入麗馬揚㳂波而得竒其衣被詞人非一代也故才髙者菀其鴻裁中巧者獵其艷辭吟諷者銜其山川童䝉者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌竒而不失其真翫華而不墜其實則顧盻可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣贊曰不有屈原豈見離騷驚才風逸壯志煙髙山川無極情理實勞金相玉式艷溢錙毫元作絶益稱豪朱攷宋本楚辭改離騷屈原列傳原名平楚之同姓也為楚懐王左徒王甚任之上官大夫讒之王怒而疏屈平故憂愁幽思而作離騷離騷者猶離憂也軒翥班固典引甘露宵零於豐草三足軒翥於茂樹注軒翥飛貎楚人多才左傳惟楚有才晉實用之淮南漢書淮南王安好書武帝使為離騷傳旦受詔日食時上蟬蜕淮南子蟬飲而不食三十日而蜕羿澆離騷羿淫逰以佚田兮又好射夫封狐澆身被服强圉兮縱欲而不忍注羿有窮之君夏時諸候也因夏衰亂代之為政娯樂田獵信任寒浞使為國相浞殺羿而取羿妻生澆强梁多力縱放其慾不能自忍也二姚離騷及少康之未家兮留有虞之二姚注有虞國名姚姓舜後也昔寒浞使澆殺夏后相少康逃犇有虞虞因妻以二女崑崙𤣥圃天問崑崙縣圃其凥安在注崑崙山名其巔曰縣圃王逸後漢書王逸字叔師為侍中著楚辭章句行於世駟虬乗翳離騷駟玉虬以乘鷖兮溘埃風余上征時乗六龍易乾彖辭崑崙流沙禹貢崑崙析支渠搜又曰餘波入於流沙離騷忽吾行此流沙兮陳堯舜離騷彼堯舜之耿介兮既遵道而得路稱湯武離騷湯禹儼而祇敬兮周論道而莫差譏桀紂離騷何桀紂之昌披兮夫惟㨗徑以窘步虬龍渉江駕青虬兮驂白螭注虬螭神獸宜於駕乘以喻賢人清白可信任也雲蜺離騷飄風屯其相離兮帥雲蜺而來御注飄風無常之風以興邪惡雲蜺惡氣以喻佞人掩涕離騷長太息以掩涕兮君門九辯豈不鬱陶而思君兮君之門以九重注閫闥扃閉道路塞也雲龍離騷駕八龍之婉婉兮載雲旗之委蛇注言巳徳如龍可制御八方已徳如雲雨能潤施萬物也豐隆求宓妃離騷吾令豐隆乘雲兮求宓妃之所在注豐隆雲師一曰雷師宓妃神女也以喻隱士鴆鳥媒娀女離騷望瑤臺之偃蹇兮見有娀之佚女吾令鴆為媒兮鴆告余以不好注有娀國名謂帝嚳之妃契毋簡狄也配聖帝生賢子以喻貞賢也鴆運日也羽有毒可殺人以喻讒賊言我使鴆鳥為媒以求簡狄其性讒賊還詐告我言不好也康回傾地天問康回憑怒地何故以東南傾注康回共工名怒觸不周山地柱折故傾夷羿彃日天問羿焉彃日烏焉解羽注淮南言堯時十日並出草朩焦枯堯命羿仰射十日中其九日日中九烏皆死墜其羽翼説文彃射也朩夫九首招魂一夫九首㧞木九千些注有丈夫一身九頭强梁多力從朝至暮㧞大朩九千株也土伯三目招魂土伯九約其角觺觺些參目虎首其身若牛些注土伯后土之侯伯也其貎如虎而有三目身又肥大狀如牛也彭咸離騷願依彭咸之遺則注彭咸殷賢大夫諫其君不聼投水而死則法也子胥橘頌浮江淮而入海兮從子胥而自適士女雜坐亂而不分招魂句注言恣意調戲亂而不分别也娯酒不廢沉湎日夜招魂句注言晝夜以酒相樂也博徒信陵君傳公子聞趙有處士毛公藏於博徒九章王逸曰屈原放於江南之野復作九章章者著明也言巳所陳忠信之道甚著明也九歌王逸曰昔楚南郢之邑其俗信鬼而好祀其祠必作歌樂鼔舞屈原因為作九歌之曲託以諷諌九辯王逸曰宋玉屈原弟子閔惜其師忠而放逐故作九辯以述其志逺逰王逸曰逺逰者屈原之所作也屈原履方直之行不容於世遂敘妙思託配仙人與俱逰戲天問王逸曰天問者屈原之所作也屈原放逐憂心愁悴彷徨山澤經歴陵陸見楚有先王之廟及公卿祠堂圖畫天地山川神靈及古賢聖恠物行事因書其壁呵而問之以渫憤懣舒寫愁思招魂王逸曰宋玉憐哀屈原厥命將落作招魂欲以復其精神延其年夀大招王逸曰大招者屈原之所作也或曰景差疑不能明也屈原放流恐命將終所行不遂故憤然大招其魂又曰招隱士者淮南小山之所作也小山之徒閔傷屈原雖身沉没名徳顯聞與隱處山澤無異故作招隱士之賦㠯章其志也卜居王逸曰卜居者屈原之所作也原放弃乃往太卜之家卜巳㞐世何所宜行漁父王逸曰漁父者屈原所作也漁父避世時遇屈原恠而問之遂相應答九懐王逸曰九懐者王襃之所作也懐者思也襃讀屈原之文追而愍之故作九懐以禆其詞遂列於篇襃字子淵枚賈馬揚漢藝文志楚臣屈原離讒憂國作賦以諷有惻隱古詩之義其後宋玉唐勒漢興枚乗司馬相如下及揚子雲競為侈麗闔衍之辭没其諷諭之義又賈誼傳誼為長沙王太傅意不自得及渡湘水為賦以弔屈原乞靈左傳願乞靈於臧氏長卿漢書司馬相如字長卿假寵左傳君若茍無四方之虞則願假寵以請於諸侯文心雕龍輯注巻一
