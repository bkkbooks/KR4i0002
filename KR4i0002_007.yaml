body:
  text: 文心雕龍輯注巻七詹事府詹事加吏部侍郎銜黄叔琳撰情采第三十一聖賢書辭摠稱文章非采而何夫水性虚而淪漪結木體實而花萼振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹漆質待文也若乃綜述性靈敷寫器象鏤心鳥跡之中織辭魚網之上其為彪炳縟采名矣故立文之道其理有三一曰形文五色是也二曰聲文五音是也三曰情文五性是也五色雜而成黼黻五音比而成韶夏五情疑作性發而為辭章神理之數也孝經垂典喪言不文故知君子常一作嘗言未嘗質也孝子疾偽故稱美言不信而五千精妙則非棄美矣莊周云辨雕萬物謂藻飾也韓非云豔采辯説謂綺麗也綺麗以豔説藻飾以辯雕文辭之變於斯極矣研味李老則知文質附乎性情詳覽莊韓則見華實過乎淫侈若擇源於涇渭之流按轡於邪正之路亦可以馭文采矣夫鉛黛所以飾容而盼倩生於淑姿文采所以飾言而辯麗本於情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也昔詩人什篇為情而造文辭人賦頌為文而造情何以明其然蓋風雅之興志思蓄憤而吟詠情性以諷其上此為情而造文也諸子之徒心非鬱陶茍馳夸飾鬻聲釣世此為文而造情也故為情者要約而寫真為文者淫麗而煩濫而後之作者採濫忽真逺棄風雅近師辭賦故體情之製日疎逐文之篇愈盛故有志深軒冕而汎詠臯壤心纒幾務而虚述人外真宰弗存翩其反矣夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草木之㣲依情待實况乎文章述志為本言與志反文豈足徴是以聨辭結采將欲明經汪本作理采濫辭詭則心理愈翳固知翠綸桂餌反所以失魚言隱榮華殆謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本夫能設謨謝云當作模以位理擬地以置心心定而後結音理正而後摛藻使文不滅質博不溺心正采耀乎朱藍間色屏於紅紫乃可謂雕琢其章彬彬君子矣贊曰言以文逺誠哉斯驗心術既形英華乃贍呉錦好渝舜英徒艷繁采寡情味之必厭犀兕左傳華元答城者謳曰牛則有皮犀兕尚多役人又歌曰縱其有皮丹漆若何鳥跡見原道篇魚網東觀漢記黄門蔡倫典作上方用樹皮及敝布魚網作紙帝善其能自是莫不用天下咸稱蔡侯紙也美言不信老子信言不美美言不信五千老子傳著書上下篇言道徳之意五千餘言辯雕莊子古之王天下者知雖落天地不自慮也辯雖雕萬物不自説也涇渭詩涇以渭濁湜湜其沚傳涇渭相入而清濁異臯壤莊子山林與臯壤與使我欣欣然而樂與人外宋書隱逸傳孔淳之遇釋法崇因留共止遂停三載法崇歎曰緬想人外三十年矣今乃傾蓋於兹不覺老之將至也真宰莊子若有真宰而特不得其朕桃李李廣傳桃李不言下自成蹊樹蘭淮南子男子樹蘭美而不芳翠綸桂餌闞子以桂為餌鍛黄金之鉤錯以銀碧垂翡翠之綸言隱莊子言隱於榮華賁象易賁上九白賁无咎摛藻漢書敘傳摛藻如春華舜英詩有女同行顔如舜英傳舜木槿也其華朝生暮落鎔裁第三十二情理設位文采行乎其中剛柔以立本變通以趨時立本有體意或偏長趨時無方辭或繁雜蹊要所司職在鎔裁櫽括情理矯揉文采也規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢譬繩墨之審分斧斤之斵削矣駢拇枝指由侈於性附贅懸肬實侈於形二意兩出義之駢枝也同辭重句文之肬贅也凡思緒初發辭采苦雜心非權衡勢必輕重是以草創鴻筆先摽三準履端於始則設情以位體舉正於中則酌事以取類歸餘於終則撮辭以舉要然後舒華布實獻替疑作質元作贊節文繩墨以外美材既斵故能首尾圓合條貫統序若術不素定而委心逐辭異端叢至駢贅必多故三準既定次討字句句有可削足見其疎字不得減乃知其宻精論要語極略之體游心竄句極繁之體謂繁與略隨分所好引而伸之則兩句敷為一章約以貫之則一章刪成兩句思贍者善敷才覈者善刪善刪者字去而意留善敷者辭殊而意汪本作義顯字刪而意闕則短乏而非覈辭敷而言重則蕪穢而非贍昔謝艾王濟西河文士張俊當作駿以為艾繁而不可刪濟略而不可益若二子者可謂練鎔裁而曉繁略矣至如士衡才優而綴辭尤繁士龍思劣而雅好清省及雲之論機亟恨其多而稱清新相接不以為病蓋崇友于耳夫美錦製衣脩短有度雖翫其采不倍領袖巧猶難繁况在乎拙而文賦以為榛楛勿剪庸音足曲其識非不鑒乃情苦芟元作吝繁也夫百節成體共資榮衛萬趣㑹文不離辭情若情周而不繁辭運而不濫非夫鎔裁何以行之乎贊曰篇章户牖左右相瞰辭如川流溢則汎濫權衡損益斟酌濃淡芟繁剪穢弛於負擔駢拇莊子駢拇枝指出乎性哉而侈於徳附贅縣疣出乎形哉而侈於性謝艾張重華傳主簿謝艾兼資文武清新陸清河集與兄機書兄文章髙逺絶異不可復稱言然猶皆欲㣲多但清新相接不以此為病耳榛楛陸機文賦石韞玉而山暉水懐珠而川媚彼榛楛之勿翦亦䝉榮于集翠注榛楛喻庸音也以珠玉之句既存故榛楛之辭亦美也庸音文賦放庸音以足曲榮衛内經榮衛不行五藏不通聲律第三十三夫音律所始本於人聲者也聲含宫商肇自血氣先王因之以制樂歌故知器寫人聲聲非學當作效器者也故言語者文章神明樞機吐納律吕脣吻而巳古之教歌先揆以法使疾呼中宫徐呼中徴夫商徴響髙宫羽聲下抗喉矯舌之差攢脣激齒之異亷肉相準皎然可分今操琹不調必知改張摘文乖張而不識所調響在彼絃乃得克諧聲萌我心更失和律其故何哉良由内元作外王改聴難為聰也故外聴之易絃以手定内聴之難聲與心紛可以數求難以辭逐凡聲有飛沈響有雙疊二字脱楊云有字下諸本皆遺翕散二字謝云據下文當作雙疊二字雙聲隔字而每舛疊韻雜句而必暌沈則響發而斷飛則聲颺不還並轆轤交往逆鱗相比迂其際㑹則往蹇來連其為疾病亦文家之吃也夫吃文為患生於好詭逐新趣異故喉脣糺紛將欲解結務在剛斷左礙而尋右末滯而討前則聲轉於吻玲玲如振玉辭靡於耳纍纍如貫珠矣是以聲畫妍蚩寄在吟詠吟詠滋味流於字元作下商孟和改句氣力孫云氣力上當復有字句二字窮於和韻異音相從謂之和同聲相應謂之韻韻氣一定故餘聲易遣和體抑揚故遺響難契屬筆易巧選和至難綴文難精而作韻甚易雖纎意一作毫曲變非可縷言然振其大綱不出兹論若夫宫商大和譬諸吹籥翻迴取均頗似調瑟瑟資移柱故有時而乖貳籥含定管故無往而不壹陳思潘岳吹籥之調也陸機左思瑟柱之和也㮣舉而推可以類見又詩人綜韻率多清切楚辭辭楚故訛韻實繁及張華論韻謂士衡多楚文賦亦稱知楚不易可謂銜靈均之聲餘失黄鍾之正響也凡切韻之動勢若轉圜訛音之作甚於枘方免乎枘方則無大過矣練才洞鑒剖字鑽響識疎汪本作疎識濶略隨音所遇若長風之過籟南元作東葉循父改郭之吹竽耳古之佩玉左宫右徴以節其步聲不失序音以律文其可忘王本作忽哉贊曰摽情務逺比音則近吹律胸臆調鍾脣吻聲得鹽梅響滑榆槿割棄支離宫商難隱古之教歌云云見韓子亷肉禮樂記先王制雅頌之聲以導之使其曲直繁瘠亷肉節奏足以感動人之善心而巳矣改張董仲舒䇿竊譬之琴瑟不調甚者必解而更張之乃可鼓也雙聲疊韻謝莊傳王元謨問莊何者為雙聲何者為疊韻答曰元䕶為雙聲磝碻為疊韻轆轤詩評單轆轤韻者單出單入兩句換韻雙轆轤韻者雙出雙入四句換韻往蹇來連易蹇卦六四爻辭吃韓非傳非為人口吃不能道説而善著書注吃語難也纍纍禮樂記倨中矩句中鉤纍纍乎端如貫珠和韻楊慎曰東董是和東中是韻吹籥公羊傳去籥注籥所吹以節舞也吹籥而舞文樂之長取均楊收傳旋宫以七聲為均均之為言韻也調瑟楊子法言以往聖人之法治將來譬猶膠柱而調瑟枘方宋玉九辨圓鑿而方枘兮吾固知其鉏鋙而難入注枘刻木耑所以入鑿吹竽韓子南郭處士為齊宣王吹竽宣王悦之廩食以數百人湣王立好一一而聴之處士逃左宫右徴禮玉藻古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏調鍾揚雄傳師曠之調鐘竢知音者之在後也注晉平公鐘工者以為調矣師曠曰臣竊聴之知其不調也至於師涓而果知鐘之不調是師曠欲善調之鐘為後世之有知音榆槿禮内則堇荁枌榆免薧滫瀡以滑之章句第三十四夫設情有宅置言有位宅情曰章位言曰句故章者明也句者局也局言者聨字以分疆明情者摠義以包體區畛相異而衢路交通矣夫人之立言因字而生句積句而成章積章而成篇篇之彪炳章無疵也章之明靡句無玷也句之清英字不妄也振本而末從知一而萬畢矣夫裁文匠筆篇有小大離章合句調有緩急隨變適㑹莫見定準句司數字待相接以為用章總一義須意窮而成體其控引情理送迎際㑹譬舞容迴環而有綴兆之位歌聲靡曼而有抗墜之節也尋詩人擬喻雖斷章取義然章句在篇如繭之抽緒原始要終體必鱗次啟行之辭逆萌中篇之意絶筆之言追媵元作勝謝改前句之㫖故能外文綺交内義脈注跗萼相銜首尾一體若辭失其朋元作明則羇旅而無友事乖其次則飄寓而不安是以搜句忌於顛倒裁章貴於順序斯固情趣之指歸文筆之同致也若夫筆句無常而字有條數四字宻而不促六字格而非緩或變之以三五蓋應機之權節也至於詩頌大體以四言為正唯祈父肇禋以二言為句尋二言肇於黄世竹彈之謠是也三言興於虞時元首之詩是也四言廣於夏年洛汭之歌是也五言見於周代行露之章是也六言七言雜出詩騷而疑有脱字體之篇成於兩漢情數運周隨時代用矣若乃改韻從調所以節文辭氣賈誼枚乗兩韻輒易劉歆桓譚百句不遷亦各有其志也昔魏武論賦嫌於積韻而善於資代陸雲亦稱四言轉句以四句為佳觀彼制韻志同枚賈然兩韻輒易則聲韻㣲躁百句不遷則脣吻告勞妙才激揚雖觸思利貞曷若折之中和庶保无咎又詩人以兮字入於句限楚辭用之字出句外尋兮字成句乃語助餘聲舜詠南風用之久矣而魏武弗好豈不以無益文義耶至於夫惟蓋故者發端之首唱之而於以者乃劄句之舊體乎哉矣也亦送末之常科據事似閒在用實切巧者迥運彌縫文體將令數句之外得一字之助矣外字難謬况章句歟贊曰斷章有檢積句不恒理資配主辭忌失元作告謝改朋環情草孫云當作節調宛轉相騰離合同王本作同合異以盡厥能明也局也詩闗睢疏章者明也總義包體所以明情也句者局也聨字分疆所以局言也區畛蜀都賦𤓰疇芋區注區界畔也周禮十夫有溝溝上有畛畛田界綴兆禮樂記行其綴兆要其節奏行列得正焉注綴兆舞位也抗墜禮樂記歌者上如抗下如墜曲如折止如槀木啟行詩小雅元戎十乗以先啟行啟行喻始也跗萼詩小雅鄂不韡韡箋承華者曰鄂不當作拊拊鄂足也疏鄭以為華下有鄂鄂下有拊由華以覆鄂鄂以承華華鄂相覆而光明猶兄弟相順而榮顯祈父小雅祈父予王之爪牙肇禋周頌肇禋迄用有成維周之禎竹彈謠見通變篇元首虞書帝庸作歌曰股肱喜哉元首起哉百工熈哉臯陶乃賡載歌曰元首明哉股肱良哉庶事康哉按哉為語助以喜起熈明良康為韻是三言也洛汭夏書五子之歌也行露見明詩篇六言七言同上南風同上配主易豐初九遇其配主麗辭第三十五造化賦形支體必雙神理為用事不孤立夫心生文辭運裁百慮髙下相須自然成對唐虞之世辭未極文而臯陶贊云罪疑惟輕功疑惟重益陳謨云滿招損謙受益豈營麗辭率然對爾易之文繫聖人之妙思也序乾四徳句句相銜龍虎類感則字字相儷乾坤易簡則宛轉相承日月往來則隔行懸合雖句字或殊而偶意一也至於詩人偶章大夫聨辭竒偶適變不勞經營自揚馬張蔡崇盛麗辭如宋畫呉冶畫元作盡冶元作治朱改刻形鏤法麗句與深采並流偶意共逸韻俱發至魏晉羣才析句彌宻聨字合趣剖一作割毫析釐然契機者入巧浮假者無功故麗辭之體凡有四對言對為易事對為難反對為優正對為劣言對者雙比空辭者也事對者並舉人騐者也反對者理殊趣合者也正對者事異義同者也長卿上林賦元脱補云修容乎禮園翺翔乎書圃此言對之類也宋玉神女賦云毛嬙鄣袂不足程式西施掩面比之無色此事對之類也仲宣登樓云鍾儀幽而楚奏莊舄顯而越吟此反對之類也孟陽七哀云漢祖想枌榆光武思白水此正對之類也凡偶辭胸臆言對所以為易也徴元作擬一作㣲人之學事對所以為難也幽顯同志反對所以為優也並貴共心正對所以為劣也又以事對各有反正指類而求萬條自昭然矣張華詩稱遊鴈比翼翔歸鴻知接翮劉琨詩言元在詩字上宣尼悲獲麟西狩泣孔丘若斯重出即對句之駢枝也是以言對為美貴在精巧事對所先務在允當若兩事相配而優劣不均是驥在左驂駑為右服也若夫事或孤立莫與相偶是䕫之一足趻踔而行也若氣無竒類文乏異采碌碌麗辭則昬睡耳目必使理圓事宻聨璧其章迭用竒偶節以雜佩乃其貴耳類此而思理自汪本作斯見也贊曰體植必兩辭動有配左提右挈精味兼載炳爍聨華鏡靜含態玉潤雙流如彼珩佩臯陶贊見虞書大禹謨益陳謨同上文繫易文言元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事注同聲相應同氣相求水流濕火就燥雲從龍風從虎繫辭乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業又日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉宋畫莊子宋元君將畫圖衆史皆至有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴臝君曰司矣是真畫者也呉冶吴越春秋越王元常使歐冶子造劍五枚上林司馬相如字長卿作上林賦神女宋玉作神女賦毛嬙莊子毛嬙麗姬人之所美也登樓見詮賦篇楚奏左傳晉侯觀於軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使税之問其族對曰伶人也使與之琴操南音范文子曰樂操土音不忘舊也越吟陳軫傳軫曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪富貴矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聴之猶尚越聲也枌榆漢郊祀志髙祖詔御史令豐治枌榆社白水東京賦龍飛白水鳯翔參墟注白水謂南陽白水縣世祖初起之處也允當左傳允當則歸䕫山海經東海中有流波山上有獸状如牛蒼身而無角一足趻踔莊子䕫謂蚿曰吾以一足趻踔而行子無如矣文心雕龍輯注巻七
