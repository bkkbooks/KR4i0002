body:
  text: 文心雕龍輯注卷十詹事府詹事加吏部侍郎銜黃叔琳撰物色第四十六春秋代序陰陽慘舒物色之動心亦搖焉蓋陽氣萌而𤣥駒步陰律凝而丹鳥羞微蟲猶或入感四時之動物深矣若夫圭璋挺其惠心英華秀其清氣物色相召人誰獲安是以獻嵗發春悅豫之情暢滔滔孟夏鬱陶之心凝天高氣清陰沈之志逺霰雪無垠矜肅之慮深嵗有其物物有其容情以物遷辭以情發一葉且或迎意蟲聲有足引心況清風與明月同夜白日與春林共朝哉是以詩人感物聨類不窮流連萬象之際沈吟視聽之區寫氣圖貌既隨物以宛轉屬采附聲亦與心而徘徊故灼灼狀桃花之鮮依依盡楊栁之貌杲杲為出日之容瀌瀌擬雨雪之狀喈喈逐黃鳥之聲喓喓學草蟲之韻皎日嘒星一言窮理參差沃若兩字窮形並以少總多情貌無遺矣雖復思經千載將何易奪及離騷代興觸類而長物貌難盡故重沓舒狀於是嵯峨之類聚葳蕤之羣積矣及長卿之徒詭勢瓌聲模山範水字必魚貫所謂詩人麗則而約言辭人麗淫而繁句也至如雅詠棠華或黃或白騷述秋蘭緑葉紫莖凡摛表五色貴在時見若青黃屢出則繁而不珍自近代以來文貴形似窺情風景之上鑽貌草木之中吟詠所發志惟深逺體物為妙功在密附故巧言切狀如印之印泥不加雕削而曲寫毫芥故能瞻言而見貌印疑作即字而知時也然物有恆姿而思無定檢或率爾造極或精思愈疏且詩騷所摽並據要害故後進鋭筆怯於爭鋒莫不因方以借巧即勢以㑹竒善於適要則雖舊彌新矣是以四序紛回而入興貴間物色雖繁而析辭尚簡使味飄飄而輕舉情曄曄而更新古來辭人異代接武莫不參伍以相變因革以為功物色盡而情有餘者曉㑹通也若乃山林皋壤實文思之奧府略語則闕詳說則繁然屈平所以能洞監風騷之情者抑亦江山之助乎贊曰山沓水匝樹雜雲合目既往還心亦吐納春日遲遲秋風颯颯情往似贈興來如答𤣥駒大戴禮夏小正十有二月𤣥駒賁𤣥駒也者蟻也賁者何也走於地中也法言吾見𤣥駒之步丹鳥夏小正八月丹烏羞白鳥注丹鳥螢也白鳥謂蚊蚋也羞進也不盡食也古今注螢一名丹鳥一名夜光獻嵗楚辭招魂獻嵗發春兮滔滔楚辭九章滔滔孟夏兮天高宋玉九辨泬寥兮天高而氣清霰雪楚辭九章霰雪紛其無垠兮一葉淮南子見一葉落而知嵗之將暮灼灼詩周南桃之夭夭灼灼其華依依詩小雅昔我往矣楊栁依依杲杲詩衛風其雨其雨杲杲出日瀌瀌詩小雅雨雪鑣瀌見晛曰消喈喈詩周南黃鳥于飛集于灌木其鳴喈喈喓喓詩召南喓喓草蟲皎日詩王風謂豫不信有如皎日嘒星詩周南嘒彼小星三五在東參差詩周南參差荇菜沃若詩衛風其葉沃若魚貫易剝卦六五貫魚以宫人寵無不利麗則麗淫見詮賦篇棠華詩小雅裳裳者華或黃或白秋蘭楚辭九歌秋蘭兮青青緑葉兮紫莖才略第四十七九代之文富矣盛矣其辭令華采可略而詳也虞夏文章則有皋陶六德䕫序八音益則有贊五子作歌辭義溫雅萬代之儀表也商周之世則仲虺垂誥伊尹敷訓吉甫之徒並述詩頌義固為經文亦師矣及乎春秋大夫則修辭聘㑹磊落如琅玕之圃焜耀似縟錦之肆薳敖元作教曹改擇楚國之令典隨㑹講晉國之禮法趙衰元作襄曹改以文勝從饗國僑以修辭扞鄭子太叔美秀而文公孫揮善於辭令皆文名之標者也戰代任武而文士不絶諸子以道術取資屈宋以楚辭發采樂毅報書辨以義范雎上疏密而至蘇秦厯說壯而中李斯自奏麗而動若在文世則揚班儔矣荀況學宗而象物名賦文質相稱固巨儒之情也漢室陸賈首發竒采賦孟春而選典誥其辨之富矣賈誼才頴陵軼飛議愜而賦清豈虛至哉枚乘之七發鄒陽之上書膏潤於筆氣形於言矣仲舒專儒子長純史而麗縟成文亦詩人之告哀焉相如好書師範屈宋洞入夸艷致名辭宗然覆取精意理不勝辭故揚子以為文麗用寡者長卿誠哉是言也王褒構采以密巧為致附聲測貌泠然可觀子雲屬意辭人疑誤最深觀其涯度幽逺搜選詭麗而竭才以鑽思故能理贍而辭堅矣桓談著論富號猗頓宋𢎞稱薦爰比相如而集靈諸賦偏淺無才故知長於諷論不及麗文也敬通雅好辭說而坎壈盛世顯志自序亦蚌病成珠矣二班兩劉奕葉繼采舊說以為固文優彪歆學精向然王命清辨新序該練璿璧産於崑岡亦難得而踰本矣傅毅崔駰光采比肩瑗實踵武能世厥風者矣杜篤賈逵亦有聲於文跡其為才崔傅之末流也李尤元作充王改賦銘志慕鴻裁而才力沈膇垂翼不飛馬融鴻儒思洽識一作登高吐納經範華實相扶王逸博識有功而絢采無力延夀繼志瓌頴獨標其善圖物寫貌豈枚乘之遺術歟張衡通贍蔡雍精雅文史彬彬隔世相望是則竹柏異心而同貞金玉殊質而皆寶也劉向之奏議旨切而調緩趙一之辭賦意繁而體疏孔融氣盛於為筆禰衡思鋭於為文有偏美焉潘朂憑經以騁才故絶羣於錫命王朗發憤以託志亦致美於序銘然自卿淵已前多俊才而不課學雄向已後頗引書以助文此取與之大際其分不可亂者也魏文之才洋洋清綺舊談抑之謂去植千里然子建思捷而才俊詩麗而表逸子桓慮詳而力緩故不競於先鳴而樂府清越典論辨要迭用短長亦無懵焉但俗情抑揚雷同一響遂令文帝以位尊減才思王以勢窘益價未為篤論也仲宣溢才捷而能密文多兼善辭少瑕纍摘其詩賦則七子之冠冕乎琳瑀以符檄擅聲徐幹以賦論標美劉楨情高以㑹采應㻛學優以得文路粹楊修頗懷筆記之工丁儀邯鄲亦含論述之美有足算焉劉劭趙都能攀於前修何晏景福克光於後進休璉風情則百一摽其志吉甫文理則臨丹成其采嵇康師心以遣論阮籍使氣以命詩殊聲而合響異翮而同飛張華短章奕奕清暢其鷦鷯寓意即韓非之說難也左思竒才業深覃思盡鋭於三都拔萃於詠史無遺力矣潘嶽敏給辭自疑作旨和暢鍾美於西征賈餘於哀誄非自外也陸機才欲窺深辭務索廣故思能入巧而不制繁士龍朗練元作陳王青蓮改以識檢亂故能布采鮮淨敏於短篇孫楚綴思每直置以疏通摰虞述懷必循規以溫雅其品藻流别有條理焉傅𤣥篇章義多規鏡長虞筆奏世執剛中並楨汪作杶幹之實才非羣華之韡萼也成公子安選賦而時美夏侯孝若具體而皆微曹攄清靡於長篇季鷹辨切於短韻各其善也孟陽景陽才綺而相埒可謂魯衛之政兄弟之文也劉琨雅壯而多風盧諶情發而理昭亦遇之於時勢也景純豔逸足冠中興郊賦既穆穆以大觀仙詩亦飄飄而凌雲矣庾元規之表奏靡密以間暢溫太真之筆記循理而清通亦筆端之良工也孫盛干寶元作子實文勝為史凖的所擬志乎典訓户牖雖異而筆彩略同袁宏發軫以高驤故卓出而多偏孫綽規旋以矩步故倫序而寡狀殷仲文之孤疑作秋興謝叔源之間情並解散辭體縹眇浮音雖滔滔風流而大澆文意宋代逸才辭翰鱗萃世近易明無勞甄序觀夫後漢才林可參西京晉世文苑足儷鄴都然而魏時話言必以元封為稱首宋來美談亦以建安為口實何也豈非崇文之盛世招才之嘉㑹哉嗟夫此古人所以貴乎時也贊曰才難然乎性各異稟一朝綜文千年凝錦餘采徘徊遺風籍甚無曰紛雜皎然可品六德書皋陶謨日嚴祗敬六德亮采有邦八音書舜典帝曰䕫命汝典樂教胄子八音克諧無相奪倫仲虺書序湯歸自夏至於大坰仲虺作誥伊訓書序成湯既殁太甲元年伊尹作伊訓吉甫詩大雅嵩高蒸民皆尹吉甫作也蒍敖左傳隨武子曰蒍敖為宰擇楚國之令典百官象物而動軍政不戒而備能用典矣蒍敖即蒍艾獵孫叔敖也隨㑹左傳晉士㑹平王室王享之殽蒸武子私問其故王曰王享有體薦宴有折俎公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法趙衰左傳秦穆公享公子重耳子犯曰偃不如衰之文也請使衰從公子賦河水公賦六月衰曰君稱所以佐天子者命重耳重耳敢不拜國僑左傳子産之為政也擇能而使之馮簡子能斷大事子太叔美秀而文公孫揮能知四國之為而辨其大夫之族姓班位貴賤能否而又善為辭令樂毅樂毅傳毅為燕昭王破齊獨莒即墨未服昭王死惠王即位齊之田單聞之乃縱反間於燕曰齊兩城不下者聞樂毅與燕新王有隙欲連兵且留齊惠王乃使騎劫代將而召樂毅樂毅畏誅遂西降趙惠王使人讓之毅報以書荀況史記索隱荀卿名況卿者時人相尊而號為卿也有雲蠶針等賦見荀子飛吕氏春秋飛騕裊古之駿馬也猗頓水經注孔鮒曰猗頓魯之窮士也聞朱公富往而問術焉朱公曰子欲速富當畜五牸于是十年之間其息不可計以興富于猗氏故曰猗頓也論衡挾桓君山之書富於積猗頓之財宋𢎞稱薦宋𢎞傳帝嘗問𢎞通博之士𢎞薦沛國桓談才學洽聞能及揚雄劉向父子集靈藝文類聚有桓談集靈宫賦顯志馮衍傳衍與新陽侯交結得罪不得志乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章𤣥妙之思也蚌病淮南子明月之珠螺蚌之病而我之利也二班彪固兩劉向歆王命見論說篇新序劉向傳向采傳記行事著新序說苑凡五十篇崔駰後漢書崔駰博學有偉才善屬文少游太學與班固傅毅同時齊名子瑗鋭志好學盡能傳其父業瑗子實少沈靜好典籍傳贊曰崔為文宗世禪雕龍李尤原作李充按後漢獨行傳李充陳留人不言有著述晉中興書李充江夏人著學針然此在賈逵之後馬融之前則李尤也尤在和帝時拜蘭臺令史有函谷諸賦孟津諸銘而賈逵仕明帝時馬融仕順桓時以序觀之乃李尤無疑沈膇左傳成公六年獻子曰民愁則墊隘於是乎有沈溺重膇之疾垂翼易明夷卦初九明夷于飛垂其翼枚乘遺術謂逸與延夀猶乘之于皋而延夀殆欲突過前人也趙一後漢文苑傳一恃才倨傲為鄉黨所擯乃作解擯後屢抵罪友人救得免乃為窮鳥賦以謝恩又作刺世疾邪賦以舒其怨憤七子魏文帝典論今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁驥騄于千里仰齊足而並馳丁儀邯鄲魏志自潁川邯鄲淳繁欽陳留路粹沛國丁儀丁廙𢎞農楊修河內荀緯等亦有文采而不在此七人之例劉劭注見事類篇休璉應璩傳璩字休璉曹爽秉政多違法度璩為詩以諷焉子貞字吉甫少以才聞能談論楚國先賢傳應休璉作百一詩譏切時事遍以示在位者咸皆怪愕以為應焚棄之何晏獨無怪也樂府廣題百者數之終一者數之始士有百行終始如一故云百一何晏晏字平叔有景福殿賦文選注魏明帝將東巡恐夏熱故于許昌作殿名曰景福既成命賦之平叔遂有此作嵇康嵇康傳康以為神仙禀之自然非積學所得至于導養得理則安期彭祖之倫可及乃著養生論阮籍阮籍傳籍作詠懷詩八十餘篇為世所重顔延年曰說者謂阮籍在晉文代常慮禍患故發此詠耳韓非非著說難儲說注見知音篇左思左思有詠史詩潘嶽潘嶽傳嶽為長安令作西征賦述所經人物山水文清旨詣窺深世說孫興公云潘文淺而淨陸文深而蕪世執咸𤣥子也剛中易䝉卦彖以剛中也師卦象剛中而應具體按湛作周詩昆弟誥正如謝公評揚都賦所云事事擬學而不免儉狹者也盧諶盧諶傳劉琨敗喪諶抗表理琨文旨甚切諶才高行潔為一時所推值中原喪亂淪陷非所南郊郭璞傳璞博學有高才辭賦為中興冠嘗作南郊賦帝見而嘉之西京光武都洛陽長安在西故曰西京而文人遂以前漢為西京後漢為東都也鄴都文選魏曹操都鄴相州是也元封漢武帝紀上還登封泰山降坐明堂以十月為元封元年建安見明詩篇知音第四十八知音其難哉音實難知知實難逢逢其知音千載其一乎夫古來知音多賤同而思古所謂日進前而不御遙聞聲而相思也昔儲說始出子虛初成秦皇漢武恨不同時既同時矣則韓囚而馬輕豈不明鑒同時之賤哉至於班固傳毅文在伯仲而固嗤毅云下筆不能自休及陳思論才亦深排孔璋敬禮請潤色歎以為美談季緒好詆訶方之於田巴意亦見矣故魏文稱文人相輕非虛談也至如君卿㫳舌而謬欲論文乃稱史遷著書咨東方朔於是桓談之徒相顧嗤笑彼實博徒輕言負誚況乎文士可妄談哉故鑒照洞明而貴古賤今者二主是也才實鴻懿而崇已抑人者班曹是也學不逮文而信僞迷真者樓護是也醬瓿之議豈多歎哉夫麟鳯與麏雉懸絶珠玉與礫石超殊白日垂其照青眸寫其形然魯臣以麟為麏楚人以雉為鳯魏氏以夜光為怪石宋客以燕礫為寶珠形器易徴謬乃若是文情難鑒誰曰易分夫篇章雜沓質文交加知多偏好人莫圎該慷慨者逆聲而擊節醖籍者見密而高蹈浮慧者觀綺而躍心愛竒者聞詭而驚聽㑹已則嗟諷異我則沮棄各執一隅之解欲擬萬端之變所謂東向而望不見西墻也凡操千曲而後曉聲觀千劔而後識器故圓照之象務先博觀閲喬嶽以形培塿酌滄波以喻畎澮無私於輕重不偏於憎愛然後能平理若衡照辭如鏡矣是以將閲文情先標六觀一觀位體二觀置辭三觀通變四觀竒正五觀事義六觀宫商斯術既形則優劣見矣夫綴文者情動而辭發觀文者披文以入情㳂波討源雖幽必顯世逺莫見其面覘文輒見其心豈成篇之足深患識照之自淺耳夫志在山水琴表其情況形之筆端理將焉匿故心之照理譬目之照形目瞭則形無不分心敏則理無不達然而俗監之迷者深廢淺售此莊周所以笑折楊宋玉所以傷白雪也昔屈平有言文質疏內衆不知余之異采見異唯知音耳揚雄自稱心好沈博絶麗之文其事浮淺亦可知矣夫唯深識鑒奧必歡然內懌譬春臺之熙衆人樂餌之止過客蓋聞蘭為國香服媚彌芬書亦國華玩澤王作繹方美知音君子其埀意焉贊曰洪鍾萬鈞䕫曠所定良書盈篋妙鑒乃訂流鄭淫人無或失聽獨有此律不謬蹊徑日進遙聞鬼谷子內揵篇日進前而不御遙聞聲而相思儲說韓非傳非作孤憤五蠧內外儲說林說難十餘萬言秦王見其書曰寡人得見此人與之遊死不恨矣因急攻韓韓乃遣非使秦李斯姚賈害之下吏治非子虛見麗辭篇上林注嗤毅魏文帝典論傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休論才陳思王集與楊德祖書以孔璋之才不間於辭賦而多自謂能與司馬長卿同風譬畫虎不成反為狗者也昔丁敬禮嘗作小文使僕潤色之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者耶吾嘗歎此達言以為美談劉季緒才不逮于作者而好詆訶文章掎托利病昔田巴毁五帝罪三王呰五霸於稷下一旦而服千人魯連一說使終身杜口劉生之辨未若田氏今之仲連求之不難可無歎息乎丁廙字敬禮季緒劉表子也相輕魏文帝論文人相輕自古而然樓護漢游俠傳樓護字君卿少隨父為醫長安誦醫經本草方術數十萬言長者謂曰以君卿之才何不宦學乎繇是辭其父學經傳為吏數年甚得名譽醬瓿揚雄傳著太𤣥法言劉歆嘗觀之謂雄曰空自苦今學者有利祿然尚不能明易又如𤣥何吾恐後人用覆醬瓿也麟麏見史傳篇泣麟注雉鳯尹文子楚擔山雉者路人問何鳥也擔雉者欺之曰鳯凰也買而獻之楚王怪石尹文子魏之田父得玉徑尺不知其玉也以告鄰人鄰人紿之曰怪石也歸而置之廡下明照一室怖而棄之于野燕礫闞子宋之愚人得燕石於梧臺之東歸而藏之以為寶周客聞而觀焉掩口而笑曰與瓦礫不殊東向淮南子東面而望不見西牆南面而視不覩北方琴表其情吕氏春秋伯牙鼓琴鍾子期善聽方鼓琴志在泰山子期曰善哉乎鼓琴巍巍乎若泰山志在流水曰善哉乎鼓琴洋洋乎若流水折楊莊子大聲不入於里耳折楊皇荂則嗑然而笑是故高言不止於衆人之心至言不出俗言勝也白雪宋玉對楚王問客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者數十人是以其曲彌高其和彌寡異采屈平九章文質疏內兮衆不知余之異采春臺老子衆人熙熙如登春臺樂餌老子樂與餌過客止國香左傳鄭文公有賤妾曰燕姞夢天使與已蘭曰以是為而子以蘭為國香人服媚之如是程器第四十九周書論士方之梓材蓋貴器用而兼文采也是以朴斫成而丹雘施垣墉立而雕杇附而近代詞人務華棄實故魏文以為古今文人之之字衍類不護細行韋誕所評又厯詆羣才後人雷同混之一貫吁可悲矣略觀文士之疵相如竊妻而受金揚雄嗜酒而少算敬通之不循廉隅杜篤之請求無厭班固諂竇以作威馬融黨梁而黷貨文舉傲誕以速誅正平狂憨以致戮仲宣輕脆以躁競孔璋愡恫以粗疏丁儀貪婪以乞貨路粹餔啜而無恥潘嶽詭譸於愍懷陸機傾仄於賈郭傅𤣥剛隘而詈臺孫楚狠汪作佷愎而訟府諸有此類並文士之瑕纍文既有之武亦宜然古之將相疵咎實多至如管仲之盜竊吳起之貪淫陳平之汚㸃絳灌之讒嫉㳂兹以下不可勝數孔光負衡據鼎而仄媚董賢況班馬之賤職潘嶽之下位哉王戎開國上秩而鬻官囂俗況馬杜之磬懸丁路之貧薄哉然子夏無虧於名儒濬沖不塵乎竹林者名崇而譏減也若夫屈賈之忠貞鄒枚之機覺黃香之淳孝徐幹之沈默豈曰文士必其玷歟蓋人禀五材修短殊用自非上哲難以求備然將相以位隆特達文士以職卑多誚此江河所以騰湧涓流所以寸折者也名之抑揚既其然矣位之通塞亦有以焉蓋士之登庸以成務為用魯之敬姜婦人之聰明耳然推其機綜以方治國安有丈夫學文而不達於政事哉彼揚馬之徒有文無質所以終乎下位也昔庾元規才華清英勳庸有聲故文藝不稱若非台嶽則正以文才也文武之術左右惟宜郤縠敦書故舉為元帥豈以好文而不練武哉孫武兵經辭如珠玉豈以習武而不曉文也是以君子藏器待時而動發揮事業固宜蓄素以弸中散采元作悉龔仲和改以彪外楩柟其質豫章其幹摛文必在緯軍國負元作賢龔改重必在任棟梁窮則獨善以垂文達則奉時以騁績若此文人應梓材之士矣贊曰瞻彼前修有懿文德聲昭楚南采動梁北雕而不器貞幹誰則豈無華身亦有光國梓材書梓材若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘韋誕文章敘録韋誕字仲將太僕端之子魚豢嘗舉王阮諸人以問誕誕對曰仲宣傷於肥戅休伯都無格檢元瑜病於體弱孔璋實自粗疏文蔚性頗忿鷙竊妻受金司馬相如傳卓王孫有女文君新寡好音相如以琴心挑之文君竊從户窺心悅而好之恐不得當也夜亡奔相如相如與馳歸成都其後有人言相如使蜀時受金失官嗜酒揚雄傳雄家素貧嗜酒時有好事者載酒肴從游學敬通馮衍傳衍字敬通顯宗即位人多短衍文過其實遂廢于家衍與婦弟書數婦之惡有云以室家之故捐棄衣冠心專耕耘以求衣食杜篤後漢文苑傳杜篤居美陽與美陽令游數從請託不諧頗相恨令怒收篤送京師班固班固傳大將軍竇憲出征胸奴以固為中護軍與參議及竇憲敗固先坐免官固不教學諸子諸子多不遵法度吏人苦之馬融馬融傳融為梁冀草奏奏李固又作大將軍西第頌以此頗為正直所羞論曰馬融奢樂恣性黨附成譏固知識能匡欲者鮮矣文舉孔融傳融字文舉負其高氣志在靖難而才疏意廣後為曹操所殺正平後漢文苑傳禰衡字正平少有才辨而氣尚剛傲後為黃祖所殺憁侗廣韻愡恫不得志也詭譸晉愍懷太子傳賈后將廢太子詐稱上不和召太子置别室逼飲醉之使潘嶽作書草若禱神之文有如太子素意因醉而書之令小婢以紙筆及書草使太子依而寫之后以呈帝廢太子傾仄陸機傳機好遊權門與賈謐親善以進趣獲譏賈郭郭彰傳彰賈后從舅也與賈充素相親遇賈后専朝彰與參權勢賓客盈門世人稱為賈郭詈臺傅𤣥傳𤣥轉司隸校尉謁者以𢎞訓宫為殿內制元位在卿下𤣥恚怒厲聲色而責謁者謁者妄稱尚書所處𤣥對百僚而罵尚書以下御史中丞庾純奏元不敬訟府孫楚傳楚參石苞驃騎軍事初至長揖曰天子命我參卿軍事因此而嫌隙遂構苞奏楚與吳人孫世山共訕毁時政楚亦抗表自理紛紜經年管仲盜竊說苑鄒子曰管仲故成陰之狗盜也吳起吳起傳起聞魏文侯賢欲事之文侯問李克曰吳起何如人哉李克曰起貪而好色然用兵司馬穰苴不能過也讒陳平陳丞相世家絳侯灌嬰等咸讒陳平曰臣聞平家居時盜其嫂事魏不容亡歸楚歸楚不中又亡歸漢今日大王尊官之令護軍平受諸將金金多者得善處金少者得惡處平反覆亂臣也賈誼傳絳灌東陽侯馮敬之屬盡害之注絳灌周勃灌嬰也孔光漢佞幸傳初丞相孔光為御史大夫時董賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃却入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賓客鈞敵之禮賢歸上聞之喜王戎王戎傳戎與阮籍諸人為竹林之遊戎嘗後至籍曰俗物巳復來敗人意戎笑曰卿輩意亦復易敗耶後以平吳功封安豐侯南郡太守劉肇賂戎筒中細布五十端為司隸所糾帝雖不問然為清慎者所鄙鄒枚鄒陽傳吳王濞陰有邪謀陽奏書諌吳王不內其言于是鄒陽枚乘嚴忌知吳不可說皆去之梁黃香後漢文苑傳黃香年九嵗失母思慕憔悴殆不免喪鄉人稱其至孝太守劉護聞而召之署門下孝子香博學經典究精道術能文章肅宗詔香詣東觀讀所未嘗見書徐幹魏志徐幹字偉長魏文帝書偉長懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇成一家之業辭義典雅足傳於後敬姜國語公父文伯退朝朝其母方績文伯曰以歜之家而主猶績懼干季孫之怒也敬姜歎曰昔聖王之處民也擇瘠土而處之勞其民而用之男女效績愆則有辟古之制也敦書左傳晉侯搜于被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣說禮樂而敦詩書孫武孫子傳孫武以兵法見吳王闔廬闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可弸中彪外揚子法言君子言則成文動則成德何以也曰以其弸中而彪外也注弸滿也彪文也楩柟陸賈新語楩柟豫章天下之名木立則為大山衆木之宗仆則為萬世之用序志第五十夫文心者言為文之用心也昔涓子琴心王孫巧心心哉美矣故一本上有夫字用之焉元脫按廣文選補古來文章以雕縟成體豈取騶奭之羣言雕龍也夫宇宙綿邈黎獻紛雜拔萃出類智術而已嵗月飄忽性靈不居騰聲飛實制作而已夫有衍肖貌天地禀性五才一作行擬耳目於日月方聲氣乎風雷其超出萬物亦已靈矣形同草朩之脆名踰金石之堅是以君子處世樹德建言豈好辨哉不得已也豫生七齡乃夢彩雲若錦則攀而採之齒在踰立則嘗夜夢執丹漆之禮器隨仲尼而南行旦而寤乃怡然而喜大哉聖人之難見也乃小子之垂夢歟自生人以來未有如夫子者也敷讚聖旨莫若注經而馬鄭諸儒𢎞之已精就有深解未足立家唯文章之用實經典枝條五禮資之以成六典因之致用君臣所以炳煥軍國所以昭明詳其本源莫非一作外經典而去聖久逺文體解散辭人愛竒言貴浮詭飾羽尚畫文繡鞶帨離本彌甚將遂訛濫蓋周書論辭貴乎體要尼父陳訓惡乎異端辭訓之異宜體於要於是搦筆和墨乃始論文詳觀近代之論文者多矣至於一作如魏文述典陳思序書應瑒文論陸機文賦仲治流别𢎞範翰林各照隅隙鮮觀衢路或臧否當時之才或銓品前修之文或泛舉雅俗之旨或撮題篇章之意魏典密而不周陳書辨而無當應論華而疏略陸賦巧而碎亂流别精而少巧梁書作功翰林淺而寡要又君山公幹之徒吉甫士龍之輩泛議文意往往間出並未能振葉以尋根觀瀾而索源不述先哲之誥無益後生之慮蓋文心之作也本乎道師乎聖體乎經酌乎緯變乎騷文之樞紐亦云極矣若乃論文叙筆則囿汪作品别區分原始以表末釋名以章義選文以定篇敷理以舉統上篇以上綱領明矣至於割情析采一作表籠圈條貫摛神性圖風勢苞一作包㑹通閲聲字崇替於時序褒貶於才略怊悵元作怡暢王性凝改於知音耿介於程器長懷序志以馭羣篇下篇以下毛目顯矣位理定名彰乎大易之數其為文用四十九篇而已夫銓序一文為易彌綸羣言為難雖復一作或輕采毛髮深極骨髓或有曲意密源似近而逺辭所不載亦不勝數矣及其品列一作許成文有同乎舊談者非雷同也勢自不可異也有異乎前論者非茍異也理自不可同也同之與異不屑古今擘肌分理唯務折衷按轡文雅之場環絡藻繪之府亦幾乎備矣但言不盡意聖人所難識在瓶管何能矩矱元脫許補茫茫往代既沈一作洗豫聞眇眇來世倘塵彼觀也贊曰生也有涯無涯惟智逐物實難憑性良易傲岸泉石咀嚼文義文果載心余心有寄涓子文選注涓子齊人好餌术隱于宕山著琴心三篇王孫漢藝文志王孫子一篇一曰巧心雕龍見諸子篇騶子注騰聲封禪文蜚英聲騰茂實飾羽見徴聖篇魏文魏文帝集有典論論文論方術陳思陳思王集與楊德祖書僕少小好為文章迄至于今二十有五年矣然今世作者可略而言也應瑒應瑒集有文質論文賦陸機集有文賦流别見頌讃篇翰林隋經籍志翰林論三卷晉著作郎李充撰晉書李充字𢎞度江夏人厯官大著作郎注尚書及周易旨六論釋莊論二篇詩賦雜文二百四十首行于世傳中不言有翰林論而玉海引翰林論亦云𢎞範毛目子華子毛舉其目尚不勝為數也瓶管左傳挈瓶之智注喻小智也莊子秋水篇是直用管窺天文心雕龍輯注卷十
