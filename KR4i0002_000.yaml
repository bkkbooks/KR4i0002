body:
  text: 文心雕龍輯注詩文評類提要臣等謹案文心雕龍輯注十巻國朝黄叔琳撰叔琳有史通訓故補已別著録考宋史藝文志有辛處信文心雕龍注十巻其書不傳明梅慶生復創為之注不過粗具梗槩王維儉踵之而作援据始稍稍加詳叔琳此本葢因二家之注而增損之徴引詮釋頗為賅貫其間如注詮賦篇拓宇字不引顔延年宋郊祀歌而據西京雜記疑為括宇史傳篇班固徴賄事不引劉知㡬史通互証而旁牽陳夀傳覓米之事此類俱不免有所訛舛又楊慎朱謀㙔等妄改之文亦不能有所校正然其疏通證明大致純備較之梅王二注則宏贍多矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文心雕龍輯注原序劉舍人文心雕龍一書葢萟苑之秘寳也觀其苞羅羣籍多所折衷於凡文章利病抉摘靡遺綴文之士茍欲希風前秀未有可舍此而别求津逮者若其使事遣言紛綸葳蕤罕能切究明代梅子庚氏為之疏通證明什僅四三耳畧而弗詳則剙始之難也又句字相㳂既久别風淮雨往往有之雖子庚自謂校正之功五倍於楊用修氏然中間脱訛故自不乏似猶未得為完善之本余生平雅好是書偶以暇日承子庚之綿蕞旁稽博攷益以友朋見聞兼用衆本比對正其句字人事牽率更歴暑寒乃得就緒覆閲之下差覺詳盡矣適雲間姚子平山來藩署因共商付梓方今文治盛隆度越先古海内操竒觚弄柔翰者咸有騰聲飛實之思竊以為劉氏之緒言餘論乃斯文之體要存焉不可一日廢也夫文之用在心誠能得劉氏之用心因得為文之用心於以發聖典之菁英為熈朝之黼黻則是書方將為魚之筌蹄而又况於瑣瑣箋釋乎哉峕乾隆三年嵗次戊午秋九月北平黄叔琳書
