body:
  text: 文心雕龍輯注卷二詹事府詹事加吏部侍郎銜黃叔琳撰明詩第六大舜云詩言志歌永言聖謨所析義巳明矣是以在心為志發言為詩舒文載實其在兹乎詩者持也持人情性三百之蔽義歸無邪持之為訓有符焉爾人禀七情應物斯感感物吟志莫非自然昔葛天氏樂辭云𤣥鳥在曲黃帝雲門理不空綺朱云當作絃至堯有大唐一作章之歌舜造南風之詩觀其二文辭達而巳及大禹成功九序惟歌太康敗德五子咸怨順美匡惡其來久矣自商暨周雅頌圓備四始彪炳六義環深子夏監絢素之章子貢悟琢磨之句故商賜二子可與言詩自王澤殄竭風人輟采春秋觀志諷誦舊章酬酢以為賓榮吐納而成身文逮楚國諷怨則離騷為刺秦皇滅典亦造仙詩漢初四言韋孟首唱匡諫之義繼軌周人孝武愛文柏梁列韻嚴馬之徒屬辭無方至成帝品録三百餘篇朝章國采亦云周備而辭人遺翰莫見五言所以李陵班媫妤見疑於後代也按召南行露始肇半章孺子滄浪亦有全曲暇豫優歌逺見春秋邪徑童謡近在成世閲時取證一作徴則五言久矣又古詩佳麗或稱枚叔其孤竹一篇則傅毅之詞比采一作類而推兩漢之作乎觀其結體散文直而不野婉轉附物怊悵切情實五言之冠冕也至於張衡怨篇清典一作曲從紀閒改可味仙詩緩歌雅有新聲暨建安之初五言騰踊文帝陳思縱轡以騁節王徐應劉望路而爭驅並憐風月狎池苑述恩榮敘酣宴慷慨以任氣磊落以使才造懷指事不求纎密之巧驅辭逐貌唯取昭晰之能此其所同也乃正始明道詩雜仙心何晏之徒率多浮淺唯嵇志清峻阮㫖遙深故能摽焉若乃應璩百一獨立不懼辭譎義貞亦魏之遺直也晉世羣才稍入輕綺張潘左陸比肩詩衢采縟於正始力柔於建安或㭊文以為妙或流靡以自妍此其大略也江左篇製溺乎𤣥風嗤笑徇務之志崇盛亡機之談袁孫巳下雖各有雕采而辭趣一揆莫與爭雄所以景純仙篇挺拔而為俊矣宋初文詠體有因革莊老告退而山水方滋儷采百字之偶爭價一句之竒情必極貌以寫物辭必窮力而追新此近世之所競也故鋪觀列代而情變之數可監撮舉同異而綱領之要可明矣若夫四言正體則雅潤為本五言流調則兩則字從御覽增清麗居宗華實異用唯才所安故平子得其雅叔夜含其潤茂先凝其清景陽振其麗兼善則子建仲宣偏美則太冲公幹然詩有恆裁思無定位隨性適分鮮能通圓若妙識所難其易也將至忽之為易其難也方來至於三六雜言則出自篇什離合之發則明於圖䜟回文所興則道原為始聨句共韻則柏梁餘製巨細或殊情理同致總歸詩囿故不繁云贊曰民生而志詠歌所含興發皇世風流二南神理共契政序相參英華彌縟萬代永耽葛天氏樂詞𤣥鳥在曲吕氏春秋葛天氏之樂三人操牛尾投足以歌八闋一曰載民二曰𤣥鳥三曰遂草朩四曰奮五榖五曰敬天常六曰達帝功七曰依地德八曰總萬物之極雲門周禮大司樂奏黃鐘歌大吕舞雲門以祀天神史黃帝命大容作雲門大卷樂大唐之歌尚書大傳維五紀奏鍾石論人聲及乃鳥獸咸變於前秋養耆老而春食孤子乃勃然韶樂興於大麓之野執事還歸二年􅨳然乃作大唐之歌一作大章漢禮樂志堯作大章南風家語舜彈五弦之琴造南風之詩其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮九序見虞書五子見夏書順美孝經將順其美匡救其惡四始見宗經篇六義毛詩序詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌王澤殄竭班固賦王澤竭而詩不作觀志左傳鄭伯享趙孟於垂隴七子從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志賓榮左傳詩以言志志誣其上而公怨之以為賓榮其能久乎身文左傳言身之文也仙詩史記秦始皇使博士為仙真人詩令樂人弦歌之韋孟漢書韋孟為楚元王傅傅子夷王及孫王戊戊荒淫不遵道孟作詩諷諫柏梁任昉文章緣起七言詩漢武帝柏梁殿聨句嚴嚴助傳助㑹稽吳人嚴夫子子也注夫子嚴忌也藝文志莊夫子賦二十四篇注名忌吳人常侍郎莊忽竒賦十一篇注忽竒者或言莊夫子子或言族家子莊助昆弟也嚴助賦三十五篇馬司馬相如見前成帝品録漢藝文志成帝詔劉向校經傳諸子詩賦每一書巳向輒條其篇目撮其指意録而奏之歌詩二十八家三百一十四篇五言鍾嶸詩品夏歌曰鬱陶乎余心楚辭曰名余曰正則雖詩體未全然是五言之濫觴也逮漢李陵始著五言之句矣李陵詩品漢都尉李陵詩其源出於楚辭文多悽怨者之流陵名家子有殊才生命不諧聲頽身喪使陵不遭辛苦其文亦何能至此偼妤詩品漢偼妤班姬詩其源出於李陵團扇短章辭㫖清捷怨深文綺得匹婦之致侏儒一節可以知其工矣行露誰謂雀無角云云四句皆五言暇豫國語驪姬通於優施欲害申生而難里克優施乃飲里克酒中飲優施起舞曰暇豫之吾吾不如烏烏人皆集於菀巳獨集於枯邪徑漢五行志成帝時歌謡曰邪徑敗良田讒口害善人桂樹華不實黃雀巢其顛故為人所羡今為人所憐枚叔古詩十九首文選注並云古詩蓋不知作者或云枚乘然詩云驅車上東門又云逰戲宛與洛此辭兼東都非盡是乘明矣徐陵玉臺新咏謂青青河畔草西北有髙樓涉江采芙蓉庭中有竒樹迢迢牽牛星東城髙且長明月何皎皎七首是乘作乘字叔孤竹後漢書傅毅字武仲孤竹一篇謂十九首冉冉孤生竹篇也張衡怨篇其辭曰猗猗秋蘭植彼中阿有馥其芳有黃其葩雖曰幽深厥美彌嘉之子云遙我勞如何仙詩緩歌張衡同聲歌素女為我師儀態盈萬方衆夫所希見天老教羲皇建安後漢獻帝紀建安元年春正月癸酉郊祀上帝於安邑大赦天下改元建安下所云文帝陳思王徐應劉俱當時作詩者也文帝陳思詩品魏文帝詩其源出於李陵頗有仲宣之體陳思王植詩源出於國風骨氣竒髙詞采華茂情兼怨雅體被文質粲溢今古卓爾不羣故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣王徐應劉魏志王粲字仲宣徐幹字偉長應瑒字德璉劉楨字公幹魏文帝與吳質書偉長懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣德璉常斐然有述作之意其才學足以著書美志不遂良可痛惜公幹有逸氣但未遒耳五言詩之善者妙絶時倫仲宣續自善於辭賦惜其體弱不足起其文至其所善古人無以逺過正始魏志齊王芳改元正始詩雜仙心言其皆宗老莊何晏典略何晏字平叔鍾嶸曰平叔鴻雁之篇風規見矣嵇晉書嵇康字叔夜鍾嶸曰嵇康詩頗似魏文過為峻切訐直露才傷淵雅之志然託喻清逺良有鍳裁亦未失髙流矣阮晉書阮籍字嗣宗鍾嶸曰阮籍詩其源出於小雅無雕蟲之功而詠懷之作可以陶性靈發幽思言在耳目之內情寄八荒之表洋洋乎㑹於風雅使人忘其鄙近自致逺大頗多感慨之詞厥㫖淵放歸趣難求應璩百一魏志應璩字休璉魏氏春秋齊王芳即位曹爽輔政多違法度璩作百一詩以諷序云時謂爽曰公聞周公巍巍之稱安知百慮有一失乎故以百一名篇張潘左陸詩評序晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沫亦文章之中興也按三張載字孟陽協字景陽亢字季陽王注引張華誤二陸機字士衡雲字士龍兩潘嶽字安仁尼字正叔一左思字太冲𤣥風沈約宋書在晉中興𤣥風獨扇為學窮於柱下博物止乎七篇馳騁文辭義殫於此自建武暨於義熙歷載將百雖綴響聨詞波屬雲委莫不寄言上德託意𤣥珠遒麗之詞無聞焉耳嗤笑干寶晉紀總論學者以莊老為宗而黜六經談者以虛薄為辨而賤名檢當官者以望空為髙而笑勤恪袁晉書袁宏字彥伯有逸才鍾嶸曰彥伯詠史雖文體未遒而鮮明緊健去凡俗逺矣孫晉書孫統字承公弟綽字興公並任誕不羈而善屬文舊注引孫楚楚卒於惠帝初不得為江左也景純臧榮緒晉書郭璞字景純著逰仙詩十四篇宋初宋書仲文始革孫許之風叔源大變太元之氣爰逮宋氏顔謝騰聲靈運之興㑹標舉延年之體裁明密並方軌前哲垂範後昆山水謂顔謝騰聲如選詩逰覽諸作也茂先晉書張華字茂先景陽詩品晉張協詩雄於潘嶽靡於太冲風流調達實曠代之髙手詞彩葱蒨音韻鏗鏘使人味之亹亹不倦子建仲宣詩品王粲詩其源出於李陵發愀愴之詞文秀而質羸在曹劉間别構一體方陳思不足比魏文有餘太冲公幹詩品左思詩其源出於公幹文典以怨頗為精切得諷諭之致雖野於陸機而深於潘嶽謝康樂常言左太冲詩潘安仁詩古今難比三六雜言文章緣起三言詩晉夏侯湛所作六言詩漢谷永作出自篇什摯虞文章流别詩之流也有三言四言五言六言七言九言古詩率以四言為體而時一句二句雜在四言之間後世演之遂以為篇三言者振振鷺鷺于飛之屬是也五言者誰謂雀無角之屬是也六言者我姑酌彼金罍之屬是也七言者交交黃鳥止於桑之屬是也九言者泂酌彼行潦挹彼注兹之屬是也離合文章緣起孔融作四言離合詩圖䜟孔子作孝經及春秋河洛成告備於天有赤虹下化為黃玉長三尺上刻文云寶文出劉季握卯金刀在軫北字禾子天下服合卯金刀為劉禾子為季也回文所興道原為始道原未詳舊注引賀道慶然道慶四言回文之前巳有璇璣圖詩不可謂之始矣唐武后璇璣圖序前秦苻堅時扶風竇滔妻蘇氏名蕙字若蘭滔鎮襄陽絶蘇氏音問蘇氏因織錦為回文五彩相宣縱廣八寸題詩二百餘首計八百餘言縱橫反覆皆為文章又雜體詩序晉傅咸有回文反覆詩二首反覆其文以示憂心展轉也是又在竇妻前聨句見柏梁注樂府第七樂府者聲依永律和聲也鈞天九奏既其上帝葛天八闋爰乃皇時自咸英以降亦無得而論矣至於塗山歌於候人始為南音有娀謡乎飛燕始為北聲夏甲歎於東陽東音以發殷整元作氂思於西河西音以興音聲推移亦不一槩矣匹元作及許改夫庶婦謳吟土風詩官採言樂盲元作育許改被律志感絲篁氣變金石是以師曠覘風於盛衰季札鑒微於興廢精之至也夫樂本心術故響浹肌髓先王慎焉務塞淫濫敷訓胄子必歌九德故能情感七始化動八風自雅聲浸微溺音騰沸秦燔樂經漢初紹復制氏紀其鏗鏘叔孫定其容與於是武德興乎髙祖四時廣於孝文雖摹韶夏而頗襲秦舊中和之響闃其不還暨武帝崇禮始立樂府總趙代之音撮齊楚之氣延年以曼聲協律朱馬以騷體製歌桂華雜曲麗而不經赤鴈羣篇靡而非典河間薦雅而罕御故汲黯致譏於天馬也至宣帝雅頌詩效鹿鳴邇及元成稍廣淫樂正音乖俗其難也如此暨後郊廟惟雜雅章辭雖典文而律非䕫曠至於魏之三祖氣爽才麗宰割辭調音靡節平觀其北上衆引秋風列篇或述酣宴或傷羈戍志不出於淫蕩辭不離於哀思雖三調之正聲實韶夏之鄭曲也逮於晉世則傅𤣥曉音創定雅歌以詠祖宗張華新篇亦充庭萬然杜䕫調律音奏舒雅荀勗改懸聲節哀急故阮咸譏其離聲後人驗其銅尺和樂精妙固表裏而相資矣故知詩為樂心聲為樂體樂體在聲瞽師務調其器樂心在詩君子宜正其文好樂無荒晉風所以稱逺伊其相謔鄭國所以云亡故知季札觀辭不直聼聲而已若夫豔歌婉孌怨志詄絶淫辭在曲正響焉生然俗聼飛馳職競新異雅詠溫恭必缺伸魚睨竒辭切至則拊髀雀躍詩聲俱鄭自此階矣凡樂辭曰詩詩聲曰歌聲來被辭辭繁難節故陳思稱李延年間於增損古辭多者則宜減之明貴約也觀髙祖之詠大風孝武之歎來遲歌童被聲莫敢不協子建士衡咸有佳篇並無詔伶人故事謝絲管俗稱乖調蓋未思也至於斬俞羡長云疑作軒伎疑作岐鼓吹漢世鐃挽雖戎喪殊事而並總入樂府繆襲所致亦有可算焉昔子政品文詩與歌别故略具樂篇以標區界贊曰八音摛文樹辭為體謳吟坰野金石雲陛韶響難追鄭聲易啓豈惟觀樂於焉識禮鈞天九奏史記趙簡子疾寤語大夫曰我之帝所甚樂與百神逰於鈞天廣樂九奏萬舞不類三代之樂其聲動人心葛天八闋見明詩篇咸英樂緯黃帝樂曰咸池帝嚳樂曰六英塗山吕氏春秋禹行功見塗山之女禹未之遇而巡省南土女令妾待禹於塗山之陽作歌曰候人兮猗實始作為南音有娀吕氏春秋有娀氏有二佚女為之九成之臺飲食必以鼓帝令燕往視之嗚若諡隘二女愛而爭搏之覆以玉筐少選發而視之燕遺二卵北飛遂不返二女作歌一終曰燕燕往飛實始作為北音夏甲吕氏春秋夏后氏孔甲田於東陽萯山天大風晦盲孔甲迷惑入於民室主人方乳或曰之子是必有殃后曰以為余子孰敢殃之子長成人幕動拆橑斧斫斬其足孔甲曰嗚呼有疾命矣夫乃作破斧之歌實始為東音殷整吕氏春秋周昭王親將征荆辛餘靡為王右王逰於漢中辛餘靡振王北濟周公乃侯之於西翟殷整甲徙宅西河猶思故處實始作為西音師曠左傳晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功季札左傳吳公子札來聘請觀周樂為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也淫濫樂記流辟邪散狄成滌濫之音作而民淫亂九德漢禮樂志周詩既備而其器用張陳周官具焉朝夕習業以教國子皆學歌九德誦六詩習六舞五聲八音之和故帝舜命䕫曰女典樂教胄子七始禮樂志七始華始肅倡和聲注七始天地四時人之始華始萬物英華之始也以為樂名如六英也王應麟玉海黃鐘林鐘太簇為天地人之始姑洗蕤賓南吕應鐘為四時之始八風易緯八節之風謂之八風左傳夫舞所以節八音而行八風杜注八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而敘其情溺音樂記子夏曰今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也制氏禮樂志漢興樂家有制氏以雅樂聲律世世在太樂官但能紀其鏗鏘鼓舞而不能言其義叔孫禮樂志叔孫通因秦樂人制宗廟樂武德禮樂志武德舞髙祖四年作以象天下樂巳行武以除亂也四時禮樂志四時舞者孝文所作以明示天下之安和也始立樂府禮樂志武帝定郊祀之禮乃立樂府采詩夜誦有趙代秦楚之謳按孝惠二年夏侯寬已為樂府令則樂府之立未必始於武帝也延年漢書佞幸傳李延年善歌為新變聲上欲造樂令司馬相如等作詩頌延年輒承意弦歌所造詩為之新聲曲女弟李夫人産昌邑王繇是貴為協律都尉桂華禮樂志安世樂房中歌十七章其七日桂華赤鴈禮樂志郊祀歌象載瑜十八太始三年行幸東海獲赤鴈作河間薦雅禮樂志河間獻王有雅材以為治道非禮樂不成因獻所集雅樂天子下太樂官常存肄之嵗時以備數然不常御常御及郊廟皆非雅聲汲黯史記樂書武帝得神馬渥窪水中歌曲曰太一貢兮天馬下後伐大宛得千里馬歌詩曰天馬來兮從西極汲黯進曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音耶詩效鹿鳴王褒傳宣帝時天下殷富數有嘉應上頗作歌詩欲興協律之事於是益州刺史王襄欲宣風化於衆庶聞王褒有俊才請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之稍廣淫樂禮樂志成帝時鄭聲尤甚黃門名倡丙彊景武之屬富顯於世貴戚五侯定陵富平外戚之家淫侈過度至與人主爭女樂三祖鍾嶸詩品魏武帝魏明帝詩曹公古直甚有悲凉之句睿不如丕亦稱三祖哀思淫蕩按魏太祖苦寒行北上太行山云云通篇寫征人之苦文帝燕歌行秋風蕭瑟天氣凉云云亦託辭於思婦所謂或傷羈戍辭不離於哀思也他若文帝於譙作孟津諸作則又或述酣宴志不出於淫蕩之證也三調晉樂志有因絲竹金石造歌以被之魏世三調歌辭之類是也又唐樂志曰平調清調瑟調皆周房中曲之遺聲漢世謂之三調又有楚調漢房中樂也與前三調總謂之相和調傅𤣥晉樂志泰始二年詔郊祀明堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章而巳使傅𤣥為之詞云張華晉樂志使郭夏宋識等造正德大豫二舞其樂章張華所作庭萬詩弼風簡兮篇公庭萬舞公羊傳萬者何干舞也何休注干謂楯也能為人扞難而不使害人故聖王貴之以為武樂萬者其篇名杜䕫晉樂志魏武平荆州獲漢雅樂郎河南杜䕫能識舊法以為軍謀祭酒使創定雅樂荀勗阮咸晉樂志荀勗以杜䕫所制律吕校太樂總章鼓吹八音與律吕乖錯乃制古尺作新律吕以調聲韻勗又作新律自謂宫商克諧然論者猶謂勗暗解時阮咸妙達八音論者謂之神解咸常心譏朂新律聲髙以為髙近哀思不合中和每公㑹樂作勗意咸謂之不調以為異巳出咸為始平相後有田父耕於野得周時玉尺勗以校巳所治鐘鼓金石絲竹皆短校一米於此伏咸之妙徴歸好樂無荒詩唐風蟋蟀篇晉風左傳季札觀樂為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也注晉本唐國伊其相謔詩鄭風溱洧篇豔歌樂府古豔歌古辭一曰妍歌缺伸魚睨鮑昭謝見原疏大喜猝至小願所圖魚愕雞睨且悚且慚拊髀雀躍莊子雲將東逰過扶搖之枝而適遭鴻濛鴻濛方將拊髀雀躍而遊詠大風史記髙帝還歸過沛悉召故人父老子弟縱酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自為歌詩曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方歎來遲漢書外戚傳李夫人卒帝思念不巳方士少翁言能致其神乃夜張燈燭設帷帳陳酒肉而令上居他帳遙望見好女如李夫人之貌上愈益相思悲感為作詩曰是邪非邪立而望之偏何姍姍其來遲令樂府諸音家絃歌之軒岐鼓吹崔豹古今注短簫鐃歌軍樂也黃帝使岐伯作漢樂有黃門鼓吹天子以燕樂羣臣短簫鐃歌鼓吹之一章耳漢世鐃挽宋樂志漢鼓吹鐃歌十八曲譙周法訓挽歌者髙帝召田橫至尸鄉自殺從者不敢哭為此歌以寄哀音焉古今注薤露蒿里並喪歌也言人命如薤上之露易晞滅也亦謂人死魂魄歸乎蒿里至孝武時李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之亦呼為挽歌繆襲文章志繆襲字熙伯作魏鼓吹曲及挽歌詮賦第八詩有六義其二曰賦賦者鋪也鋪采摛文體物寫志也昔邵吕覽作召公稱公卿獻詩師針賦傳云登髙能賦可為大夫詩序則同義傳說則異體總其歸塗實相枝幹劉向云明不歌而頌班固稱古詩之流也至如鄭莊之賦大隧士蒍之賦狐裘結言􅠊韻詞自巳作雖合賦體明而未融及靈均唱騷始廣聲貌然賦也者受命於詩人拓疑作括宇於楚辭也於是荀况禮智宋玉風釣爰錫名號與詩畫境六義附庸蔚成大國遂許云當作述客主元作至以首引極聲元脫曹補貌以窮文斯蓋别詩之原始命賦之厥初也秦世不文頗有雜賦漢初詞人順流而作陸賈扣其端賈誼振其緒枚馬同其風王揚騁其勢臯朔元作翔曹改巳下品物畢圖繁積於宣時校閲於成世進御之賦千有餘首討其源流信興楚而盛漢矣夫京殿苑獵述行序志並體國經野義尚光大既履端於倡序亦歸餘於總亂序以建言首引情本亂以理篇迭致文契按那之卒章閔馬元作焉朱改稱亂故知殷人輯頌楚人理賦斯並鴻裁之寰域雅文之樞轄也至於草區禽族庶元作鹿曹改品雜類則觸興致情因變取㑹擬諸形容則言務纎密象其物宜則理貴側附斯又小制之區畛竒巧之機要也觀夫荀結隱語事數自環宋發巧談實始淫麗枚乘免園舉要以㑹新相如上林繁類以成豔賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢元作朋約朱考御覽改以雅贍張衡二京迅發一作拔以宏富子雲甘泉構深瑋之風延夀靈光含飛動之勢凡此十家並辭賦之英傑也及仲宣靡密發端必遒偉長博通時逢壯采太冲安仁䇿勳於鴻規士衡子安底績於流制景純綺巧縟理有餘彥伯梗概情韻不匱亦魏晉之賦首也原夫登髙之㫖蓋覩物興情情以物興故義必明雅物以情觀故詞必巧麗麗詞雅義符采相勝如組織之品朱紫畫繪之著𤣥黃文雖新而有質色雖糅而有本一作儀此立賦之大體也然逐末之儔蔑棄其本雖讀千賦愈惑體要遂使繁華損枝膏腴害骨無貴風軌莫益勸戒此揚子所以追悔於雕蟲貽誚於霧縠者也贊曰賦自詩出分歧異派寫物圖貌蔚似雕畫㭊滯必揚言庸無隘風歸麗則辭翦美稗召公國語召公曰故天子聼政使公卿至於列士獻詩瞽獻典史獻書師針瞍賦矇頌百工諌登髙能賦漢藝文志傳曰不歌而頌謂之賦登髙能賦可以為大夫古詩之流班固兩都賦序賦者古詩之流也鄭莊左傳鄭莊公感潁考叔之言與武姜隧而相見公入而賦大隧之中其樂也融融士蒍左傳晉獻公使士蒍為夷吾城屈不慎填薪焉讓之退而賦曰狐裘尨茸一國三公吾誰適從未融左傳明夷之謙明而未融靈均屈原字史記屈原名平憂愁幽思而作離騷詩人藝文志春秋之後聘問歌詠不行於列國學詩之士逸在布衣而賢人失志之賦作矣括宇西京雜記相如曰賦家之心包括宇宙總覽人物藝文志大儒孫卿及楚臣屈原離讒憂國作賦以風荀况史記荀卿趙人名况著有禮賦智賦宋玉宋玉風賦見文選釣賦見賦苑雜賦藝文志秦時雜賦九篇陸賈藝文志陸賈賦三篇賈誼藝文志賈誼賦七篇枚藝文志枚乘賦九篇馬藝文志司馬相如賦二十九篇王藝文志王褒賦十六篇揚藝文志楊雄賦十二篇臯藝文志枚臯賦百二十篇朔漢書東方朔有皇太子生禖屛風殿上柏柱平樂觀賦成世兩都賦序武宣之世言語侍從之臣時時間作或以抒下情而通諷諭或以宣上德而盡忠孝雍容揄揚著於後嗣亦雅頌之亞也故孝成之世論而録之蓋奏御者千有餘篇興楚成漢吳訥文章辨體古今言賦自騷之外咸以兩漢為古蓋非晉魏以還所及京殿文選兩都二京靈光景福之類是也苑獵上林甘泉長楊羽獵之類是也述行北征東征之類是也序志幽通思𤣥之類是也履端左傳先王之正時也履端於始歸餘於終總亂王逸楚辭注亂理也所以發理詞指總撮其要也極意陳詞文彩紛華然後結括一言以明所起也那之卒章國語閔馬父曰正考父校商之名頌十二篇於周太師以那為首其輯之亂曰自古在昔先民有作溫恭朝夕執事有恪草區禽族藝文志雜禽獸六畜昆蟲賦十八篇雜器械草朩賦三十三篇荀結隱語荀子禮賦注言禮之功用甚大時人莫知故假為隱語問之先王宋發巧談文選宋玉有髙唐賦神女賦好色賦淫麗藝文志揚子曰詩人之賦麗以則詞人之賦麗以淫園漢書枚乘字叔遊梁梁客皆善屬詞賦乘尤髙園苑名賦苑有枚乘園賦上林司馬相如傳相如請為天子遊獵之賦賦奏天子以為郎亡是公言上林廣大侈靡多過其實鵩鳥賈誼傳誼為長沙傳三年有鵩飛入誼舍止於坐隅鵩似梟不祥鳥也誼既以適居長沙長沙卑濕誼自傷悼以為夀不得長乃為賦以自廣洞簫王褒傳太子喜褒所為甘泉及洞簫頌令後宫貴人左右皆誦讀之兩都後漢書班固字孟堅上兩都賦盛稱洛邑制度之美二京後漢書張衡字平子永元中天下承平日久自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諫甘泉漢書揚雄字子雲正月從上甘泉還奏甘泉賦以風靈光後漢書王逸子延夀字文考逰魯作靈光殿賦蔡雍亦造此賦未成及見延夀所為遂輟翰仲宣偉長魏志王粲字仲宣徐幹字偉長文選曹子建與楊德祖書曰昔仲宣獨步於漢南偉長擅名於青土太冲臧榮緒晉書左思字太冲欲作三都賦乃詣著作郎張載訪岷卭之事遂搆思十稔門庭藩溷皆著紙筆得句即疏之賦成張華見而咨嗟都邑豪貴競相傳寫安仁晉書潘嶽字安仁弱冠辟司空太尉府舉秀才髙步一時所著有耕藉射雉西征秋興閒居懷舊諸賦士衡臧榮緒晉書陸機字士衡與弟雲勤學聲溢四表機妙解情理作文賦子安晉書成公綏字子安少有俊才口吃張華一見甚善之時人以貧賤不重其文仕至中臺郎著有嘯賦景純郭璞字景純晉中興書曰璞以中興王宅江外乃著江賦述川瀆之美彥伯晉陽秋袁宏字彥伯賦苑有袁彥伯東征賦讀千賦桓談新論余素好文見子雲善為賦欲從之學子雲曰能讀千首賦則善為之矣雕蟲霧縠揚子法言或問吾子少好賦曰然童子雕蟲篆刻俄而曰壯夫不為也或曰霧縠之組麗曰女工之蠧矣頌讚第九四始之至頌居其極頌者容也所以美盛德而述形容也昔帝嚳之世咸墨為頌以歌九韶自商巳下文理允備夫化偃一國謂之風風正四方謂之雅容告神明謂之頌風雅序人事兼變正頌主告神義必純美魯國元脫曹補以公旦次編商人以前王追録斯乃宗廟之正歌非宴饗之常詠也時邁一篇周公所製哲人之頌規式存焉夫民各有心勿壅惟口晉輿元作興曹改之稱原田元作由曹改魯民之刺裘鞸直言不詠短辭以諷丘明子髙並諜為誦斯則野誦之變體浸被乎人事矣及三閭橘頌情采芬芳比類寓意又覃及細物矣至於秦政刻文爰頌其德漢之惠景亦有述容㳂世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯武仲之美顯宗史岑之述熹元作僖曹改后或擬清廟或範駉那雖淺深不同詳略各異其褒德顯容典章一也至於班傅之北征西巡元作逝變為序引豈不褒過而謬體哉馬融之廣成上林疑作東巡雅而似賦何弄文而失質乎又崔瑗文學蔡雍樊渠並致美於序而簡約乎篇摯虞品藻頗為精核至云雜以風雅而不變㫖趣徒張虛論有似黃白之僞說矣及魏晉辨頌鮮有出轍陳思所綴以皇子為標陸機積篇惟功臣最顯其褒貶雜居固末代之訛體也原夫頌惟典雅辭必清鑠敷寫似賦而不入華侈之區敬慎如銘而異乎規戒之域揄揚以發藻汪洋以樹義一作儀唯纎曲巧致與情而變其大體所底如斯而巳讚者明也助也二字從御覽增昔虞舜之祀樂正重讚蓋唱發之辭也及益讚於禹伊陟讚於巫咸並揚言以明事􅀈歎以助辭也故漢置鴻臚以唱拜為讚即古之遺語也至相如屬筆始讚荆軻及遷史固書託讚褒貶約文以總録頌體以論辭又紀傳後元作侈朱考御覽改評亦同其名而仲治流别謬稱為述失之逺矣及景純注雅動植必讚一作讚之從御覽改義兼美惡亦猶頌之變耳然本其為義本字從御覽增事生奬歎所以古來篇體促而不廣一作曠從御覽改必結言於四字之句盤桓乎數韻之辭約舉以盡情昭灼以送文此其體也發源雖逺而致用蓋寡大抵所歸其頌家之細條乎贊曰容體底頌勳業垂讚鏤彩摛文聲理有爛年積逾逺音徽如旦降及品物炫辭作玩咸墨墨應作黑吕氏春秋帝嚳命咸黑作為聲歌九招六列六英變正詩序王道衰政教失而變風變雅作矣頌主告神詩大序頌者美盛德之形容以其成功告於神明者也公旦詩傳成王賜魯天子之禮樂以祀周公故有魯頌商人詩序商頌那祀成湯也烈祖祀中宗也𤣥鳥祀髙宗也長發大禘也殷武祀髙宗也皆前代祭祀宗廟之樂時邁國語周文公之詩曰載輯干戈載櫜弓矢我求懿德肆於時夏允王保之韋昭注文公周公旦之諡也頌時邁之詩武王既伐紂周公為作此詩巡守告祭之樂歌壅口國語民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何原田左傳晉侯聼輿人之頌曰原田每每舍其舊而新是謀裘鞸孔叢子子順曰先君初相魯魯人謗頌之曰麛裘而芾投之無戾芾而麛裘投之無郵吕氏春秋同芾作鞸髙誘注鞸小兒此子順述孔子之事非子髙也子髙孔穿之子三閭橘頌離騷序屈原與楚同姓仕於懷王為三閭大夫著九章內一篇曰橘頌秦政史記秦始皇者名政東行郡縣上鄒嶧山立石與魯諸儒生議刻石頌秦德惠景漢藝文志李思孝景皇帝頌十五篇表充國趙充國傳充國字翁孫功德與霍光等列畫未央宫成帝時西羌嘗有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之序戴侯後漢書竇融字周公光武八年與大軍㑹髙平封安豐侯卒諡戴文章流別有班固安豐戴侯頌美顯宗後漢書傅毅字武仲追美孝明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇述熹后文選注范曄後漢書曰王莽末沛國史岑字孝山以文顯文章志七志並載岑出師頌而集林又載岑和熹鄧后頌計莽末以訖和熹百有餘年又東觀漢記東平王蒼上光武中興頌明帝問校書郎此與誰等對曰前世史岑之比斯則莽末史岑明帝時巳云前世不得為和熹之頌明矣蓋有二史岑字子孝者仕王莽字孝山者當和熹書典散亡未詳爵里諸家遂以孝山之文載於子孝之集班傅後漢書竇憲遷大將軍以傅毅為司馬班固為中護軍憲府文章之盛冠於當世毅所著詩賦誄頌諸作凡二十八篇固所著賦銘誄頌諸作凡四十一篇馬融馬融傳融字季長鄧太后臨朝鄧隲兄弟輔政俗儒世士以文德可興武功宜廢融以為文武之道聖賢不墜五材之用無或可廢上廣成頌以諷諫太后怒遂令禁錮之安帝親政出為河間王長史時車駕東巡岱宗融上東巡頌召拜郎中崔瑗崔瑗傳瑗所著賦碑銘針頌七蘇南陽文學官志歎辭移社文悔祈草書藝七言凡五十七篇其南陽文學官志諸能為文者皆自以弗及樊渠蔡雍樊惠渠頌略曰陽陵縣東土氣辛螫嘉榖不植而涇水長流京兆尹樊君諱陵字德雲遂樹柱纍石委薪積土基跂工堅清流浸潤昔日鹵田化為甘壤農民熙怡悅豫謂之樊惠渠云摰虞摰虞傳虞字仲洽撰古文章類聚區分為三十卷名曰流别集各為之論辭理愜當為世所重雜以風雅文章流别論揚雄充國頌頌而似雅傅毅顯宗頌雜以風雅之意馬融之廣成上林純為今賦之體而謂之頌黃白僞說吕氏春秋相劔者曰白所以為堅也黃所以為牣也黃白雜則堅且牣良劔也難者曰黃白雜則不堅且不牣焉得為利劔也陳思曹植字子建封陳思王集有皇子生頌陸機陸機集有漢髙祖功臣頌樂正重讚尚書大傳舜為賔客禹為主人樂正進贊曰尚考大室之義唐為虞賓至今衍於四海成禹之變垂於萬世之後於是俊乂百工相和而歌慶雲益贊於禹見書大禹謨篇伊陟書在太戊時則有若伊陟臣扈格於上帝巫咸乂王家注伊陟伊尹之子巫氏咸名史記封禪書伊陟贊巫咸鴻臚漢書注鴻聲也臚傳也所以傳聲贊導九賓也相如文章緣起司馬相如荆軻贊世巳不傳厥後班孟堅漢史以論為贊至宋范曄更以韻語謬稱為述漢書注顔師古曰史遷云為某事作某本紀某列傳班固謙不敢言作而改言述蓋避作者之謂聖而取述者之謂明也但後之學者不曉此為漢書敘目見有述字乃呼為漢書述失之逺矣摰虞尚有此惑其餘曷足怪乎景純注雅郭璞傳璞字景純注釋爾雅别為音義圖譜祝盟第十天地定位祀遍羣神元作臣朱改六宗既禋三望咸秩甘雨和風是生黍稷兆民所仰美報興焉犧盛惟馨本於明德祝史陳信資乎文辭昔伊耆元作祁柳改始蠟以祭八神其辭云土反元作及許改其宅水歸其壑昆蟲無作草朩歸其澤則上皇祝文爰在兹矣舜之祠田云荷此長耜耕彼南畝四海俱有利民之志頗形於言矣至於商履聖敬日躋𤣥牡告天以萬方罪巳即郊禋之詞也素車禱旱以六事責躬則雩禜之文也及周之大祝掌六祝之辭是以庶物咸生陳於天地之郊旁作穆穆唱於迎日之拜夙興夜處言於祔廟之祝多福無疆布於少牢之饋宜社類禡莫不有文所以寅䖍許補於神祗嚴恭於宗廟也春秋巳下黷祀諂祭祝幣史辭靡神不至至於張老成室致善於歌哭之禱蒯聵臨戰獲佑於筋骨之請雖造次顛沛必於祝矣若夫楚辭招魂可謂祝辭之組纚也漢之羣祀肅其㫖一作百禮既總碩儒之儀亦參方士之術所以祕祝移過異於成湯之心侲子驅疫元作歐疾王改同乎越巫之祝禮失之漸也至如黃帝有祝邪之文東方朔有罵鬼之書於是後之譴呪務於善罵唯陳思誥咎元脫曹補裁以正義矣若乃禮之祭祀事止告饗而中代祭文兼讚言行祭而兼讚蓋引神而作也又漢代山陵哀䇿流文周喪盛姬內史執䇿然則䇿本書贈因哀而為文也是以義同於誄而文實告神誄首而哀末頌體而祝一作呪儀太史所作之讚因周之祝文也凡羣言發華而降神務實修辭立誠在於無愧祈禱之式必誠以敬祭奠之楷宜恭且哀此其大較也班固之祀濛山祈禱之誠敬也潘嶽之祭庾婦奠祭之恭哀也舉彚而求昭然可鑒矣盟者明也騂旄白馬珠盤玉敦陳辭乎方明之下祝告於神明者也在昔三王詛盟不及時有要誓結言而退周衰屢盟以及要契始之以曹沫終之以毛遂及秦昭盟夷設黃龍之詛漢祖建侯定山河之誓然義存則克終道廢則渝始崇替在人呪何預焉若夫臧洪歃辭氣截雲霓劉琨鐵誓精貫霏霜而無補於晉漢反為仇讐故知信不由衷盟無益也夫盟之大體必序危機奬忠孝共存亡戮心力祈幽靈以取鑒指九天以為正感激以立誠切至以敷辭此其所同也然非辭之難處辭為難後之君子宜在殷鑒忠信可矣無恃神焉贊曰毖祀欽明祝史惟談立誠在肅修辭必甘季代彌飾絢言朱藍神之來格所貴無慚六宗書禋於六宗孔安國傳一四時二寒暑三日四月五星六水旱漢郊祀志注六宗星辰風伯雨師司中司命一說云乾坤六子又一說天宗三日月星辰地宗三泰山河海或曰天地間遊神也三望左傳僖公三十一年卜郊不從乃免牲猶三望注望祭山川也伊耆禮記郊特牲伊耆氏始為蠟蠟也者嵗十二月合聚萬物而索饗之也八神先嗇一司嗇二百種三農四郵表畷五貓虎六坊七水庸八聖敬日躋詩商頌長發篇𤣥牡見書湯誓素車尸子湯之救旱也素車白馬布衣身嬰白茅以身為牲禱曰政不節與民失職與苞苴行與讒夫昌與宫室崇與女謁盛與雩禜左傳龍見而雩注旱祭也又曰雪霜風雨之災則禜之說文禱雨為雩禱晴為禜太祝周禮春官太祝掌六祝之辭以事鬼神曰順祝年祝吉祝化祝瑞祝策祝庶物迎日大戴禮孝昭冠辭皇皇上天照臨下土庶物羣生各得其所靡今靡古維豫一人某敬拜皇天之祜又曰明光於上下勤施於四方旁作穆穆維豫一人某敬拜迎於郊以正月朔日迎日於東郊祔廟儀禮明日以其班祔用嗣尸曰孝子某孝顯相夙興夜處小心畏忌不惰其身不寧用尹祭嘉薦普淖普薦溲酒適爾皇祖某甫以隮祔爾孫某甫多福無疆儀禮少牢饋食禮主人酳尸尸酢主人祝嘏主人曰皇尸命工祝承致多福無疆於汝孝孫宜社王制天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰注宜祭名類禡詩是類是禡傳師祭也類於上帝禡於所征之地張老成室檀弓晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯蒯聵左傳衛太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事祕祝漢郊祀志文帝詔曰祕祝之官移過於下朕甚弗取其除之侲子後漢禮儀志大儺謂之逐疫選中黃門子弟十嵗以上十二以下百二十人為侲子越巫郊祀志粵人勇之言粵人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼夀百六十嵗後世怠嫚故衰耗武帝乃命粵巫立粵祝祠祝邪山海經東望山有獸名白澤能言語王者有德明照幽逺則至軒轅記帝於桓山得白澤神獸能言達於萬物之情因問天地鬼神之事帝令寫為圖作祝邪之文以祝之罵鬼王延夀夢賦序云臣遂得東方朔與臣作罵鬼之書按朔與延夀隔世久逺或朔本有書延夀得之則可曰與臣作謬矣倘作書亦是夢中事便無所不可然彥和又豈以烏有為實録乎非後人傳寫之誤即前代有傅㑹失實者誥咎曹子建誥咎文序五行致災先史咸以為應政而作天地之氣自有變動未必政治之所興致也於時大風發屋拔朩意有感焉聊假上帝之命以誥咎祈福哀策文章緣起漢樂安相李尤作和帝哀策執策穆天子傳天子西至於重璧之臺盛姬告病天子哀之於是觴祀而哭內史執策注策所以書贈賻之事祭庾婦潘嶽集有為諸婦祭庾新婦文騂旄左傳瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟注赤牛也白馬漢書王陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之珠盤玉敦周禮天官玉府若合諸侯則共珠盤玉敦方明漢律歷志太甲元年以冬至越茀祀先王於方明注才明者神明之象也以木為之方四尺畫六采東青西白南赤北黑上𤣥下黃詛盟榖粱傳詛盟不及三王結言公羊傳古者不盟結言而退要契左傳使王叔氏與伯輿合要王叔氏不能舉其契注要合要辭理曲無以為答故不能舉其契要之辭曹沫國語曹沫為魯將三北魯莊公與齊桓公㑹於柯而盟沫執匕首劫桓公於壇盡歸魯之侵地毛遂史記秦圉邯鄲平原君求救於楚議日中不决毛遂按劔歷階而上曰從之利害兩言而决合從者為楚非為趙也楚王曰唯唯遂謂左右曰取雞狗馬之血來遂奉銅盤而跪進之楚王曰王當歃血次者吾君次者遂遂定從於殿上秦昭常璩巴志秦昭襄王與夷人刻石盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾山河史記髙祖功臣年表封爵之誓曰黃河如帶泰山如礪國以永寧爰及苗裔臧洪臧洪傳洪字子源太守張超請為功曹時董卓圖危社稷超與洪西至陳留見兄邈計事邈與語大異之邈先有謀約㑹超至定議乃與諸牧守大㑹酸棗設壇場將盟既而莫敢先登咸共推洪洪升壇歃血辭氣慷慨聞其言者無不激揚劉琨劉琨傳琨字越石建武元年琨與假匹磾期討石勒匹磾推琨為大都督歃血載書檄諸方守俱集襄國琨匹磾進屯固安以俟衆軍匹磾從弟末波納勒厚賂獨不進乃沮其計琨匹磾以勢弱而退文心雕龍輯注卷二
