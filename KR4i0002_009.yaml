body:
  text: 文心雕龍輯注卷九詹事府詹事加吏部侍郎銜黃叔琳撰指瑕第四十一管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固匪難以之垂文可不慎歟古來文才異世爭驅或逸才以爽迅或精思以纎密而慮動難圓鮮無瑕病陳思之文羣才之俊也而武帝誄云尊靈永蟄明帝頌云聖體浮輕浮輕有似於胡蝶永蟄頗疑於昆蟲施之尊極豈其當乎左思七諷說孝而不從反道若斯餘不足觀矣潘嶽為才善於哀文然悲內兄則云感口澤傷弱子則云心如疑禮文在尊極而施之下流辭雖足哀義斯替矣若夫君子擬人必於其倫而崔瑗之誄李公比行於黃虞向秀之賦嵇生方罪於李斯與其失也雖寧僣元作降孫改無濫然高厚之詩不類甚矣凡巧言易摽拙辭難隱斯言之玷實深白圭繁例難載故略舉四條若夫立文之道惟字與義字以訓正義以理宣而晉末篇章依希其旨始有賞際竒至之言終無撫叩酬即謝云當作酢之語每單舉一字指以為情夫賞訓錫賚豈關心解撫訓執握何預情理雅頌未聞漢魏莫用懸領似如可辨課文了不成義斯實情訛之所變文澆之致弊而宋來才英未之或改舊染成俗非一朝也近代辭人率多猜忌至乃比語求蚩反音取瑕雖不屑於古而有擇於今焉又製同他文理宜刪革若排王本作掠人美辭以為已力寶玉大弓終非其有全寫則揭篋傍采則探囊然世逺者太輕時同者為尤矣若夫注解為書所以明正事理然謬於研求或率意而斷西京賦稱中黃育獲之疇而薛綜謬注謂之閹尹是不聞執雕虎之人也又周禮井賦舊有匹馬而應劭釋匹或量首數蹄斯豈辨物之要哉原夫古之正名車兩而馬匹匹元脫楊補兩稱目以並耦為用蓋車二佐乘馬儷驂服服乘不隻故名號必雙名號一正則雖單為匹矣匹夫匹婦亦配義矣夫車馬小義而歷代莫悟辭賦近事而千里致差況鑽灼經典能不謬哉夫辨言一作匹而數筌一作首蹄選勇而驅閹尹失理太甚故舉以為戒丹青初炳而後渝文章嵗久而彌光若能櫽括於一朝可以無慚於千載也贊曰羿氏舛射東野敗駕雖有俊才謬則多謝斯言一玷千載弗化令章靡疚亦善之亞管仲言管子戒篇管仲復於桓公曰無翼而飛者聲也無根而固者情也陳思陳思王集武帝誄幽闥一扃尊靈永蟄冬至獻襪頌翺翔萬域聖體浮輕口澤禮玉藻父沒而不能讀父之書手澤存焉爾毋沒而杯圈不能飲焉口澤之氣存焉爾如疑檀弓孔子觀送葬者曰善哉為喪乎其往也如慕其反也如疑潘嶽金鹿哀辭將反如疑回首長顧金鹿嶽幼子也方罪李斯向秀傳嵇康被誅秀作思舊賦云昔李斯之受罪兮歎黃犬而長吟悼嵇生之永辭兮顧日影而彈琴寧僣無濫左傳蔡聲子曰歸生聞之善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫不類左傳晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊高厚之詩不類寶玉大弓春秋盜竊寶玉大弓左傳杜氏注盜謂陽虎也寶玉夏后氏之璜大弓封父之繁弱胠篋探囊莊子將為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍此世俗之所謂知也中黃育獲李善文選注尸子曰中黃伯曰余左執太行之獶而右搏雕虎戰國策范雎說秦王曰烏獲之力焉而死夏育之勇焉而死井賦匹馬周禮小司徒經上地而井牧其田野注井十為通通為匹馬疏三十家出馬一匹應劭釋匹應劭風俗通或曰馬夜行目明照前四丈故曰一匹或曰度馬縱橫適得一匹漢食貨志布帛長四丈為匹車二佐乘禮少儀乘二車則式佐車則否注二車朝祀之副車也佐車戎獵之副車也又二車者諸侯七乘云云馬儷鄭風大叔于田兩驂如舞兩服上襄雖單為匹左傳匹夫無罪注正義曰士大夫以上則有妾媵庶人惟夫妻相匹其名既定雖單亦通故韋昭通謂之匹夫匹婦也接易中孚象曰馬匹亡謂四與初絶如馬之亡其匹也可證訓匹之義正與匹夫匹婦一例配義爾雅釋詁匹合也疏匹者配合也羿氏舛射帝王世紀帝羿有窮氏與吳賀北遊賀使羿射雀左目誤中右目羿抑首而愧終身不忘敗駕莊子東野稷以御見莊公進退中繩左右旋中規莊公以為文弗過也使之鉤百而反顔闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗多謝郭象莊子注不可多謝堯舜而推之為兄也養氣第四十二昔王充著述制養氣之篇驗已而作豈虛造哉夫耳目鼻口生之役也心慮言辭神之用也率志委和則理融而情暢鑽礪過分則神疲而氣衰此性情之數也夫三皇辭質心絶於道華帝世始文言貴於敷奏三代春秋雖㳂世彌縟並適分胸臆非牽課才外也戰代枝詐攻竒飾說漢世迄今辭務日新爭光鬻采慮亦竭矣故淳言以比澆辭文質懸乎千載率志以方竭情勞逸差於萬里古人所以餘裕後進所以莫遑也凡童少鑒淺而志盛長艾識堅而氣衰志盛者思鋭以勝勞氣衰者慮密以傷神斯實中人之常資嵗時之大較也若夫器分有限智用無涯或慚鳧企鶴瀝辭鐫思於是精氣內銷有似尾閭之波神志外傷同乎牛山之木怛惕之盛一作成疾亦可推矣至如仲任置硯以綜述叔元作敬孫無撓改通懷筆以專業既暄之以嵗序又煎之以日時是以曹公懼為文之傷命陸雲歎用思之困神非虛談也夫學業在勤功庸弗怠故有錐股自厲和熊以苦之人志於文也則申寫鬱滯故宜從容率情優柔適㑹若銷鑠精膽蹙迫和氣秉牘以驅齡灑翰以伐性豈聖賢之素心㑹文之直理哉且夫思有利鈍時有通塞沐則心覆且或反常神之方昏再三愈黷是以吐納文藝務在節宣清和其心調暢其氣煩而即捨勿使壅滯意得則舒懷以命筆理伏則投筆以卷懷逍遙以針勞談笑以藥倦常弄間於才鋒賈餘於文勇使刃發如新凑理無滯雖非胎息之邁術斯亦衛氣之一方也贊曰紛哉萬象勞矣千想元神宜寶素氣資養水停以鑒火靜而朗無擾文慮鬱此精爽養氣王充論衡自紀篇章和二年罷州家居年漸七十乃作養性之書凡十六篇養氣自守適食則酒閉明塞聰愛精自保適輔服藥引導庶冀性命可延斯須不老長艾曲禮五十曰艾慙鳧企鶴莊子鳧脛雖短續之則憂鶴脛雖長斷之則悲尾閭莊子北海若曰天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時巳而不虛注尾閭海東川名置硯謝承後漢書王充於宅內門戶牆柱各置筆硯簡牘見事而作著論衡懷筆曹褒傳褒字叔通博雅疏通常憾朝廷制度未備慕叔孫通為漢禮儀晝夜研精沈吟專思寢則懷抱筆札行則誦習文書當其念至忘所之適用思困神陸雲與兄平原書兄文章已自行天下多少無所在且用思困人亦不事復及錐股戰國策蘇秦乃發書陳篋數十得太公陰符伏而誦之讀書欲睡引錐自刺其股驅齡伐性王充效力篇秦武王與孟說舉鼎不任絶脈而死少文之人與董仲舒等涌胸中之思必將不任有絶脈之變王莽之時省五經章句皆為二十萬博士弟子郭路夜定舊說死於燭下精思不任絶脈氣滅也心覆左傳晉侯之豎頭須求見公辭焉以沐謂僕人曰沐則心覆心覆則圗反宜吾不得見也僕人以告公遽見之節宣左傳節宣其氣賈餘左傳齊髙固曰欲勇者賈余餘勇腠理吕氏春秋伊尹曰用新去陳腠理遂通髙誘曰腠理肌脉也胎息漢武內傳王真習閉氣而吞之名曰胎息行之斷榖一百餘年肉色光美力並數人抱朴子胎息者能以鼻口噓吸如在胎之中宋史藝文志有卧龍隱者胎息歌一卷水停莊子水靜則明燭須眉精爽左傳心之精爽是謂魂魄附㑹第四十三何謂附㑹謂總文理統首尾定與奪合涯際彌綸一篇使雜而不越者也若築室之須基構裁衣之待縫緝矣大才量學文宜正體製必以情志為神明事義為骨髓辭采為肌膚宫商為聲氣然後品藻𤣥黃摛振金玉獻可替否以裁厥中斯綴思之恆數也凡大體文章類多枝派整派者依源理枝者循幹是以附辭㑹義務總綱領驅萬塗於同歸貞百慮於一致使衆理雖繁而無倒置之乖羣言雖多而無棼絲之亂扶陽而出條順陰而藏跡首尾周密表裏一體此附㑹之術也夫畫者謹髮而易貌射者儀毫而失牆鋭精細巧必疏體統故宜詘寸以信尺枉尺以直尋棄偏善之巧學具美之績此命篇之經略也夫文變多汪作無方意見浮雜約則義孤博則辭叛率故多尤需為事賊且才分不同思緒各異或製首以通尾或尺一作片接以寸附然通製者蓋寡接附者甚衆若統緒失宗辭味必亂義脈不流則偏枯文體夫能懸識湊理然後節文一作文節自㑹如膠之粘木豆之合黃矣是以駟牡異力而六轡如琴並駕齊驅而一轂統輻馭文之法有似於此去留隨心修短在手齊其步驟總轡而已故善附者異㫖如肝膽拙㑹者同音如胡越改章難於造篇易字艱於代句此已然之驗也昔張湯擬奏而再却虞松草表而屢譴並理事之不明而詞㫖之失調也及倪寬更草鍾㑹易字而漢武歎竒晉景稱善者乃理得而事明心敏而辭當也以此而觀則知附㑹巧拙相去逺哉若夫絶筆斷章譬乘舟之振楫㑹詞切理如引轡以揮鞭克終底績寄深寫逺若首唱榮華而媵句憔悴則遺勢鬱湮餘風不暢此周易所謂臀無膚其行次且也惟首尾相援則附㑹之體固亦無以加于此矣贊曰篇統間關情數稠疊原始要終疏條布葉道味相附懸緒自接如樂之和心聲克協儀毫吕氏春秋處方篇今夫射者儀毫而失牆畫者儀髮而失貌言審本也詘寸文子老子曰屈寸而伸尺小枉而大直聖人為之率故多尤文賦或率意而寡尤事賊左傳需事之賊也偏枯吕氏春秋魯公孫悼曰我固能治偏枯懸識扁鵲傳扁鵲過齊桓侯客之入朝見曰君有疾在腠理不治將深總轡家語善御馬者正身以總轡同音賈誼傳胡粵之人生而同聲及其長而成俗纍數譯不能相通行有雖死而不相為者則教習然也歎竒兒寬傳張湯為廷尉有疑奏已再見郤矣掾史莫知所為寬為言其意掾史因使寬為奏奏成即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯言兒寬上曰吾固聞之久矣稱善世說司馬景王命中書虞松作表再呈不可鍾㑹取視為定五字松悅服以呈景王王曰不當爾耶如樂左傳如樂之和無所不諧總術第四十四今元作令商改之常言有文有筆以為無韻者筆也有韻者文也夫文以足言理兼詩書别目兩名自近代耳顔延年以為筆之為體言之文也經典則言而非筆傳記則筆而非言請奪彼矛還攻其楯矣何者易之文言豈非言文若筆不言文不得云經典非筆矣將以立論未見其論立也豫以為發口為言屬筆曰翰常道曰經述經曰傳經傳之體出言入筆筆為言使可强可弱分疑有脫誤經以典奧為不刋非以言筆為優劣也昔陸氏文賦號為曲盡然泛論纖悉而實體未該故知九變之貫元作實楊改匪窮元作躬孫改知言之選難備矣凡精慮造文各競新麗多欲練辭莫肯研術落落之玉或亂乎石碌碌之石時似乎玉精者要約匱者亦鮮博者該贍蕪元作無朱改者亦繁辨者昭晳淺者亦露奧者復隱詭者亦典或義華而聲悴或理拙而文澤知夫調鐘未易張琴實難伶人告和不必盡窕槬桍字衍之中動用揮扇何必窮初終之韻魏文比篇章於音樂蓋有徴矣夫不截盤根無以驗利器不剖文奧無以辨通才才之能通必資曉術自非圓鑒區域大判條例豈能控引情元作清源制勝文苑哉是以執術馭篇似善奕之窮數棄元作築術任心如博塞之邀遇故博塞之文借巧儻來雖前驅有功而後援難繼少既無以相接多亦不知所刪乃多少之並元作非許改惑何妍蚩之能制乎若夫善奕之文則術有恆數按部整伍以待情㑹因時順機動不失正數逢其極機入其巧則義味騰躍而生辭氣叢雜而至視之則錦繪聽之則絲簧味之則甘腴佩之則芬芳斷章之功於斯盛矣夫驥足雖駿纆元作纒許改牽忌長以萬分一纍且廢千里況文體多術共相彌綸一物攜二莫不解體所以列在一篇備總情變譬三十之輻共成一轂雖未足觀亦鄙夫之見也贊曰文場筆苑有術有門務先大體鑑必窮源乘一總萬舉要治繁思無定契理有恆存曲盡文賦序他日殆可謂曲盡其妙九變漢武帝詔詩云九變復貫知言之選玉石老子法本不欲琭琭如玉落落如石窕槬左傳周景王將鑄無射伶州鳩曰夫音樂之輿也而鐘樂之器也窕則不減槬則不容今鐘槬矣魏文魏文帝典論論文文以氣為主氣之清濁有體不可力彊而致譬之音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能移其子弟盤根虞詡傳不遇槃根錯節何以别利器乎博塞許慎說文博局戲也六箸十二棋也又行棊相塞曰博塞儻來莊子軒冕在身非性命也物之儻來寄也纆牽戰國策段干越謂韓相新城君曰昔王良弟子駕千里之馬過京父之弟子京父之弟子曰馬千里之馬也服千里之服也而不能取千里何也曰子纆牽長故纆牽於事萬分之一也而難千里之行三十之輻考工記輪輻三十以象日月也時序第四十五時運交移質文代變古今情理如可言乎昔在陶唐德盛化鈞野老吐何力之談郊童含不識之歌有虞繼作政阜民暇薰風詩於元后爛雲歌於列臣盡其美者何乃心樂而聲泰也至大禹敷土九序詠功成湯聖敬猗歟作頌逮姬文之德盛周南勤而不怨大王之化淳邠風樂而不淫幽厲昏而板蕩怒平王微而黍離哀故知歌謡文理與世推移風動於上而波震於下者春秋以後角戰英雄六經泥蟠百家飇駭方是時也韓魏力政燕趙任權五蠧六蝨嚴於秦令唯齊楚兩國頗有文學齊開莊衢之第楚廣蘭臺之宫孟軻賓館荀卿宰邑故稷下扇其清風蘭陵鬱其茂俗鄒子以談天飛譽騶奭以雕龍馳響屈平聨藻於日月宋玉交彩於風雲觀其艷說則籠罩雅頌故知暐煜之竒意出乎縱橫之詭俗也爰至有漢運接燔書髙祖尚武戲儒簡學雖禮律草創詩書未遑然大風鴻鵠之歌亦天縱之英作也施及孝惠迄於文景經術頗興而辭人勿用賈誼抑而鄒枚沈亦可知已逮孝武崇儒潤色鴻業禮樂爭輝辭藻競騖柏梁展朝宴之詩金堤製恤民之詠徴枚乘以蒲輪申主父以鼎食擢公孫之對策歎兒寬之擬奏買臣負薪而衣錦相如滌器而被繡於是史遷夀王之徒嚴終枚臯之屬應對固無方篇章亦不匱遺風餘采莫與比盛越昭及宣實繼武績馳騁石渠暇豫文㑹集雕篆之軼材發綺縠之高喻於是王褒之倫底祿待詔自元暨成降意圖籍美元作笑玉屑之談元作諫清金馬之路子雲鋭思於千首子政讐校於六藝亦已美矣爰自漢室迄至成哀雖世漸百齡辭人九變而大抵所歸祖述楚辭靈均餘影於是乎在自哀平陵替光武中興深懷圖讖頗略文華然杜篤獻誄以免刑班彪參奏元作表張俊度改以補令雖非旁求亦不遐棄及明帝疊耀崇愛儒術肄禮璧堂講文虎觀孟堅珥筆於國史賈逵給札元作禮張改于瑞元作端張改頌東平擅其懿文沛王振其通論帝則藩儀輝光相照矣自安和已下迄至順桓則有班傅三崔王馬張蔡磊落鴻儒才不時乏而文章之選存而不論然中興之後羣才稍改前轍華實所附斟酌經辭蓋厯政講聚故漸靡儒風者也降及靈帝時好辭製造羲皇之書開鴻都之賦而樂松之徒招集淺陋故楊賜號為歡兜蔡雍比之俳優其餘風遺文蓋蔑如也自獻帝播遷文學蓬轉建安之末區宇方輯魏武以相王之尊雅愛詩章文帝以副君之重妙善辭賦陳思以公子之豪下筆琳琅並體貌英逸故俊才雲蒸仲宣委質於漢南孔璋歸命於河北偉長從宦於青土公幹徇質於海隅德璉綜其斐然之思元瑜展其翩翩之樂文蔚休伯之儔于叔元作子俶德祖之侣傲雅觴豆之前雍容袵席之上灑筆以成酣歌和墨以藉談笑觀其時文雅好慷慨良由世積亂離風衰俗怨並志深而筆長故梗槩而多氣也至明帝纂戎制詩度曲徴篇章之士置崇文之觀何劉羣才迭相照耀少主相仍唯高貴英雅顧盼合章動言成論於時正始餘風篇體輕淡而嵇阮應繆並馳文路矣逮晉宣始基景文克構並跡沈儒雅而務深方術至武帝惟新承平受命而膠序篇章弗簡皇慮降及懷愍綴旒而已然晉雖不文人才實盛茂先搖筆而散珠太沖動墨而橫錦嶽湛曜聨璧之華機雲摽二俊之采應傅三張之徒元作從孫摰成公之屬並結藻清英流韻綺靡前史以為運涉季世人未盡才誠哉斯談可為歎息元皇中興披文建學劉刁禮吏而寵榮景純文敏而優擢逮明帝秉哲元作束晳雅好文㑹升儲御極孳孶講藝練情於誥策振采於辭賦庾以筆才逾親溫以文思益厚揄揚風流亦彼時之漢武也及成康促齡穆哀短祚簡文勃興淵乎清峻微言精理函何本改亟滿𤣥席淡思濃采時灑文囿至孝武不嗣安恭已矣其文史則有袁殷之曹孫于之輩雖才或淺深圭璋足用自中朝貴𤣥江左稱盛因談餘氣流成文體是以世極迍邅而辭意夷泰詩必柱下之㫖歸賦乃漆園之義疏故知文變染乎世情興廢繫乎時序原始以要終雖百世可知也自宋武愛文文帝彬雅秉文之德孝武多才英采雲搆自明帝元脫以下文理替矣爾其縉紳之林霞蔚而飇起王袁聨宗以龍章顔謝重葉以鳯采何范張沈之徒亦不可勝也蓋聞之於世故略舉大較暨皇齊馭寶運集休明太祖以聖武膺籙高祖以睿文纂業文帝以二離含章中宗以上哲興運並文明自天緝遐疑作熙景祚今聖歷方興文思光元作充被海嶽降神才英秀發馭飛龍於天衢駕騏驥於萬里經典禮章跨周轢漢唐虞之文其鼎盛乎鴻風懿采短筆敢陳揚言讃時請寄明哲贊曰蔚映十代辭采九變樞中所動環流無倦質文沿時崇替在選終古雖逺曠注作曖焉如面野老帝王世紀帝堯之世天下太和百姓無事有老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉郊童列子堯治天下五十年不知天下治與不治乃微服遊於康衢聞童謡云立我蒸民莫匪爾極不識不知順帝之則薰風見明詩篇爛雲見通變篇猗歟鄭康成詩譜湯受命定天下後世有中宗髙宗者此三主有受命中興之功時有作詩頌之者商德之壞武王伐紂封紂兄微子啓為宋公七世至戴公時大夫正考父校商之名頌十二篇於周太師以那為首其首章曰猗歟那歟周南詩小序關雎麟趾之化王者之風故繫之周南言化自北而南也邠風詩譜豳者后稷之曽孫曰公劉者自邰而出所徙戎狄之地名至商之末世太王又避戎狄之難而入處於岐陽成王之時周公避流言之難出居東都思公劉太王居豳之職憂念民事至苦之功以比序已志後成王迎而反之太史述其志主於豳公之事故别其詩以為豳國變風焉幽厲詩小序板凡伯刺厲王也蕩召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也平王詩注疏平王東遷政遂微弱不能復雅下列稱風詩黍離章注周既東遷大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去故賦其所見泥蟠班固答賓戲泥蟠而天飛者應龍之神也五蠧六蝨見諸子篇莊衢騶奭傳頗采騶衍之術以紀文齊王嘉之自如淳于髠以下皆命曰列大夫為開第康莊之衢高門大屋尊寵之蘭臺見夸飾篇景差注荀卿荀卿傳卿適楚春申君以為蘭陵令稷下孟子傳自騶衍與齊之稷下先生如淳于髠慎到環淵接子田駢騶奭之徒各著書言治亂之事以干世主豈可勝道哉索隱曰稷齊之城門也謂齊之學士集於稷門之下也談天雕龍見諸子篇燔書秦始皇本紀李斯奏請史官非秦記皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之令下三十日不燒黥為城旦制曰可戲儒酈食其傳騎士曰沛公不喜儒諸客冠儒冠來者沛公輒解其冠溺其中禮律草創漢禮樂志漢興撥亂反正日不暇給猶命叔孫通制禮儀以正君臣之位未盡備而通終律厯志漢興方綱紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊歷比於六歷大風見樂府篇鴻鵠留侯世家上欲易太子留侯諫不聽及燕置酒太子侍東園公甪里先生綺里季夏黃公四人從太子上召戚夫人曰彼四人輔之羽翼已成難動矣戚夫人泣上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翮已就橫絶四海橫絶四海當可奈何雖有矰繳尚安所施文景漢書孝文皇帝高祖中子也孝景皇帝文帝太子也贊曰周云成康漢言文景美矣賈誼賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毁誼曰雒陽之人年少初學專欲擅權紛亂諸事於是天子後亦疏之不用其議以誼為長沙王太傅鄒枚鄒陽見前枚乘傳景帝召拜乘為𢎞農都尉乘久為大國上賓與英俊並游得其所好不樂郡吏以病免官孝武漢武帝紀贊孝武初立表章六經興太學號令文章煥焉可述後嗣得遵洪業而有三代之風柏梁見明詩篇金堤漢溝洫志武帝既封禪發卒數萬人塞瓠子決河上悼功之不成乃作歌卒塞瓠子築宫其上名曰宣防王尊傳河水盛溢泛浸瓠子金堤蒲輪枚乘傳武帝自為太子聞乘名及即位乃以安車蒲輪徴乘鼎食主父偃傳尊立衛皇后及發燕王定國陰事偃有功焉大臣皆畏其口賂遺纍千金人或說偃曰太橫矣主父曰丈夫生不五鼎食死即五鼎烹耳對策見議對篇疑奏見附㑹篇歎竒注負薪朱買臣傳家貧常艾薪樵賣以給食拜㑹稽太守上謂曰富貴不歸故鄉如衣錦夜行今子何如滌器司馬相如傳相如與文君俱之臨卭盡賣車騎買酒舍乃令文君當壚相如身自著犢鼻禈與庸保雜作滌器於市中後為中郎將至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵夀王吾邱夀王傳年少以善格五召待詔後為光祿大夫侍中嚴嚴安傳安臨菑人以故丞相史上書為騎馬令終終軍傳軍少好學以辨博能屬文上書言事武帝異其文拜為謁者給事中枚皋枚皋傳皋不通經術詼笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等而不得比嚴助等得尊官昭漢昭帝紀孝昭皇帝武帝少子也武帝崩即皇帝位宣漢宣帝紀孝宣皇帝武帝曽孫戾太子孫也昭帝崩徴昌邑王王淫亂大臣請廢迎帝即皇帝位石渠見論說篇雕篆見詮賦篇綺縠同上底祿左傳叔向曰底祿以德元漢元帝紀孝元皇帝宣帝太子也宣帝微時生民間宣帝即位立為太子壯大柔仁好儒宣帝崩太子即皇帝位成漢成帝紀孝成皇帝元帝太子也元帝崩即皇帝位金馬滑稽傳東方朔歌曰陸沈於俗避世金馬門千首見詮賦篇六藝漢藝文志劉歆七略有六藝略詳諸子篇哀平漢哀帝紀孝哀皇帝元帝庶孫定陶恭王子也成帝無子立為皇太子成帝崩即皇帝位漢平帝紀孝平皇帝元帝庶孫中山孝王子也哀帝崩即皇帝位光武後漢光武帝紀光武皇帝諱秀長沙定王之後誅王莽復漢圖讖見正緯篇免刑後漢文苑傳杜篤收送京師㑹大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄最高帝美之賜帛免刑參奏班彪傳彪為河西大將軍竇融從事為融畫策事漢及融徴還京師光武問曰所上章奏誰與參之融以彪對召見拜徐令明帝後漢明帝紀孝明皇帝諱莊光武第四子也璧堂璧雍明堂也通鑑明帝永平二年上帥羣臣躬養三老五更於辟雍禮畢上自為下說諸儒執經問難於前冠帶縉紳之士圜橋門而觀聽者以億萬計虎觀見論說篇國史見史傳篇述漢注給札賈逵傳有神雀集宫殿官府帝問逵逵對曰此胡降之徵也帝敕蘭臺給筆札使作神雀頌東平後漢東平憲王傳蒼少好經書雅有智思上光武受命中興頌帝甚善之沛王見正緯篇安和順桓後漢帝紀孝和皇帝諱肇肅宗第四子也孝安皇帝諱祐肅宗孫也孝順皇帝諱保安帝之子也孝桓皇帝諱志肅宗曽孫也班固傅毅三崔駰瑗實王延夀馬融張衡蔡雍俱見前靈帝後漢靈帝紀孝靈皇帝諱宏肅宗𤣥孫也蔡雍傳初帝好學自造羲皇篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈護多引無行趨勢之徒並待制鴻都門下熹陳方俗閭里小事雍上封事曰連偶俗語有類俳優楊賜傳虹霓晝降嘉德殿前賜書對曰鴻都門下招㑹羣小如歡兜共工更相薦說獻帝後漢獻帝紀孝獻皇帝諱協靈帝中子也初封陳留王董卓立之建安二十五年禪于魏贊曰獻生不辰身播國屯蓬轉西征賦飄萍浮而蓬轉魏武魏志太祖武皇帝姓曹諱操字孟德舉孝亷為郎遷丞相封魏王文帝追諡曰武皇帝文帝魏志文皇帝諱丕字子桓武帝太子也建安十六年為五官中郎將副丞相二十二年立為魏太子太祖崩嗣位為丞相魏王受漢禪即皇帝位陳思魏志陳思王植字子建善屬文鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之體貌賈誼傳體貌大臣注體貌謂加禮容而敬之俊才雲蒸仲宣孔璋偉長公幹德璉元瑜子俶俱見前典略路粹字文蔚與陳琳等俱為太祖典記室繁欽字休伯以文才機辨少得名於汝潁為丞相主簿楊修字德祖太尉彪之子也為丞相倉曹屬主簿梗槩按文選東京賦注云不纖密則是大概之意此處運用各别查字典引劉楨魯都賦云貴交尚信輕命重氣義激毫毛怨成梗槩是直作感槩用也明帝見前度曲漢書元帝吹洞簫自度曲注自隱度作新曲崇文觀魏志明帝四年置崇文觀徴善屬文者以充之何晏劉劭俱見前高貴魏志高貴鄉公諱髦東海定王之子齊王芳廢大臣立之為成濟所弒正始餘風世說王丞相與殷中軍共談歎曰正始之音正當爾耳又王敦見衛玠曰不意永嘉之中復聞正始之音嵇康阮籍應瑒繆襲俱見前晉宣景文武懷愍晉書司馬懿字仲達仕魏為太尉武帝即位追諡宣皇帝懿長子師字子元仕魏為大將軍追諡景皇帝師弟昭字子上仕魏封晉王追諡文皇帝昭子炎字安世受魏禪諡武皇帝懷皇帝諱熾武帝第二十五子也惠帝無嗣立為皇太弟在位六年為劉曜執歸弒之孝愍皇帝諱鄴吳孝王晏之子也初封秦王懷帝遇害大臣立之在位四年為劉曜執歸弒之綴旒公羊傳君若贅旒然言為下所執持東西耳贅亦作綴文才實盛茂先太沖應璩傳咸張載張協張亢孫綽摰虞成公綏俱見前晉文苑傳應貞字吉甫璩之子也善談論以才學稱帝於華林園宴射貞賦詩最美聨璧夏侯湛傳湛幼有盛才丈章宏富善構新詞而美容觀與潘嶽友善每行止同輿接茵京都謂之連璧二俊陸機傳太康末與弟雲俱入洛造張華華素重其名如舊相識曰伐吳之役利獲二俊元皇晉元帝紀元皇帝諱睿字景文琅琊恭王覲之子也愍帝崩即皇帝位劉劉隗傳隗字大連雅習文史善求人主意元帝深器遇之刁刁協傳協字元亮久在中朝諳練舊事朝廷凡所制度皆禀於協焉明帝晉明帝紀明皇帝諱紹字道畿元皇帝長子也性至孝有文武才略欽賢愛客雅好文辭庾庾亮傳亮明穆皇后之兄也與溫嶠俱為太子布衣之好明帝即位拜中書監溫溫嶠傳嶠字太真明帝即位拜侍中機密大謀皆所參綜成康穆哀晉書成皇帝諱衍字世根明帝長子也在位十七年康皇帝諱嶽字世同成帝同母弟也在位二年穆皇帝諱聃字彭子康帝子也在位七年哀皇帝諱丕字千齡成帝長子也在位三年簡文晉簡文帝紀簡文皇帝諱昱字道萬元帝之少子也帝少有風儀善容止留心典籍不以居處為意凝塵滿席湛如也孝武安恭晉書孝武帝諱曜字昌明簡文第三子也在位二十四年安帝諱德宗孝武帝長子也在位二十年恭帝諱德文安帝同母弟也劉裕廢安帝立之在位二年禪于宋袁殷孫干袁宏孫盛干寶俱見前殷仲文傳仲文少有才藻桓𤣥將為亂使總領詔命以為侍中領左衛將軍𤣥九錫仲文之辭也柱下法輪經老子在周武王時為柱下史漆園史記莊子者䝉人也名周嘗為䝉漆園吏武帝文帝孝武明帝宋書武皇帝劉氏諱裕彭城人受晉恭帝禪文皇帝諱義隆武帝第三子也檀道濟廢營陽王立之孝武皇帝諱駿文帝第三子也初封武陵王起兵誅元凶劭即位明皇帝諱彧文帝第十一子也初封湘東王廢帝被弒大臣迎立之王宋書王僧達少好學善屬文為始興王濬參軍歷遷中書令王微少好學無不通覽善屬文年十六舉秀才除南平王鑠右軍咨議參軍素無宦情稱疾不就袁宋書袁淑博涉多通好屬文辭采遒艷縱橫有才辨彭城王起為祭酒後遷至左衛率元凶將為弒逆淑諫見害淑兄湛湛兄子顗顗從弟粲並有名龍章世說顧彥先八音之琴瑟五色之龍章顔顔延之傳延之文章之美冠絶當時與謝靈運俱以詞彩齊名江左稱顔謝焉謝謝靈運傳靈運博覽羣書文章之美江左莫逮史臣曰爰逮宋氏顔謝騰聲靈運之興㑹標舉延年之體裁明密並方軌前秀垂範後昆鳯采水經注廬山上有三石梁吳猛將弟子登山過此梁見一翁坐桂樹下山川明淨風澤清曠嘉遁之士繼響窟巖龍潜鳯采之賢往者忘歸矣何范張沈南史何遜傳遜弱冠州舉秀才范雲見其對策大相稱賞因結忘年交謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約嘗謂遜曰吾每讀卿詩一日三復猶不能已范雲傳雲善屬文下筆輒成時人疑其宿構張邵傳論有晉自宅淮海張氏無乏賢良及宋齊之間雅道彌盛前則云敷演鏡暢蓋其尤著者也然景𦙍敬愛之道少微立履所由其殆優矣思光行已卓越非常俗所遵齊高帝所云不可有二不可無一斯言其幾得矣沈約傳約博通羣籍能屬文皇齊南齊高帝紀高皇帝諱道成字紹伯姓蕭氏仕宋封齊王受宋禪南史齊高帝蕭道成廟號太祖武帝蕭賾廟號世祖文惠太子蕭長懋追尊為文帝廟號世宗明帝蕭鸞廟號高宗並無中宗高祖二離易離卦彖曰重明以麗乎正象曰明兩作離環流鶡冠子物極則反命曰環流文心雕龍輯注卷九
