body:
  text: 文心雕龍輯注卷五詹事府詹事加吏部侍郎銜黃叔琳撰封禪第二十一夫正位北辰響明南面所以運天樞育黎獻者何嘗不經道緯德以勒皇蹟者哉録圖曰灘灘噅噅棼棼雉雉萬物盡化言至德所被也丹書曰義勝欲則從欲勝義則凶戒慎之至也則戒慎以崇其德至德以凝其化七十有二君所以封禪矣昔黃帝神靈克膺鴻瑞勒功喬嶽鑄鼎荆山大舜巡嶽顯乎虞典成康封禪聞之樂緯及齊桓之霸爰窺王跡夷吾譎陳當作諫距以怪物固知玉牒金鏤專在帝皇也然則西鶼東鰈南茅北黍空談非徴勳德而巳是史遷八書明述封禪者固禋祀之殊禮名元作銘朱改號之祕祝元脫朱補祀天之壯觀矣秦皇銘岱文自李斯法家辭氣體乏𢎞潤然疏而能壯亦彼時之絶采也鋪觀兩漢隆盛孝武禪號於肅然光武巡封於梁父誦元作請孫改德銘勳乃鴻筆耳觀相如封禪蔚為唱首爾其表權輿序皇王炳元符鏡鴻業驅前古於當今之下騰休明於列聖之上歌之以禎瑞讚之以介邱絶筆兹文固維新之作也及光武勒碑則文自元作字張純首𦙍典謨末同祝辭引鈎䜟叙離亂元脫許補一本作合計武功述文德事核理舉華不足而實有餘矣凡此二家並岱宗實跡也及揚雄劇秦班固典引事非鐫石而體因紀禪觀劇秦為文影寫長卿詭言遁辭故兼包神怪然骨掣靡密辭貫圓通自稱極思無遺力矣典引所叙雅有懿乎歷鑒前作能執厥中其致義㑹文斐然餘巧故稱封禪麗而不典劇秦典而不實豈非追觀易為明循勢易為力歟至於邯鄲受命攀響前聲風末力寡輯韻成頌雖文理順元作煩一作頗序而不能奮飛陳思魏德假論客主問答迂緩且已千言勞深績寡飈焰缺焉兹文為用蓋一代之典章也搆位之始宜明大體樹骨於訓典之區選言於宏富之路使意古而不晦於深文今而不墜於淺義吐光芒辭成亷鍔則為偉矣雖復道極數殫終然相襲而日新其采元作來者必超前轍焉贊曰封勒帝績對越天休逖聽髙嶽聲英克彪樹石九旻泥金八幽鴻律蟠采如龍如虬嚮明易說卦傳聖人南面而聽天下嚮明而治運天樞天官書斗為帝車運於中央春秋運斗樞斗第一天樞黎獻書益稷萬邦黎獻共惟帝臣傳黎獻黎民之賢者也緑圖丹書見正緯篇鑄鼎漢郊祀志公孫卿曰黃帝采首陽山銅鑄鼎於荆山下鼎既成冇龍垂胡䫇下迎黃帝巡嶽書舜典歲二月東巡守至於岱宗五月南巡守至於南嶽八月西巡守至於西嶽十有一月朔巡守至於北嶽成康封禪封禪書周德之洽惟成王成王之封禪則近之矣齊桓漢郊祀志齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十冇二焉皆受命然後得封禪管仲睹桓公不可窮以辭因設之以事云云桓公乃止詳下西鶼東鰈注玉牒金縷後漢祭祀志封禪用玉牒書藏方石有玉檢檢用金縷五周以水銀和金以為泥西鶼東鰈南茅北黍郊祀志管仲曰古之封禪鄗上黍北里禾所以為盛冮淮間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而至者十有五焉注比目魚其名謂之鰈比翼鳥其名謂之鶼祕祝見祝盟篇銘岱秦始皇本紀始皇東行郡縣上鄒嶧山立石與魯諸生議刻石頌秦德議封禪望祭山川之事遂上泰山禪梁父刻所立石禪號肅然孝武本紀丙辰禪泰山下趾東北肅然山巡封梁父後漢祭祀志建武三十二年二月皇帝東巡狩至于岱宗柴甲午禪于梁隂相如司馬相如傳武帝曰相如病甚可往從悉取其書若不然後失之矣使所忠往而相如巳死其妻曰長卿未死時為一卷書曰有使者來求書奏之其遺札書言封禪事元符李善文選注元符天符也介丘封禪文以登介丘注介大也丘山也言登泰山封禪也勒碑後漢祭祀志建武三十二年二月上至奉髙遣侍御史與蘭臺令史將工先上山刻石張純張純傳純奏上宜封禪曰宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封於岱宗明中興勒功勳復祖統報天神禪梁父祀地祗傳祚子孫萬世之基也中元元年帝乃東巡岱宗以純視御史大夫從并上元封舊儀及刻石文引鉤䜟叙離亂後漢祭祀志刻石文曰王莽篡叛宗廟隳壞社稷喪亡揚徐青三州首亂兵革橫行延及荆州豪傑并兼百里屯聚往往僭號北夷作寇千里無煙無雞鳴犬吠之聲按文內多引河圖赤伏符㑹昌符孝經鉤命決等書劇秦揚雄劇秦美新序司馬相如作封禪一篇以彰漢氏之休臣敢竭肝膽寫腹心作劇秦美新一篇雖未究萬分之一亦臣之極思也典引班固典引序伏惟相如封禪靡而不典揚雄美新典而亡實臣不勝區區竊作典引一篇注典謂堯典引猶續也漢承堯後故述漢德以續堯典兼包神怪謂篇中元符靈契黃瑞涌出云云也受命邯鄲淳著魏受命述魏德陳思王集魏德論末曰固將封泰山禪梁父歷名山以祈福周五方之靈宇越八九於往素踵帝王之靈矩流餘祚於黎蒸鍾元吉乎聖主逖聽封禪文逖聽者風聲章表第二十二夫設官分職髙卑聨事天子垂珠以聽諸侯鳴玉以朝敷奏以言明試以功故堯咨四嶽舜命八元固辭再讓之請俞往欽哉之授並陳辭帝庭匪假書翰然則敷奏以言則一作即表章之義也明試以功即授爵之典也至太甲既立伊尹書誡思庸歸亳又作書以讚元作纘文翰獻替事斯見矣周監二代文理彌盛再拜稽首對揚休命承文受册敢當丕顯雖言筆未分而陳謝可見降及七國未變古式言事於主皆稱上書秦初定制改書曰奏漢定禮儀則有四品一曰章二曰奏三曰表四曰議章以謝恩奏以按劾表以陳請議以執異章者明也詩云為章于天謂文明也其在文物赤白曰章表者標也禮有表記謂德見于儀其在器式揆景曰表章表之目蓋取諸此也按七略藝文謠詠必録章表奏議經國之樞機然闕而不纂者乃各有故事而在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄奏議臺閣為式胡廣章奏一作表天下第一並當時之傑筆也觀伯始謁陵之章足見其典文之美焉昔晉文受册三辭元脫朱補從命是以漢末讓表以三為斷曹公稱為表不必三讓又勿得浮華所以魏初表章指事造實求其靡麗則未足美矣至於文舉之薦禰衡氣揚采飛孔明之辭後主志盡文暢雖華實異㫖並表之英也琳瑀章表有譽當時孔璋稱健則其標也陳思之表獨冠羣才觀其體贍而律調辭清而志顯應物掣一作制巧隨變生趣執轡有餘故能緩急應節矣逮晉初筆札則張華為俊元作儔其三讓公封理周辭要引義比事必得其偶世珍鷦鷯莫顧章表及羊公之辭開府有譽於前談庾公之讓中書信美於往載一作册序志顯類有文雅焉劉琨勸進張駿自序文致耿介並陳事之美表也原夫章表之元作文謝改為用也所以對揚王庭昭明心曲既其身文且亦國華章以造闕風矩應明表以致禁骨采宜耀循名課實以章元脫一作為本者也是以章式炳賁志在典謨使要而非略明而不淺表體多包情僞屢遷必雅義以扇其風清文以馳其麗然懇惻元作愜者辭為心使浮侈者情為文元作出使一作情為文屈繁約得正華實相勝唇吻不滯則中律矣子貢云心以制之言以結之蓋一一作以辭意也荀卿以為觀人美辭麗於黼黻文章亦可以喻於斯乎贊曰敷奏絳闕獻替黼扆言必貞明義則𢎞偉肅恭節文條理首尾君子秉文辭令有斐聨事周禮大宰以八法治官府三曰官聨以㑹官治垂珠玉藻天子玉藻十冇二旒釋名祭服曰冕𤣥上纁下前後垂珠冇文飾也八元左傳舜臣堯舉八元使布五教于四方書誡書序太甲元年伊尹作伊訓思庸書序太甲放諸桐三年復歸于亳思庸伊尹作太甲三篇獻替左傳君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否丕顯左傳僖公二十八年王䇿命晉侯為侯伯晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受册以出言筆曲禮史載筆士載言章奏表議獨斷凡羣臣上書於天子者有四名一曰章二曰奏三曰表四曰駁議赤白考工記畫繢之事赤與白謂之章揆景晉天文志鄭衆說土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中桓談新論二儀之大可以章程測也三綱之動可以圭表測也七略見諸子篇左雄左雄傳自雄掌納言多所匡肅章表奏議臺閣以為故事胡廣胡廣傳舉孝亷既到京師試以章奏安帝以廣為天下第一文舉孔融傳融字文舉文選有薦禰衡表孔明諸葛亮傳亮字孔明後主建興五年率諸軍北駐漢中臨發上疏表見文選琳瑀陳琳阮瑀典論琳瑀之章表書記今之雋也孔璋陳琳字孔璋魏文帝與吳質書孔璋章表殊健陳思之表陳思王植傳太和二年植常自憤怨抱利器而無所施上疏求白試五年植上疏求存問親戚張華張華傳初封廣武縣侯進封壯武郡公華十餘讓中詔敦譬乃受鷦鷯張華傳華初未知名著鷦鷯賦以自寄辭開府羊祜傳武帝時加車騎將軍開府如三司之儀祜上表固讓載文選讓中書文選有庾亮讓中書監表劉琨文選有劉琨勸進表張駿張駿傳駿上疏曰臣專命一方職在斧鉞勒雄既死人懷反正謂季龍李期之命曾不崇朝而皆纂繼凶逆鴟目有年遂使桃蟲鼓翼四夷喧譁臣之所以宵吟荒漠痛心長路者也絳闕孫楚傳楚作書遺孫皓曰竊號之旗稽顙絳闕球琳重錦充於府庫黼扆見詔䇿篇奏啓第二十三昔唐虞之臣敷奏以言秦漢之輔上書稱奏陳政事獻典儀上急變劾愆一作僭謬總謂之奏奏者進也言元脫謝補敷于下情進于上也秦始立奏而法家少文觀王綰之奏勳德辭質而義近李斯之奏驪山事略而意徑政御覽作故無膏潤形於篇章矣自漢以來奏事或稱上疏儒雅繼踵殊采可觀若夫賈誼之務農鼂錯之兵事元作卒孫改匡衡之定郊王吉之觀禮溫舒之緩獄谷永之諫仙理既切至辭亦通暢一作達又作辨可謂識大體矣後漢羣賢嘉言罔伏楊秉耿介於災異陳蕃憤悶於尺一骨鯁得焉張衡指摘於史職蔡雍銓列於朝儀博雅明焉魏代名臣文理迭興若髙堂天文王元作黃從魏志改觀教學王朗節省甄元作甌朱改毅考課亦盡節而知治矣晉氏多難災屯流移劉頌殷勤於時務溫嶠懇惻一作切於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辨析疏通為首强志足以成務博見足以窮理酌古御今治繁總要此其體也若乃按劾之奏所以明憲清國昔周之太僕繩愆糾繆秦之御史職主文法漢置中丞總司按劾故位在鷙一作摯擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其奸回路粹之奏孔融則誣其釁惡名儒之與險士固殊心焉若夫傅咸元作盛徑直而按辭堅深劉隗切正而劾文濶略各其志也後之彈事迭相斟酌惟新日用而舊凖弗差然函人欲全矢人欲傷術在糾惡勢必深峭詩刺讒人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸詩禮儒墨既其如兹奏劾嚴文孰云能免是以世人為文競於詆訶吹毛取瑕次骨為戾復似善罵多失折衷若能闢禮門以懸規標義路以植矩然後踰垣者折肱捷徑者滅趾何必躁言醜句詬元作話謝改病為切哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之文不畏彊禦氣流墨中無縱詭隨聲動簡外乃稱絶席之雄直方之舉耳一作也啓者開也髙宗云啓乃心沃朕心取其義也孝景諱啓故兩漢無稱至魏國箋記始云啓聞奏事之末或云謹啓自晉來盛啓用兼表奏陳政言事既奏之異條讓爵謝恩亦表之别幹必斂飭元作散入規促其音節辨要輕清文而不侈亦啓之大略也又表奏確切號為讜言讜者偏也王道有偏乖乎蕩蕩下有脫字其偏故曰讜言也孝成稱班伯之讜言貴直也自漢置八儀密奏隂陽皂囊封板故曰封事鼂錯受書還上便宜後代便宜多附封事慎機密也夫王臣匪躬必吐謇諤事舉人存故無待泛說也贊曰皂飭司直肅清風禁筆鋭干將墨含淳鴆雖有次骨無或膚浸獻政陳宜事必勝任急變漢平帝紀乙未義陵寢神衣在柙中丙申旦衣在外牀上寢令以急變聞注非常之事故云急變王綰秦始皇本紀秦初并天下議帝號丞相王綰等議曰陛下平定天下海內為郡縣法令由一統五帝所不及古有天皇有地皇有泰皇泰皇最貴臣等昧死上尊號王為泰皇李斯蔡質漢儀李斯治驪山陵上書曰臣所將隸徒七十餘萬人治驪山者巳深巳極鑿之不入燒之不㸐叩之空空如下天狀務農漢食貨志文帝即位躬修儉節思安百姓時民近戰國賈誼說上曰積貯者天下之大命也驅民而歸之農使天下各食其力末技游食之民轉而緣南晦則蓄積足而人樂其所矣兵事鼂錯傳胸奴彊數寇邊上發兵以禦之錯上言兵事定郊漢郊祀志成帝初即位丞相匡衡等奏言帝王之事莫大乎承天之序承天之序莫重於郊祀宜於長安定南北郊為萬世基天子從之王吉王吉傳吉疏曰安上治民莫善於禮願陛下與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁壽之域溫舒路溫舒傳宣帝初即位溫舒上書言宜尚德緩刑谷永漢郊祀志成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中谷永說上曰臣聞明於天地之性不可惑以神怪盛稱竒怪鬼神及言世有仙人皆挾左道懷詐僞以欺罔世主楊秉楊秉傳帝時微行幸河南尹梁𦙍府舍是日大風拔樹晝昏秉因諫曰王者至尊出入有常况以先王法服而私出槃斿設有非常之變上負先帝下悔靡及陳蕃陳蕃傳時封賞踰制蕃上疏諫曰陛下宜採求得失擇從忠善尺一選舉委尚書三公使裒責誅賞各冇所歸張衡指摘張衡傳衡收檢遺文畢力補綴條上司馬遷班固所叙與典籍不合者十餘事又以為王莽本傳但應載篡事而巳至於編年月紀災祥宜為元后本紀又宜以更始之號建於光武之初朝儀蔡雍獨斷正月朝賀三公奉璧上殿向御座北面太常贊曰皇帝為君興三公伏皇帝坐乃進璧舊儀三公以下月朝後省常以六月朔十月朔旦朝後又以盛暑省六月朝故今獨以為正月十月朔朝也冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀天文髙堂隆傳青龍中大治殿舍有星孛於大辰隆上疏曰今之宫室實違禮度乃更建立九龍華飾過前天彗章灼始起於房心犯帝座而干紫微此乃皇天子愛陛下是以發教戒之象欲必覺寤陛下不宜有忽以重天怒王觀魏志觀字偉臺節省魏王朗有節省奏劉頌劉頌傳除淮南相頌在郡上疏言封國之制宜如古典及六州將士之役凡數千言詔褒美之溫嶠溫嶠傳太子起西池樓觀頗為勞費嶠上疏以為朝廷草創巨寇未滅宜應儉以率下太子納焉繩愆糾繆書序穆王命伯冏為周太僕正作冏命曰惟余一人無良實賴左右前後有位之士匡其不及繩愆糾繆格其非心俾克紹先烈今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮御史中丞漢百官公卿表御史大夫秦官一曰中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史員十五人受公卿奏事舉劾按章奏董賢董賢傳賢自殺王莽復風孔光奏賢質性巧佞翼奸以獲封侯治第造冢不異王制死後以砂書棺至尊無以加臣請收沒入財物縣官奏孔融孔融傳曹操令路粹枉奏融昔在北海見王室不靜欲規不軌云我大聖之後有天下者何必卯金刀傅咸傅咸傳咸字長虞剛簡有大節顧榮與親故書曰傅長虞為司隸徑直忠果劾按驚人雖非周才偏亮可貴也劉隗劉隗傳隗遷丞相司直彈奏不畏彊禦彈事六朝御史中丞劾奏曰彈事文選有沈休文任彥升彈事王淮之傳宋臺諫除御史中丞為百僚所憚自彪之至淮之四世居此職淮之嘗作五言詩范泰嘲之卿惟解彈事耳鸚猩曲禮鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎墨翟非儒墨子非儒篇貪于飲食惰子作務陷于饑寒無以違之是苦人氣鼠藏而羝羊視賁彘起君子笑之次骨杜周傳周少言重遲而內深次骨注其用法深刻至骨善罵留侯世家四皓曰陛下輕士善罵臣等義不受辱故恐而亡匿踰垣國語君有短垣而自踰之捷徑離騷夫唯捷徑以窘步絶席王常傳常為橫野大將軍位次與諸將絶席注絶席謂尊顯之也漢官儀曰御史大夫尚書令司隸校尉皆專席號三獨坐讜言漢書叙傳禁中張畫屏風畫紂醉踞妲已作長夜之樂上指畫問班伯伯對曰詩書淫亂之戒其原皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言皂囊封板後漢禮儀志日冬至召太史令各板書封以皂囊獨斷凡表章皆啓封其言密事得皂囊盛封事霍光傳上令吏民得奏封事不關尚書上便宜鼂錯傳太常遣鼂錯受尚書伏生所還因上便宜事謇諤陳蕃傳竇太后優詔蕃曰忠孝之美德冠本朝謇諤之操華首彌固司直百官公卿表武帝元狩五年初置司直掌佐丞相舉不法議對第二十四周爰咨謀是謂為議議之言宜審事宜也易之節卦君子以制度數議德行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其來逺矣洪水之難堯咨四嶽宅揆之舉舜疇五人一本臣三代所興詢及芻蕘春秋釋宋魯桓務議及趙靈胡服而季父爭論商鞅變法而甘龍交辨雖憲章無算而同異足觀迄至元作今有漢始立駁議駁者雜也雜議不純故曰駁也自兩漢文明楷式昭備藹藹多士發言盈庭若賈誼之遍代諸生可謂捷於議也至如主父當作吾邱之駁挾弓安國之辨胸奴賈捐之之陳於朱崖劉歆之辨於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程元作陳曉之駁校事司馬芝之議貨錢何曾蠲出女之科秦秀定賈充之諡元作謐事實允當可謂達議體矣漢世善駁則應劭為首晉代能議則傅咸為宗然仲瑗博古而銓貫有叙長虞識治而屬辭枝繁及陸機斷議亦有鋒穎而諛辭弗剪頗纍文骨亦各有美風格存焉夫動先擬議明用稽疑所以敬慎羣務弛張治術故其大體所資必樞紐經典採故實於前代觀通變於當今理不謬搖其枝字不妄舒其藻又御覽作其郊祀必洞於禮戎事必一作要又作宜練於兵田一作佃穀先曉於農斷訟務精於律然後標以顯義約以正辭文以辨潔為能不以繁縟為巧事以明核為美不以深隱為竒此綱領之大要也若不達政體而舞筆弄文支離構辭穿鑿㑹巧空騁其華固為事實所擯設得其理亦為遊辭所埋矣昔秦女嫁晉從文衣之媵一本下有者字晉人貴媵而賤女楚珠鬻鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於兹矣又對䇿者應詔而陳政也射䇿者探事而獻說也言中理準譬射侯中的二名雖殊即議之别體也古之造士選事考言漢文中年始舉賢良鼂錯對䇿蔚為舉首及孝武益明旁求俊乂對䇿者以第一登庸射䇿者以甲科入仕斯固選賢要術也觀鼂氏之對證驗古今辭裁以辨事通而贍超升髙第信有徴矣仲舒之對祖述春秋本隂陽之化究列代之變煩而不慁者事理明也公孫之對簡而未博然總要以約文事切而情舉所以太常居下而天子擢上也杜欽之對略而指事辭以治宣不為文作及後漢魯丕元作平朱改辭氣質素以儒雅中䇿獨一作以入髙第凡此五家並前元作明謝改又一本作列代之明範也魏晉巳來稍務文麗以文紀實所失巳多及其來選又稱疾不㑹雖欲求文弗可得也是以漢飲博士而雉集乎堂晉䇿秀才而麏興於前無他怪也選失之異耳夫駁議偏辨各執異見對䇿揄揚大明治道使事深於政術理密於時務酌三五以鎔世而非迂緩之髙談馭權變以拯俗而非刻薄之僞論風恢恢而能逺流洋洋而不溢王庭之美對也難矣哉士之為才也或練治而寡文或工文而疏治對䇿所選實屬通才志足文逺不其鮮歟贊曰議惟疇政名實相課斷理必綱摛辭無懦對䇿王庭同時酌和治體髙秉雅謨逺播明臺管子黃帝立明臺之議者上觀於賢也釋宋春秋僖公二十二年公㑹諸侯盟于薄釋宋公公羊傳執未有言釋之者此其言釋之何公與為爾也公與為爾奈何公與議爾也按魯桓公無議釋宋事桓當作僖胡服趙世家武靈王欲胡服公子成曰中國者賢聖之所教也今王舍此而襲逺方之服變古之教逆人之心王曰儒者一師而俗異中國同禮而教離今叔之所言者俗也吾之所言者所以制俗也公子成曰王將繼簡襄之意以順先王之志臣敢不聽命乎變法商君列傳孝公既用衛鞅鞅欲變法甘龍曰聖人不易民而教知者不變法而治鞅曰龍之所言世俗之言也三代不同禮而王五伯不同法而伯孝公曰善卒定變法之令駁議見章表篇賈誼賈誼傳誼為博士每詔令議下諸老先生不能言賈生盡為之對人人各如其意所欲出諸生于是以為能文帝說之駁挾弓吾丘壽王傳公孫𢎞奏言禁民毋得挾弓弩便上下其議壽王對曰臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也上以難𢎞𢎞詘服焉按非主父偃事辨胸奴韓安國傳武帝時胸奴請和親大行王恢議伏兵襲擊安國曰胸奴輕疾悍亟之兵也至如猋風去如收電難得而制今使邊郡久廢耕織以支胡之常事其勢不相權也臣故曰勿擊便陳朱崖朱崖當作珠崖賈捐之傳珠崖又反上使王商詰問捐之捐之對曰臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂辨祖宗劉歆武帝廟不宜毁議孝武皇帝南滅百粵北攘胸奴至今纍世賴之天子三昭三穆與太祖之廟而七孝宣皇帝舉公卿之議既以為世宗之廟臣愚以為不宜毁斷輕侮張敏傳建初中有人侮辱人父者而其子殺之肅宗貰其死刑自後因以為比遂定議以為輕侮法敏駁議曰使執憲之吏得設巧詐非所以導在醜不爭之義可下三公廷尉蠲除其敝議寢不省敏復上疏和帝從之議擅誅郭躬傳竇固出擊胸奴秦彭為副彭在别屯而輒以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬曰漢制棨㦸即為斧鉞於法不合罪帝從躬議駁校事魏志程曉嘉平中為黃門侍郎時校事放橫曉上疏遂罷校事官議貨錢司馬芝傳先是文帝罷五銖錢令民以穀幣豐為市至明帝時巧僞滋多芝議以用錢非獨國亦以省刑從之蠲出女科晉刑法志魏法犯大逆者誅及已出之女毌丘儉之誅其子甸妻荀氏應坐死詔聽離婚荀氏所生女芝為劉子元妻亦坐死以懷妊繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖芝命曽哀之使主簿程咸上議曰男不得罪於他族而女獨嬰戮於二門臣以為在室之女從父母之誅既醮之婦制從夫家之罰宜改舊科以為永定賈充諡秦秀傳賈充薨議諡秀議曰充以異姓為後絶祖父之血食開朝廷之禍門諡法昏亂紀度曰荒請諡荒應劭應劭傳劭凡為駁議三十篇仲瑗應劭傳劭字仲逺注續漢書文士傳作仲援漢官儀又作仲瑗貴媵賤女買櫝還珠韓子昔秦伯嫁其女於晉公子令晉為之飾裝從衣文之媵七十人至晉晉人愛其妾而賤公女此可謂善嫁妾而未可謂善嫁女也楚人有賣其珠於鄭者為木蘭之匱薰桂椒之櫝綴以珠玉飾以玫瑰輯以翡翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也射䇿對䇿蕭望之傳望之以射䇿甲科為郎注射䇿者謂為難問疑義書之於䇿量其大小署為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之以知優劣射之言投射也對䇿者顯問以政事經義令各對之而觀其文辭定髙下也舉賢良鼂錯傳詔有司舉賢良文學士對䇿者百餘人錯為髙第仲舒董仲舒傳仲舒少治春秋武帝即位舉賢良文學之士前後百數而仲舒以賢良對䇿舉首公孫對平津侯傳公孫𢎞使胸奴還不合上意病免歸元光五年詔徴文學國人固推𢎞𢎞至太常太常令所徴儒士各對䇿百餘人𢎞第居下䇿奏天子擢𢎞對為第一杜欽杜欽傳日蝕地震詔舉賢良方正能直言士欽上對云云魯丕魯丕傳丕字叔陵兼通五經為當世名儒肅宗詔舉賢良方正劉寬舉丕時對䇿者百有餘人惟丕在髙第關東號之曰五經復興魯叔陵稱疾晉書元帝時以天下喪亂逺方孝秀不復䇿試到即除署既經略粗定乃詔試經有不中科刺史太守免官其後孝秀莫敢應命有送至京師皆以疾辭雉集漢成帝紀鴻嘉二年春行幸雲陽三月博士行飲酒禮有雉蜚集于庭歷階升堂而雊詔舉敦厚有行義能直言者冀聞切言嘉謀麏興晉五行志咸和六年正月㑹州郡秀孝於樂賢堂有麏見于前獲之孫盛以為吉祥夫秀孝天下之彥士樂賢堂所以樂養賢也自喪亂以後風教陵夷秀孝䇿試四科之實麏興於前或斯故乎志足文逺左傳仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺書記第二十五大舜云書用識哉所以記時事也蓋聖賢言辭總為之一作尚書書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言陳之簡牘取象於夬貴在明決而巳三代政暇文翰頗疏春秋聘繁書介彌盛繞朝贈士㑹以䇿子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對面又子服敬叔進弔書于滕君固知行人挈辭多被翰墨矣及七國獻書詭麗輻輳漢來筆札辭氣紛紜觀史遷之報任安東方朔之難公孫楊惲之酬㑹宗子雲之答劉歆志氣槃桓各含殊采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬董半簡必録休璉好事留意詞翰抑其次也嵇康絶交實志髙而文偉矣趙至叙元作贈王性凝改離乃少年之激切也至如陳遵占辭百封各意禰衡代書親疏得宜斯又御覽作皆尺牘之偏才也詳總書體本在盡言言以散鬱陶託風采故宜條暢御覽作滌蕩以任氣優柔以懌懷文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文戰國以前君臣同書秦漢立儀始有表奏王公國內亦稱奏書張敞奏書於膠后其義美矣迄至後漢稍有名品公府奏記而郡將奏箋記之言志進巳志也箋者表也表識其情也崔實奏記於公府則崇讓之德音矣黃香奏箋於江夏亦肅恭之遺式矣公幹箋記麗而規益子桓弗論故世所共遺若略名取實則有美於為詩矣劉廙謝恩喻切以至陸機自理情周而巧箋之為善者也原箋記之為式既上窺乎表亦下睨乎書使敬而不懾簡而無傲清美以惠其才彪蔚以文其響蓋箋記之分也夫書記廣大衣被事體筆劄雜名古今多品是以總領黎庶則有譜籍簿録醫歷星筮則有方術占試申憲述兵則有律令法制朝市徴信則有符契券疏百官詢事則有關刺解諜萬民達志則有狀列辭諺並述理於心著言於翰雖藝文之末品而政事之先務也故謂譜者普也注序世統事資周普鄭氏譜詩蓋取乎此籍者借也歲借民力條之於版春秋司籍即其事也簿者圃也草木區别文書類聚張湯李廣為吏所簿别情僞也録者領也古史世本編以簡䇿領其名數故曰録也方者隅也醫藥攻病各有所主專精一隅故藥術稱方術者路也算歷極數見路乃明九章積微故以為術淮南萬畢皆其類也占者覘也星辰飛伏伺候乃見精疑作登觀書雲故曰占也式者元脫則也隂陽盈虛五行消息變雖不常而稽之有則也律者中也黃鐘調起五音以正元本下多音以正三字法律馭民八刑克平以律為名取中正也令者命也出命申禁有若自天管仲下命一作令如流水使民從也法者象也兵謀無方而竒正有象故曰法也制者裁也上行於下如匠之制器也符者孚元作厚謝改也徴召防僞事資中孚三代玉瑞漢世金竹末代從省易以書翰矣契者結也上古純質結繩執契今羌胡徴數負販記緡其遺風歟券者束也明白約束以備情僞字形半分故周稱判書古有鐵券以堅信誓王褒髯奴則券之楷也疏者布也布置物類撮題近意故小券短書號為疏也關者閉也出入由門關閉當一作由審庶務在政通塞應詳韓非云孫亶回元作四朱改聖相也而關於州部蓋謂此也刺者達也詩人諷刺周禮三刺事叙相達若針之通結矣解者釋也解釋結滯徴事以對也牒者葉也短簡編牒如葉在枝溫舒截蒲即其事也議政未定故短牒咨謀牒之尤密謂之為籖籖者纎一作籖密者也狀者貌也體一作禮貌本原取其事實先賢表諡並有行狀狀之大者也列者陳也陳列事情昭然可見也辭者舌端之文通巳於人子産有辭諸侯所賴不可巳也諺者直語也喪言亦不及文元作交故弔亦稱諺㕓路淺言有實無華鄒穆公云囊滿汪本作漏儲中皆其類也太誓曰古人有言牝雞無晨大雅云人亦有言惟憂用老並上古遺諺詩書可引者也至於陳琳諫辭稱掩目捕雀潘嶽哀辭稱掌珠伉儷並引俗說而為文辭者也夫文辭鄙俚莫過於諺而聖賢詩書採以為談况踰於此豈可忽哉觀此四條並書記所總或事本相通而文意各異或全任質素或雜用文綺隨事立體貴乎精要意少一字則義闕句長一言則辭妨並有司一作詞之實務而浮藻之所忽也然才冠鴻筆多疏尺牘譬九方堙之識駿足而不知毛色牝牡也言既身文信亦邦瑞翰林之士思理實焉贊曰文藻條流託在筆札既馳金相亦運木訥萬古聲薦千里應拔庶務紛綸因書乃察書用識哉書益稷篇文揚雄云云見法言問神篇簡牘杜預春秋序大事書之於䇿小事簡牘而已象夬見徴聖篇贈䇿左傳晉人患秦之用士㑹也乃使魏壽餘僞以魏叛者以誘士㑹士㑹行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也與書左傳晉侯不見鄭伯以為二於楚也鄭子家使執訊而與之書以告趙宣子遺子反左傳楚子重子反以夏姬故怨巫臣而殺其族巫臣自晉遺二子書諫范宣左傳范宣子為政諸侯之幣重鄭人病之子産寓書於子西以告宣子進弔書檀弓滕成公之喪使子服敬叔弔進書筆札司馬相如傳相如請為天子遊獵之賦上令尚書給筆札注札木簡之薄小者時未多用紙故給札以書報任安司馬遷傳遷被刑之後為中書令尊寵任職故人益州刺史任安豫遷書責以古賢臣之義遷報以書難公孫公孫𢎞傳武帝時北築朔方𢎞諫以為罷弊中國上使朱買臣等難𢎞置朔方之便發十䇿𢎞不得一按東方朔傳有答客難無難公孫𢎞事酬㑹宗楊惲傳惲失位家居治産業起室宅以財自娛友人孫㑹宗知略士也與惲書諫戒之惲報以書答劉歆揚雄字子雲集有答劉歆書元瑜魏文帝集與吳質書元瑜書記翩翩致足樂也文舉孔融傳融字文舉魏文帝深好融文辭募天下上融文章者輒賞以金帛休璉文章叙録應璩字休璉博學好屬文善為書記文絶交嵇康傳山濤將去選官舉康自代康乃與濤書告絶叙離晉文苑傳趙至與嵇康兄子蕃友善及將逺適乃與蕃書叙離并陳其志陳遵陳遵傳起為河南太守既到官治私書謝京師故人遵憑几口占書吏且省官事書數百封親疏各有意禰衡後漢文苑傳禰衡為黃祖作書記輕重疏密各得體宜獻酬世說人問撫軍殷浩談竟何如答曰不能勝人差可獻酬羣心君臣同書如樂毅報燕王燕王謝樂間上下無别同稱書也表奏文章緣起表淮南王安諫伐閩表奏漢枚乘奏書諫吳王濞張敞張敞傳敞拜膠東相到膠東居頃之王太后數出游獵敞奏書諫郡將嚴延年傳延年新將注新為郡將也謂郡守為郡將者以其兼領武事也崔實見諸子篇黃香後漢文苑傳黃香字文彊江夏安陸人所著賦箋奏書令凡五篇公幹劉楨字公幹按魏文帝與吳質書公幹五言詩妙絶當時而不言其箋記故云弗論文帝字子桓劉廙劉廙傳魏諷反廙弟偉為諷所引當相坐誅太祖令曰叔向不坐弟虎古之制也特原不問徙署丞相倉曹屬廙上疏謝曰起烟於寒炭之上生華於巳枯之木物不答施於天地子不謝生於父母陸機自理陸機謝平原內史表橫為故齊王冏誣臣與衆人共作禪文幽執囹圄當為誅始臣乃﨑嶇自列片言隻字不關其間字蹤筆迹皆可推挍譜漢藝文志帝王諸侯世譜二十卷古來帝王年譜五卷劉杳傳王僧孺撰譜訪杳血脈所因杳云桓談新論云太史三世表旁行邪上並效周譜以此而推當起周代籍蕭何世家髙祖入關何獨先走丞相府收圖籍以是具知天下户口厄塞簿漢食貨志多張空簿注簿計簿也録周禮職幣振掌事者之餘財皆辨其物而奠其録注定其録籍方漢藝文志經方十一家經方者辨五苦六辛致水火之齊以通閉解結術漢藝文志凡數術百九十家數術者皆明堂義和史卜之職也占漢藝文志雜占十八家雜占者紀百事之象候善惡之微式周禮大師抱天時與大師同車注太史主抱式以知天時處吉凶釋曰據當時占文謂之式以其見時候有法式故謂載天文者為式漢藝文志羡門式法二十卷羡門式二十卷律漢刑法志蕭何攈托秦法取其宜於時者作律九章令蕭望之傳金布令甲注金布者令篇名也其上有府庫金錢布帛之事因以篇名令甲者其篇甲乙之次法周禮疏齊景公時大夫田穰苴作司馬法至六國時齊威王大夫等追論古法又作司馬法附于穰苴漢藝文志張良韓信序次兵法制禮記月令命有司修法制符東觀漢記郭丹初之長安從宛人陳兆買入關符以入函谷關既入封符乞人曰不乘使者車不出關契周禮小宰之職聽取豫以書契注書契謂出豫受人之凡要凡簿書之最目獄訟之要詞皆曰契劵周禮天官小宰四曰聽稱責以傅别注傅别謂券書也聽訟責者以券書决之地官質人大市以質小市以劑注大市人民馬牛之屬用長券小市兵器珍異之物用短券關刺唐百官志諸司相質其制有三一曰關二曰刺三曰移牒左傳右師不敢對受牒而退正義簡牒也牒札也狀楊引傳引母終經十三年哀慕不改郡縣鄉里三百人上狀稱美辭周書兩造具備師聽五辭五辭簡孚正于五刑譜詩鄭𤣥傳𤣥所著毛詩譜注𤣥於詩禮論語為之作序此譜亦序之類避子夏序名以其列諸侯世及之次謂之為譜司籍左傳周景王謂籍談曰昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏張湯史記酷吏傳天子以湯懷詐面欺使使八輩簿責湯注謂以文簿次第二責之李廣李廣傳廣從大將軍擊胸奴惑失道大將軍使長史急責廣之幕府對簿世本班彪傳左丘明有記録黃帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇馬總意林傅子曰楚漢之際有好事者作世本上録黃帝下逮漢末九章鄭𤣥傳始通京氏易公羊春秋三統歷九章算術注三統歷劉歆所撰九章算術周公作也凡有九篇方田一粟米二差分三少廣四均輸五方程六傍要七盈不足八鉤股九萬畢龜策傳臣為郎時見萬畢石朱方傳曰有神龜在江南嘉林中注萬畢術中有石朱方方中說嘉林中故云傳曰淮南有畢萬術一卷書雲左傳凡分至啓閉必書雲物黃鐘漢律歷志五聲之本生于黃鐘之律管仲管子下令於流水之原者令順民心也玉瑞周禮典瑞掌玉瑞玉器之藏注瑞符信也五帝本紀修五禮五玉注即五瑞也金竹孝文本紀初與郡國守相為銅虎符竹使符判書周禮秋官朝士凡有責者有判書以治則聽注判半分而合者鐵券漢髙帝紀與功臣剖符作誓丹書鐵券髯奴王褒僮約券文曰資中男子王子淵從成都安志里女子楊惠買夫時户下髯奴便了決賣萬五千奴從百役使不得有二言孫亶回韓子徐渠問田鳩曰陽城義渠名將也而措於毛伯公孫亶回聖相也而關於州部何哉田鳩曰此無他主有度上有術之故也三刺周禮司刺掌三刺三宥三赦之法以贊司寇聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民截蒲路溫舒傳溫舒取澤中蒲截以為牒編用寫書行狀文章緣起行狀漢丞相倉曹傅胡幹作楊元伯行狀子産左傳叔向曰辭之不可以已也子産有辭諸侯賴之若之何其釋辭也囊漏儲中賈誼新書鄒穆公令食鳬雁者必以粃於是倉無粃而求易於民二石粟而易一石粃吏請以粟食之公曰去非而所知也汝知小計而不知大㑹周諺曰囊漏儲中而獨弗聞與掩目捕雀何進傳袁紹等欲召外兵向京城以脅太后進然之陳琳諌曰易稱即鹿無虞諺有掩日捕雀夫微物尚不可欺以得志况國之大事其可以詐立乎伉儷潘黃門集楊仲武誄序子之姑豫之伉儷九方堙淮南子秦穆公使九方堙求馬三月而反報曰在於沙邱牡而黃使人往取之牝而驪穆公不說伯樂曰若堙之所觀者天機也得其精而忘其粗馬至而果千里之馬翰林長楊賦藉翰林以為主人注翰筆也翰材文翰之多若林文心雕龍輯注卷五
