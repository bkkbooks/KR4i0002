body:
  text: 文心雕龍輯注巻八詹事府詹事加吏部侍郎銜黄叔琳撰比興第三十六詩文𢎞奥包韞六義毛公述傳獨標興體豈不以風通一作異而賦同比顯而興隠哉故比者附也興者起也附理者切類以指事起情者依微以擬議起情故興體以立附理故比例以生比則畜憤以斥言興則環譬以記一作託諷蓋隨時之義不一故詩人之志有二也觀夫興之託諭婉而成章稱名也小取類也大闗雎有别故后妃方德尸鳩貞一故夫人象義義取其貞無從於夷禽德貴其别不嫌於鷙鳥明而未融故發注而後見也且何謂為比蓋寫物以附意颺言以切事者也故金錫以喻明德珪璋以譬秀民螟蛉以類教誨蜩螗以寫號呼澣衣以擬心憂席巻汪木作巻席以方志固凡斯切象皆比義也至如麻衣如雪兩驂如舞若斯之類皆比類者也楚襄信讒而三閭忠烈依詩製騷諷兼比興炎漢雖盛而辭人夸毗詩刺道喪故興義銷亡於是賦頌先鳴故比體雲構紛紜雜遝信舊章矣夫比之為義取類不常或喻於聲或方於貌或擬於心或譬於事宋玉高唐云纖條悲鳴聲似竽籟此比聲之類也枚乗莬園云焱焱紛紛若塵埃之間白雲此則比貌之類也賈生鵩賦云禍之與福何異糺纆此以物比理者也王襃洞簫云優柔温潤如慈父之畜子也此以聲比心者也馬融長笛云繁縟絡繹范蔡之說也此以響比辯者也張衡南都云起鄭舞蠒曵元作蠒抽按本賦改緒此以容比物者也若斯之類辭賦所先日用乎比月忘乎興習小而棄大所以文謝於周人也至於揚班之倫曹劉以下圖狀山川影寫雲物莫不纖疑作織綜比義以敷其華驚聽囘視資此効績又安仁螢賦云流金在沙季鷹雜詩云青條若總翠皆其義者也故比類雖繁以切至為貴若刻鵠元作鶴謝改類鶩則無所取焉贊曰詩人比興觸物圓覽物雖胡越合則肝膽擬容取心斷辭必敢攅雜詠歌如川之渙六義見明詩篇毛公漢蓺文志毛詩故訓傳三十巻毛公之學自謂子夏所傳闗雎詩小序闗雎后妃之徳也尸鳩詩小序鵲巢夫人之徳也國君積行累功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉鷙鳥詩傳雎鳩王睢也摯而有别注摯本亦作鷙金錫見衞風淇澳篇珪璋見大雅巻阿篇螟蛉見小雅小宛篇揚子法言螟蛉之子殪而逢蜾嬴祝之曰類我類我久則肖之矣蜩螗見大雅蕩之篇澣衣見􅆁風柏舟篇席巻同上如雪見曹風蜉蝣篇如舞見風大叔于田篇夸毗見大雅板之篇優柔温潤王襃洞簫賦聽其巨音則周流汜濫并包吐含若慈父之畜子也又云優柔温潤又似君子安仁螢賦潘岳螢火賦飄飄熲熲若流金之在沙岳字安仁季鷹雜詩張翰雜詩青條若總翠翰字季鷹刻鵠類鶩馬援與兄子書效伯高不得猶為謹厚之士所謂刻鵠不成尚類鶩者也胡越孔叢子胡越之人同舟濟江中流遇風波其相救如左右手肝膽莊子自其異者視之肝膽楚越也必敢李斯傳趙高曰顧小而忘大後必有害狐疑猶豫後必有悔斷而敢行鬼神避之後有成功夸飾第三十七夫形而上者謂之道形而下者謂之器神道難摹精言不能追其極形器易寫壯辭可得喻其真才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恒存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩高極天論狹則河不容舠說多則子孫千億稱少則民靡孑遺襄陵舉滔天之目倒戈立漂杵之論辭雖已甚其義無害也且夫鴞音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深襃讃故義成矯飾大聖所錄以垂憲章孟軻所云説詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如慿風詭濫愈甚故上林之館奔星與宛虹入軒從禽之盛飛㢘與鷦鷯按本賦作焦明俱獲及揚雄甘泉酌其餘波語瓌竒則假珍於玉樹言峻極則顛墜於鬼神至東都之比目西京之海若驗理則理無不驗窮飾則飾猶未窮矣又子雲羽一作校獵鞭宓妃以饟屈原張衡羽獵困𤣥㝠於朔野孌彼洛神既非罔兩惟此水師亦非魑魅而虛用濫形不其疎乎此欲夸其威而飾元脱其下有闕字事義暌刺也至如氣貌山海體勢宫殿􅀈峨掲業熠燿焜煌之狀光采煒煒而欲然聲貌岌岌其將動矣莫不因夸以成狀㳂飾而得竒也於是後進之才奬氣挾聲軒翥而欲奮飛騰擲而羞跼步辭入煒煜春藻不能程其豔言在萎絶寒谷未足成其凋談歡則字與笑並論慼則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠旨翦揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也贊曰夸飾在用文豈循檢言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷嵩高大雅嵩髙維嶽峻極于天容舠國風誰謂河廣曽不容刀千億大雅干祿百福子孫千億孑遺小雅周餘黎民靡有孑遺滔天堯典湯湯洪水方割蕩蕩懐山襄陵浩浩滔天漂杵武成前徒倒戈攻于後以北血流漂杵鴞音魯頌翩彼飛鴞集于泮林食我桑黮懐我好音荼味大雅周原膴膴堇荼如飴景差風賦楚襄王遊於蘭臺之宫宋玉景差侍注宋玉景差楚大夫奔星宛虹上林賦奔星更於閨闥宛虹拖於楯軒飛亷焦明上林賦徑峻赴險越壑厲水椎飛亷弄獬豸注飛亷龍雀也鳥身鹿頭又捷鵷鶵揜焦明注焦明似鳯西方之鳥也玉樹揚雄甘泉賦翠玉樹之青葱兮注漢武故事曰上起神屋前庭植玉樹珊瑚為枝碧玉為葉鬼神甘泉賦鬼魅不能自逮兮半長途而下顛注言鬼魅至此亦不能上至半途而顛墜也比目西都賦投文竿出比目注東方有比目魚不比不行海若西京賦海若游于𤣥渚注海若海神也宓妃揚雄羽獵賦鞭洛水之宓妃餉屈原與彭胥漢書音義宓妃宓羲氏之女溺死洛水為神𤣥㝠左傳昧為𤣥㝠師注𤣥㝠水官昧為水官之長又共工氏以水紀故為水師而水名按張衡羽獵賦文不全無困𤣥㝠於朔野之語魑魅左傳魑魅罔兩莫能逢之注魑山神魅恠物罔兩水神嵯峨掲業西京賦嵯峨崨嶪上林賦嵯峨㠎嶫魯靈光殿賦飛陛掲孽寒谷劉向别錄鄒衍在燕有谷寒不生五穀鄒子吹律而温至生黍也鵬運莊子北㝠有魚其名為鯤化而為鳥其名為鵬海運則將徙於南㝠鴻漸易漸卦爻事類第三十八事類者蓋文章之外据事以類義援古以證今者也昔文王繇易剖判爻位既濟九三逺引高宗之伐明夷六五近書箕子之貞斯略舉人事以徵義者也至若𦙍征羲和陳政典之訓盤庚誥民叙遲任之言此全引成辭以明理者也然則明理引乎成辭徴義舉乎人事迺聖賢之鴻謨經籍之通矩也大畜之象君子以多識前言往行亦有包於文矣觀夫屈宋屬篇號依詩人雖引古事而莫取舊辭唯賈誼鵩賦始用鶡冠之說相如上林撮引李斯之書此萬分之一㑹也及揚雄百元作六官箴頗酌於詩書劉歆遂初賦厯叙於紀傳漸漸綜採矣至於崔班張蔡遂捃摭經史華實布濩因書立功皆後人之範式也夫薑桂同地辛在本性文章由學能在天資才自内發學以外成有學飽而才餒有才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此内外之殊分御覽作方也是以屬意立文心與筆謀才為盟主學為輔佐主佐合德文采必霸才學褊狹雖美少功夫以子雲之才而自奏不學及觀書石室乃成鴻采表裏相資古今一也故魏武稱張子之文為拙然學問膚淺所見不博專拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沈深載籍浩瀚實羣言之奥區而才思之神皋也揚班以下莫不取資任力耕耨縱意漁獵操刀能割必列汪作裂膏腴是以將贍才力務在博見狐腋非一皮能温雞蹠必數千而飽矣是以綜學在博取事貴約校練務精捃理一作摭須覈衆美輻轃表裏發揮劉劭趙都賦云公子之客叱勁楚令歃盟管庫𨽻臣呵强秦使鼓缶用事如斯可謂理得而義要矣故事得其要雖小成績譬寸轄制輪尺樞運關也或㣲言美事置於閑散是綴金翠於足脛靚粉黛於胸臆也凡用舊合機不啻自其口出引事乖謬雖千載而為瑕陳思羣才之英也報孔璋書云葛天氏之樂千人唱萬人和聽者因以蔑韶夏矣此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聽葛天之歌千人唱萬人和唱和千萬人乃相如接人疑當作推之二字然而濫侈葛天推三成萬者信賦妄書致斯謬也陸機園葵詩云庇足同一智生理合異端夫葵能衞足事譏鮑莊葛藟庇根辭自樂豫若譬葛為葵則引事為謬若謂庇勝衞則改事失真斯又不精之患夫以子建明練士衡沈宻而不免於謬曹仁之謬高唐又曷足以嘲哉夫山朩為良匠所度經書為文士所擇朩美而定於斧斤事美而制於刀筆研思之士無慚匠石矣贊曰經籍深富辭理遐亘皜如江海鬱若崑鄧文梓共採瓊珠交贈用人若已古來無懵高宗易既濟九三高宗伐鬼方三年克之箕子易明夷六五箕子之明夷利貞政典夏書政典曰先時者殺無赦不及時者殺無赦遲任盤庚遲任有言曰人惟求舊器非求舊惟新鶡冠漢蓺文志鶡冠子一篇注楚人居深山以鶡為冠按賈誼鵩鳥賦中多用鶡冠子語引李斯書李斯諌逐客書建翠鳯之旗樹靈鱓之鼓司馬相如上林賦建翠華之旗樹靈鼉之鼓百官揚雄有百官箴遂初劉歆集有遂初賦按賦中感徃寓意皆紀傳中事捃摭漢蓺文志捃摭遺逸注捃摭謂拾取之布濩柬京賦聲教布濩注布濩猶散被也自奏不學揚雄答劉歆書雄為郎之嵗自奏少不得學而心好沈博絶麗之文願不受三嵗之奉且休脱直事之繇得肆心廣意以自克就有詔可不奪奉令尚書賜筆墨錢六萬得觀書於石渠狐腋慎子千金之裘非一狐之腋雞蹠淮南子善學者若齊王之食雞必食其蹠數千而後足劉劭魏志劉劭字孔才嘗作趙都賦明帝美之歃盟毛遂事見祝盟篇管庫隸臣檀弓所舉於晉國管庫之士七十有餘家左傳輿臣隸隸臣僚注隸謂隸屬於吏也鼓缶藺相如傳趙王與秦王㑹澠池秦王酒酣令趙王鼓瑟藺相如奉盆缶秦王以相娛樂秦王不肯擊缶相如曰五步之内相如請得以頸血濺大王矣於是秦王不懌為一擊缶風俗通義缶者瓦器所以盛酒秦人鼓之以節歌也按相如本宦者繆賢舍人故云管庫隸臣寸轄淮南子夫車之所以能轉千里者以其要在三寸之轄運闗文子五寸之闗能制開闔所居要也衞足左傳齊則鮑牽孔子曰鮑莊子之智不如葵葵猶能衞其足庇根左傳宋昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇蔭矣葛藟猶能庇其本根故君子以為比況國君乎山朩左傳山有木工則度之匠石莊子匠石之齊見櫟社樹匠石不顧曰此不材之木也嵇康琴賦匠石奮斤文梓呉越春秋越王使木工伐木天生神木一雙陽為文梓陰為楩柟無懵左傳不與於㑹亦無瞢焉注瞢悶也瞢與懵同練字第三十九夫文象列而結繩移鳥跡明而書契作斯乃言語之體貌而文章之宅宇也蒼頡造之鬼哭粟飛黄帝用之官治民察先王聲教書必同文輶軒之使紀言殊俗所以一字體摠異音周禮保張本有章字氏掌教六書秦滅舊章以吏為師及李斯刪籀而秦篆興程邈造隸而古文廢漢初草律明著厥法太史學童教試六體又吏民上書字謬輒劾是以馬字缺畫而石建懼死雖云性慎亦時重文也至孝武之世則相如譔篇及宣成二帝徴集小學張敞以正讀傳業揚雄以竒字纂訓並貫練雅頌摠閲音義鴻元作鳴朱改筆之徒莫不洞曉且多賦京苑假借形聲是以前漢小學率多瑋字非獨制異乃共曉難也暨乎後漢小學轉疎複文隠訓臧否太半及魏代綴藻則字有常檢追觀漢作翻成阻奥故陳思稱揚馬之作趣幽旨深讀者非師傳不能析其辭非博學不能綜其理豈直才懸抑亦字隠自晉來用字率從簡易時並習易人誰取難今一字詭異則羣句震驚三人弗識則將成字妖矣後世所同曉者雖難斯易時所共廢雖易斯難趣舍之間不可不察夫爾雅者孔徒之所纂元作慕許改而詩書之襟帶也倉頡者李斯之所輯而鳥籀之遺體也雅以淵源詁訓頡以苑囿竒文異體相資如左右肩股該舊而知新亦可以屬文若夫義訓古今興廢殊用字形單複妍媸異體心既託聲於言言亦寄形於字諷誦則績在宫商臨文則能歸字形矣是以綴字屬篇必須練擇一避詭異二省聨邊三權重出元作幽欽愚公改四調單複詭異者字體瓌恠者也曹攄詩稱豈不願斯遊褊心惡㕳呶兩字詭異大疵美篇況乃過此其可觀乎聨邊者半字同文者也狀貌山川古今咸用施於常文則齟齬元作鉏銛朱改為瑕如不獲免可至三接三接之外其字林乎重出者同字相犯者也詩騷元作驗適㑹而近世忌同若兩字俱要則寧在相犯故善為文者富於萬篇貧於一字一字非少相避為難也單複者字形肥瘠者也瘠字累句則纖疎而行劣肥字積文則黯黕元作黙朱改而篇闇善酌字者參伍單複磊落如珠矣凡此四條雖文不必有而體例不無若值而莫悟則非精解至於經典隠曖方冊紛綸簡蠧帛裂三寫易字或以音訛或以文變子思弟子於穆不祀者音訛之異也晉之史記三豕渡河文變之謬也尚書大傳有别風淮雨帝王世紀云列風淫雨别列淮淫字似潜移淫列義當而不竒淮别理乖而新異傅毅制誄已用淮雨固知愛竒之心古今一也史之闕文聖人所慎若依義棄竒則可與正文字矣贊曰篆隸相鎔蒼雅品訓古今殊跡妍媸異分字靡異流文阻難運聲畫昭精墨采騰奮鬼哭粟飛淮南子昔者蒼頡作書而天雨粟鬼夜哭官治民察見徴聖篇象夬注輶軒風俗通周秦常以嵗八月遣輶軒之使採異代方言藏之秘府六書周禮保氏教國子六藝五曰六書注象形㑹意轉注指事假借諧聲吏師秦始皇本紀若欲有學法令以吏為師刪籀造隸漢藝文志蒼頡七章秦丞相李斯所作也文字多取史籀篇而篆體復頗異所謂秦篆者也是時始造隸書矣起於官獄多事茍趨省易施之於徒隸也六體漢藝文志漢興蕭何草律亦著其法曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾六體者古文竒字篆書隸書繆篆蟲書注篆書謂小篆蓋秦始皇使程邈所作也隸書亦程邈所獻馬字缺畫萬石君傳長子建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今迺四不足一獲譴死矣其為謹慎雖他皆如是相如譔篇漢藝文志武帝時司馬相如作凡將篇無復字張敞傳業漢藝文志倉頡多古字俗師失其讀宣帝時徴齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故杜鄴傳鄴少孤其母張敞女鄴壯從敞子吉學問得其家書吉子竦又幼孤從鄴學問亦著於世尤長小學鄴子林清静好古亦有雅材其正文字過於鄴竦故世言小學者由杜公揚雄纂訓漢藝文志元始中徴天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂篇太半東京賦注凡數三分有二為太半孔徒西京雜記郭威以為爾雅周公所制余嘗以問揚子雲子雲曰孔子門徒游夏之儔所記以解釋六藝者也三接之外按三接者如張景陽雜詩洪潦浩方割沈休文和謝宣城詩刷羽汎清源之類三接之外則曹子建雜詩綺縞何繽紛陸士衡日出東南隅行璚珮結瑶璠五字而聨邊者四宜有字林之譏也若賦則更有十接二十接不止者矣黯黮劉向九歎望舊邦之黯黮兮注黯黮暗也三寫抱朴子書三寫魚成魯帝成虎三豕家語子夏見讀史志者云晉師伐秦三豕渡河子夏曰非也巳亥耳讀者問諸晉史果曰已亥隠秀第四十夫心術之動逺矣文情之變深矣源奥而派生根盛而穎峻是以文之英蕤有秀有隠隠也者文外之重旨者也秀也者篇中之獨拔者也隠以複意為工秀以卓絶為巧斯乃舊章之懿績才情之嘉㑹也夫隠之為體義主汪作生文外秘響傍通伏采潜發譬爻象之變互元作𤣥王改體川瀆之韞珠玉也故互體變爻而化成四象珠玉潜水而瀾表方圓始正而末竒内明而外潤使翫之者無窮味之者不厭矣彼波起辭間是謂之秀纎手麗音纎麗字闕宛乎逸態若逺山之浮烟靄孌女之靚容華然煙靄天成不勞於粧㸃容華格定無待於裁鎔深淺而各竒􅀈字典無􅀈字應是穠字之誤纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造竒每馳心於𤣥黙之表工辭之人必欲臻美恒溺思於佳麗之鄉嘔心吐膽不足語窮煅嵗煉年奚能喻苦故能藏頴詞間昏迷於庸目露鋒文外驚絶乎妙心使醖藉者蓄隠而意愉英鋭者抱秀而心悦譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隠等宿儒之無學或一叩而語窮句間鮮秀如巨室之小珍馮本有此二字若百詰詰字闕而色沮斯並不足於才思而亦有媿於文辭矣將欲徴隠聊可指篇古詩之離别樂府之長城詞怨旨深而復兼乎比興陳思之黄雀公幹之青松格剛才勁而並長於諷諭叔夜之闕二字嗣宗之闕二字境𤣥思澹而獨得乎優閑士衡之闕二字彭澤之闕二字以上四句功甫本闕八字一本増入疎放豪逸四字心宻語澄而俱適乎下闕二字一本有壯采二字如欲辨秀亦惟摘句常恐秋節至涼颷奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志高而言壯此丈夫之不遂也東西安所之徘徊以旁皇心孤而情懼此閨房之悲極也朔風動秋草邊馬有歸心氣寒而事傷此羈旅之怨曲也凡文集勝篇不盈十一篇章秀句裁可百二並思合而自逢非研慮之所求元作果謝改也或有晦塞為深雖奥非隠雕削取巧雖美非秀矣故自然㑹妙譬卉朩之耀英華潤色取美譬繒帛之染朱綠朱綠染繒深而繁鮮英華曜樹淺而煒煜秀句所以照文苑蓋以此也贊曰深文隠蔚餘味曲包辭生互體有似變爻言之秀矣萬慮一交動心驚耳逸響笙匏互體左傳杜氏注易之為書六爻皆有變體又有互體聖人隨其義而論之疏二至四三至五兩體交互各成一卦先儒謂之互體聖人随其義而論之或取互體言其取義無常也瀾表方圓尸子水圓折者有珠方折者有玉古詩離别古詩十九首行行重行行與君生别離樂府長城樂府古辭有飲馬長城窟行長城䝉恬所築也言征客之至長城而飲其馬婦思之故為長城窟行黄雀陳思王有野田黄雀行青松劉公幹詩亭亭山上松彭澤陶潜傳潜字淵明或云字元亮為鎮軍建威參軍後為彭澤令隠秀篇自始正而末竒至朔風動秋草朔字元至正乙未刻於嘉禾者即闕此葉此後諸刻仍之胡孝轅朱鬱儀皆不見完書錢功甫得阮華山宋槧本鈔補後歸虞山而傳錄於外甚少康熈庚辰何心友從呉興賈人得一舊本適有鈔補隠秀篇全文辛已義門過隠湖從汲古閣架上見馮已蒼所傳功甫本記其闕字以歸如疎放豪逸四字顯然為不學者以意増加也文心雕龍輯注巻八
