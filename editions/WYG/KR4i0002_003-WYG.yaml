body:
  text: 文心雕龍輯注巻三詹事府詹事加吏部侍郎銜黄叔琳撰銘箴第十一昔帝軒刻輿几以弼違大禹勒筍簴而招諫成湯盤盂著日新之規武王户席題必戒之訓周公慎言於金人仲尼革容於欹器則先聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎盛徳葢臧武仲之論銘也曰天子令徳諸侯計功大夫稱伐夏鑄九牧之金鼎周勒肅慎之楛矢令徳之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勲於景鐘元作銘曹改孔悝表勤於衛鼎稱伐之類也若乃飛亷有石槨之錫靈公有蒿里之謚銘發幽石吁可恠矣趙靈勒跡於番吾元作禺楊改秦昭刻博元作傅朱改於華山夸誕示後吁可笑元作茂又作戒也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有疎通之美焉若班固燕然之勒張昶華陰之碣序亦盛矣蔡邕銘思獨冠古今橋元作僑孫改公之鉞元作箴吐納典謨朱穆之鼎全成碑文溺所長也至如敬通雜器準矱戒銘而事非其物繁略違中崔駰品物讚多戒少李尤積篇義儉辭碎著龜神物而居博弈之中衡斛嘉量而在臼杵之末曾名品之未暇何事理之能閑哉魏文九寳器利辭鈍唯張載元作采謝改劔閣其才清采迅足駸駸後發前至勒銘岷漢得其宜矣箴者所以攻疾防患喻鍼石也斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴一篇體義備焉迄至春秋㣲而未絶故魏絳諷君於后羿楚子訓民於在勤戰代巳來棄徳務功銘辭代興箴文委絶至揚雄稽古始範虞箴作卿尹州牧二十五篇及崔胡補綴總稱百官指事配位鞶鑑可徴信所謂追清風於前古攀辛甲於後代者也至於潘勗符節要而失淺温嶠侍臣博而患繁王濟國子引廣一作多事雜一作寡潘尼乗輿義正體蕪凡斯繼作鮮有克衷至於王朗雜箴乃寘巾履得其戒慎而失其所施觀其約文舉要憲章戒銘而水火井竈繁辭不巳志有偏也夫箴誦於官銘題於器名目雖異而警戒實同箴全禦過故文資确元作確朱改切銘兼褒讚故體貴𢎞潤其取事也必覈元作覆以辨其摛文也必簡而深此其大要也然矢言之道葢闕庸器之制久淪所以箴銘異用罕施於代惟秉文君子宜酌其逺大焉贊曰銘實表器箴惟徳軌有佩於言無鑒於水秉兹貞厲敬言乎履義典則𢎞文約為美輿几皇王大紀帝軒作輿几之箴以警宴安筍簴鬻子大禹為銘於筍簴曰教寡人以道者擊鼓教以義者擊鐘教以事者振鐸語以憂者擊磬户席大戴禮尚父道丹書之言武王聞之惕若恐懼退而為戒書於席四端於機於鑑於盥盤於楹於杖於帶於履屨於觴豆於户於牖於劔於弓於矛盡為銘焉以戒後世子孫金人家語孔子觀周入后稷之廟有金人焉三緘其口而銘其背曰古之慎言人也無多言多言多敗欹器荀子孔子觀於魯威公之廟有欹器焉問於守者為宥坐之器虚則欹中則正滿則覆歎曰烏有滿而不覆者哉論銘左傳季武子以所得於齊之兵作林鐘而銘魯功焉臧武仲曰非禮也夫銘天子令徳諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以銘為金鼎左傳王孫滿對楚子曰昔夏之有徳逺方圖物貢金九牧鑄鼎象物楛矢國語仲尼曰昔武王克商通道九夷八蠻肅慎氏貢楛矢先王欲昭其令徳之致逺也故銘其筈曰肅慎氏之楛矢吕望史記太公望吕尚者東海上人蔡邕銘論吕尚作周太師其功銘於昆吾之鼎仲山竇憲傳南單于遺憲古鼎其傍銘曰仲山甫鼎其萬年子子孫孫永保用庸器周禮典庸器掌藏樂器庸器注庸器伐國所獲之器若崇鼎貫鼎及以其兵物所鑄銘也魏顆國語昔克潞之役秦來圖敗晉功魏顆以其身却退泰師於輔氏親止杜囘其勲銘於景鐘孔悝禮記祭統有衛孔悝之鼎銘飛亷秦本紀蜚亷為紂石北方還無所報為壇霍太山而報得石棺銘曰帝令處父不與殷亂賜爾石棺以華氏死遂葬於霍太山靈公莊子衛靈公死卜葬於沙邱掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而埋之蒿里見樂府鐃挽注趙靈韓子趙主父令工施鉤梯而縁番吾刻疎人跡其上廣三尺長五尺而勒之曰主父嘗遊於此秦昭韓子秦昭王令工施鉤梯而縁華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王與天神博於此勒岳秦始皇本紀始皇上泰山立石封祠祀刻石頌秦徳馬而去燕然竇憲傳南單于請兵北伐拜憲車騎將軍大破單于登燕然山刻石勒功紀漢威徳令班固作銘華陰古文苑華陰堂闕碑銘張昶為北地太守段煨作橋公之鉞蔡中郎集橋𤣥黄鉞銘帝命將軍秉兹黄鉞威靈振耀如火之烈公之在位羣狄斯柔齊斧㒺設人士斯休朱穆之鼎蔡中郎集忠文朱公名穆字公叔延熹六年卒肆其孤用作兹寳鼎銘載休功㑭後裔永用享祀以知其先之徳按伯喈作朱公叔墳前石碑前用散體後系四言韻語至鼎銘則純作散體大篇不著韻語所謂全成碑文也敬通馮衍傳衍字敬通所著賦誄銘説雜文五十篇崔駰崔駰傳駰字亭伯所著詩賦銘頌書記表七依婚禮結言達㫖酒警合二十一篇李尤後漢書李尤字伯仁所著詩賦銘誄頌七歎哀典凡一十八篇文章流别論尤自山河都邑至刀筆笇契無不有銘而文多穢病九寳典論魏太子丕造寳劔寳刀三匕首三皆因姿定名其文曰選咨良金命彼國工精而鍊之至於百辟恨不遇薛燭青萍也劔閣張載傳載父收蜀郡太守載至蜀省父道經劔閣以蜀人恃險好亂因著銘以作誡張敏見而竒之乃表上其文武帝遣使鐫之於劔閣焉夏逸周書文傳解引夏箴云中不容利民乃外次商吕氏春秋名類篇引商箴云天降災布祥并有其職百官左傳魏綘謂晉侯曰昔周辛甲之為太史也命百官官箴王闕在勤左傳楚自克庸以來其君無日不討國人而訓之箴之曰民生在勤勤則不匱虞箴揚雄自序箴莫善於虞箴作州箴崔胡文章流别論揚雄依虞箴作十二州十二官箴傳於世不具九官崔氏累世彌縫其闕胡公又以次其首目而為之解署曰百官箴潘勗衛覬傳建安末河南潘勗與覬並以文章顯文章志勗字元茂初名芝改名勗温嶠晉書温嶠遷太子中庶子在東宫數陳規諷獻侍臣箴王濟王濟傳濟字武子文辭秀茂累官侍中以忤㫖左遷國子祭酒潘尼晉書潘尼為乘輿箴王朗王朗傳朗字景興歴官御史大夫所著奏議論記咸傳於世确切确堅正也崔實傳指切時要言辯而确誄碑第十二周世盛徳有銘誄之文大夫之材臨喪能誄誄者累也累其徳行旌之不朽也夏商巳前其詳靡聞周雖有誄未被於士又賤不誄貴幼不誄長在萬乗則稱天以誄之讀誄定謚其節文大矣自魯莊戰乗丘始及於士逮尼父卒哀公作誄觀其憖遺之切嗚呼之歎雖非叡作古式存焉至栁妻之誄惠子則辭哀而韻長矣暨乎漢世承流而作揚雄之誄元后文實煩穢沙麓撮其要而摯疑成篇有疑誤安有累徳述尊而濶略四句乎杜篤之誄有譽前代吳誄雖工而他篇頗疎豈以見稱光武而改盻千金哉傅毅所制文體倫序孝山崔瑗辨絜相參觀其序事如傳辭靡律調固誄之才也潘岳構意專師孝山巧於序悲易入新切御覽作麗所以隔代相望能徴厥聲者也至如崔駰誄趙劉陶誄黄並得憲章工在簡要陳思叨名而體實繁緩文皇誄末㫖言自陳其乖甚矣若夫殷臣誄湯追褒元鳥之祚周史歌文上闡后稷之烈誄述祖宗葢詩人之則也至於序述哀情則觸類而長傅毅之誄北海云白日幽光雰霧杳㝠始序致感一作惑從御覽改遂為後式景而效者彌取於工元作功謝改矣詳夫誄之為制葢選言録行傳體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其㫖也碑者埤也上古帝皇紀號封禪樹石埤岳故曰碑也周穆紀跡於弇山之石亦古碑之意也又宗廟有碑樹之兩楹事止元作正麗牲未勒勲績而庸器漸缺故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷莫髙蔡邕觀楊賜之碑骨鯁訓典陳郭二文詞一作句從御覽改無擇言周乎衆碑莫非清允其敘事也該而要其綴采也雅而澤清詞轉而不窮巧義出而卓立察其為才自然而至孔融所創有慕伯喈張陳兩文辨給足采亦其亞也及孫綽為文志在碑誄温王卻庾辭多枝雜桓彞一篇最為辨裁夫屬碑之體資乎史才其序則傳其文則銘標序盛徳必見清風之華昭紀鴻懿必見峻偉之烈此碑之制也夫碑實銘器銘實碑文因器立名事光當作先於誄是以勒石讚勲者入銘之域樹碑述已者同誄之區焉贊曰寫實追虛碑誄以立銘徳慕行文采允集觀風似面聽辭如泣石墨鐫華頽影豈忒大夫之材見詮賦篇登髙能賦注賤不誄貴禮記賤不誄貴幼不誄長禮也惟天子稱天以誄之諸侯相誄非禮也魯莊檀弓魯莊公及宋人戰於乗丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也哀公左傳孔子卒哀公誄之曰旻天不弔不憖遺一老俾屏予一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律栁妻説苑栁下惠死門人將誄之妻曰將誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信成而與人無害兮柔屈從俗不强察兮䝉恥救民徳彌大兮雖遇三黜終不弊兮豈弟君子永能厲兮嗟乎惜哉乃下世兮庶㡬遐年今遂逝兮嗚呼哀哉神魂泄兮夫子之謚宜為惠兮誄元后漢書王莽建國五年元后崩詔揚雄作誄曰太陰之精沙麓之靈作合於漢配元生成杜篤後漢曹杜篤字季雅大司馬呉漢薨光武詔諸儒誄之篤為誄最髙帝美之改盼千金國䇿蘇代説淳于髠曰有賣駿馬者比三旦立市人莫之知伯樂還而視之去而顧之一旦而馬價十倍孝山後漢書蘇順字孝山和安間以才學見稱所著賦論誄哀辭雜文凡十六篇潘岳潘岳集有楊荆州誄楊仲武誄夏侯常侍誄馬汧督誄劉陶劉陶傳陶字子竒濟北貞王勃之後著書數十萬言自陳曹子建集文皇誄至咨逺臣之眇眇兮感㐫問以怛驚以下皆自陳之辭北海後漢書北海靖王興齊武王伯升子也永平七年薨古文苑傅毅此誄其文不全亦無白日幽光之語封禪管子古者封禪㤗山禪梁父者七十二家弇山穆天子傳天子觴西王母於瑤池遂驅升乎弇山乃紀迹於弇山之石而樹之槐眉曰西王母之山麗牲祭義牲入廟門麗於碑説文注古宗廟立碑繫牲後人因於上紀功徳孫何碑解碑者乃葬祭饗聘之際所植一大朩耳而其字從石者將取其堅且久未聞勒銘其上也今喪葬令其螭首龜趺洎丈尺品秩之制又易之以石者後儒増耳碑碣後漢書注方者謂之碑圓者謂之碣楊賜楊賜傳賜字伯獻歴官太尉卒謚文烈蔡中郎集有司空文烈侯楊公碑陳郭蔡中郎集有陳太丘碑郭有道碑孔融孔融傳融字文舉與蔡邕素善邕卒後有虎賁士貌類於邕融每酒酣引與之同坐曰雖無老成人尚有典型所著詩頌碑文凡二十五篇張陳兩文孔文舉有衛尉張儉碑銘陳文無考融歿於曹子建之前非陳思王也孫綽孫綽傳綽字興公歴官著作郎於時文士綽為其冠温王郄庾諸公之薨必須綽為碑文然後刋石世説新語孫興公作庾公誄多寄託之辭既成示庾道恒庾見慨然送還之曰先君與君自不至於此桓彞桓彞傳彞字茂倫歴官宣城内史在郡蘇峻反為其將韓晃所害綽為碑文哀弔第十三賦憲孫云當作議徳之諡短折曰哀哀者依也悲實依心故曰哀也以辭遣哀葢不淚之悼故不在黄髪必施夭元作天昏昔三良殉秦百夫莫贖事均夭横黄鳥賦哀抑亦詩人之哀辭乎暨漢武封禪而霍子侯元作光病曹改又一本作霍嬗暴亡帝傷而作詩亦哀辭之類矣及後漢汝陽王亡崔瑗哀辭始變前式元作戒謝改然履突鬼門恠而不辭駕龍乗雲仙而不哀又卒章五言頗似歌謠亦彷彿乎漢武也至於蘇慎疑作順張升並述哀文雖發其情華而未極心實建安哀辭惟偉長差善行女一篇時有惻怛及潘岳繼作實踵其美觀其慮善辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜幼未成徳故譽止於察惠譽字御覽作與言二字弱不勝務故悼加乎膚色悼字下御覽有惜字膚一作容隱心而結文則事愜觀文而屬心則體奢奢體為辭則雖麗不哀必使情往㑹悲文來引泣乃其貴耳弔者至也詩云神之弔矣言神至矣君子令終定諡事極理哀故賓之慰主以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災民亡故同弔也及晉築虒元作虎孫改臺齊襲燕城史趙元脱孫補蘇秦翻賀為弔虐民搆敵亦亡之道凡斯之例弔之所設也或驕貴而殞身或狷忿御覽作介以乖道或有志而無時或美才而兼累追而慰之並名為弔自賈誼浮湘發憤弔屈體同而事覈辭清而理哀葢首出之作也及相如之弔二世全為賦體桓譚以為其言惻愴讀者歎息及平一作卒章要切斷而能悲也揚雄弔屈思積功寡意深文略故辭韻沈膇班彪蔡邕並敏於致語然影附賈氏難為並驅耳胡阮之弔夷齊褒而無聞仲宣所制譏呵實工然則胡阮嘉其清王子傷其隘各一本下有其字志也禰衡之弔平子縟麗而輕清陸機之弔魏武序巧而文繁降斯以下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以繩理昭徳而塞違割析褒貶哀而有正則無奪倫矣贊曰辭定所表在彼弱弄苗而不秀自古斯慟雖有通才迷方告一作失控千載可傷寓言以送短折汲冡周書蚤孤短折曰哀恭仁短折曰哀夭昬左傳札瘥夭昬注夭死曰札小疫曰瘥短折曰夭未名曰昬三良左傳秦伯任好卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黄鳥詩秦風黄鳥篇是也霍子侯霍去病傳去病薨子嬗嗣嬗字子侯上愛之幸其壯而將之為奉車都尉從封㤗山而薨漢武帝集嬗死上甚悼之乃自為歌詩哀辭文章流别論哀辭者誄之流也張升後漢書張升字彦真著賦誄頌碑書凡六十篇行女曹子建集行女哀辭三年之中二子頻喪文章流别論建安中文帝與臨淄侯各失稚子命徐幹劉楨等為哀詞是偉長亦有行女篇也金鹿澤蘭潘岳集金鹿哀辭金鹿岳之幼子也又為任子咸妻作孤女澤蘭哀詞澤蘭子咸之女也厭溺檀弓死而不弔者三畏厭溺宋水左傳莊公十一年秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔鄭火左傳昭公十八年宋衛陳鄭皆火陳不救火許不弔災虒臺左傳㳺吉相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相䝉也可弔也而又賀之翻賀為弔國䇿燕易王初立齊宣王因燕喪而攻之取十城蘇秦為燕説齊王再拜而賀因仰而弔曰燕雖弱小秦王之少壻也大王利其十城而與强秦為讐是食烏喙之類也齊王曰善歸燕之十城浮湘賈誼傳誼為長沙王傅意不自得及度湘水為賦以弔屈原弔二世司馬相如傳武帝還過宜春宫相如奏賦以哀二世行失注宜春本秦之離宫胡亥於此為閻樂所殺故感其處而哀之也弔屈揚雄傳雄作書往往摭離騷文而反之自㟭山投諸江流以弔屈原名曰反離騷沈膇左傳沈溺重膇之疾蔡邕蔡邕集弔屈原文卒壊補覆而不振顧抱石其何胡阮文選思舊賦注胡廣弔夷齊文曰援翰録弔以舒懐兮魏志阮瑀字元瑜為魏武管記室弔伯夷文曰余以工事適彼洛師瞻望首陽敬弔伯夷求仁得仁見歎仲尼没而不朽身滅名飛禰衡後漢書禰衡字正平弔平子文余今反闕命駕言歸路由西鄂追弔平子平子張衡字也衡楚西鄂人弔魏武陸機弔魏武文悼繐帳之冥冥怨西陵之茫茫登雀臺而羣悲眝美目其何望弱弄左傳弱不好弄苗而不秀揚子法言育而不苗者吾家之童烏乎世説新語王戎子萬子有大成之風苗而不秀告控左傳翦焉傾覆無所控告雜文第十四智術之子博雅之人藻溢於辭辭盈乎氣苑囿文情故日新殊致宋玉含才頗亦負俗始造對問以申其志放懐寥廓氣實使之及枚乗摛豔首製七發腴辭雲搆夸麗風駭葢七竅所發發乎嗜欲始邪末正所以戒膏粱之子也揚雄覃思文闊業深綜述碎文璅語肇為連珠玉海作揚雄覃思文閣碎文璅語肇為連珠其辭雖小而明潤矣凡此三者文章之枝派暇豫之末造也自對問以後東方朔效而廣之名為客難託古慰志疎而有辨揚雄解嘲雜以諧謔迴環自釋頗亦為工班固賓戲含懿采之華崔駰達㫖吐典言之裁張衡應間宻而兼雅崔寔客譏整而㣲質蔡邕釋誨體奥而文炳景純客傲情見而采蔚雖迭相祖述然屬篇之髙者也至於陳思客問辭髙而理疎庾敳元作凱欽改客咨意榮而文悴元作粹朱改斯類甚衆無所取裁矣原兹文之設迺發憤以表志身挫憑乎道勝時屯寄於情泰莫不淵岳其心麟鳯其采此立本之大要也自七發以下作者繼踵觀枚氏首唱信獨㧞而偉麗矣及傅毅七激㑹清要之工崔駰七依入博雅之巧張衡七辨結采綿靡崔瑗七厲植義純正陳思七啟取美於宏壯仲宣七釋致辨於事理自桓麟七説以下左思七諷以上枝附影從十有餘家或文麗而義暌或理粹而辭駁觀其大抵所歸莫不髙談宫館壯語畋獵窮瓌竒之服饌極蠱媚之聲色甘意搖骨體楊云當作髓豔詞動魂識雖始之以淫侈而終之以居正然諷一勸百勢不自反子雲所謂先騁鄭衛之聲曲終而奏雅者也唯七厲敘賢歸以儒道雖文非㧞羣而意實卓爾矣自連珠以下擬者間出杜篤賈逵之曹劉珍潘勗之輩欲穿明珠多貫魚目可謂夀陵匍匐非復邯鄲之步里醜元作配謝改捧心不闗西施之嚬矣唯士衡運思理新文敏而裁章置句廣於舊篇豈慕朱仲四寸之璫乎夫文小易周思閑可贍足使義明而詞浄事圓而音澤磊磊自轉可稱珠耳詳夫漢來雜文名號多品或典誥誓問或覽略篇章或曲操弄引或吟諷謠詠總括其名並歸雜文之區甄别其義各入討論之域類聚有貫故不曲述贊曰偉矣前修學堅多飽負文餘力飛靡弄巧枝辭攢映嘒若參昴慕嚬之心於焉祇攪負俗漢武帝紀士或有負俗之累而立功名對問文選宋玉對楚王問宋襄王問於宋玉曰先生其有遺行與何士民衆庶不譽之甚也對曰唯然有之願大王寛其罪使得畢其辭七發文選注七發者説七事以啟發太子也猶楚詞七諌之流枚乗事梁孝王恐孝王反故作七發以諌之連珠傅𤣥敘連珠曰連珠者興於漢章之世班固賈逵傅毅三子受詔作之其文體辭麗而言約不指説事情必假喻以達其㫖而覽者㣲悟合於古詩勸興之義欲使歴歴如貫珠易覩而可悦故謂之連珠也按文章縁起連珠揚雄作是連珠非始於班固也嗣後潘勗擬連珠魏王粲倣連珠晉陸機演連珠宋顔延之範連珠齊王儉暢連珠梁劉孝儀探物作豔體連珠又陳懋仁文章縁起注北史李先傳魏帝召先讀韓子連珠二十二篇韓子韓非子書中有聨語先列其目而後著其解謂之連珠据此則連珠又兆韓非矣客難東方朔傳朔上書陳農戰疆國之計辭數萬言終不見用朔因著論設客難已用位卑以自慰諭解嘲揚雄傳哀帝時丁傅董賢用事諸附離之者或起家至二千石時雄方草太𤣥有以自守泊如也或嘲雄以元尚白而雄解之號曰解嘲賓戲班固漢書敘傳固永平中為郎典校秘書專篤志於博學以著述為業或譏以無功又感東方朔揚雄自諭以不遭蘇張范蔡之時曽不折之以正道明君子之所守故聊復應焉其辭曰賓戲達㫖崔駰傳駰常以典籍為業未遑仕進之事或譏其太𤣥静將以移名失實因擬揚雄解嘲作達㫖以答焉應間張衡傳衡不慕當世所居之官輙積年不徙自去史職五載復還乃設客問作應間以見其志客譏客疑作答崔實傳實因窮困以酤釀販鬻為業時人多以此譏之建寜中病卒所著碑論箴銘答七言詞文表記書凡十五篇釋誨蔡邕傳邕閒居翫古不交當世感東方朔客難及揚雄班固崔駰之徒設疑以自通乃斟酌羣言韙其是而矯其非作釋誨以戒厲云爾客傲郭璞傳璞字景純好卜筮縉紳多笑之又自以才髙位卑乃著客傲庾敳晉書庾敳字子嵩首唱傳𤣥七謨序昔枚乗作七發而屬文之士作者紛焉通儒大才馬季長張平子亦引其源而廣之馬作七厲張造七辨七激後漢文苑傳傅毅以顯宗求賢不篤士多隱處作七激以為諷七依七辯注詳下崔瑗七厲崔瑗傳有七蘇無七厲七啟七釋曹子建七啟序昔枚乗作七發傳毅作七激張衡作七辯崔駰作七依辭各美麗余有慕之焉遂作七啟并命王粲作焉粲字仲宣作者曰七釋七説摰虞文章志桓麟文在者十八篇有七説一篇曲終奏雅漢書揚雄以為靡麗之賦勸百風一猶騁鄭衛之音曲終奏雅不巳戲乎杜篤後漢文苑傳杜篤所著賦誄弔書讚七言女誡及雜文凡十八篇賈逵賈逵傳逵作詩頌誄書連珠酒令凡九篇劉珍後漢文苑傳劉珍著誄頌連珠凡七篇魚目參同契魚目豈為珠蓬蒿不成檟夀陵莊子秋水篇子獨不聞夫夀陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳里醜莊子天運篇西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里四寸璫列仙傳朱仲者㑹稽市販珠人魯元公主以七百金從仲求珠仲乃獻四寸珠而去風俗通耳珠曰璫典爾雅典經也後漢文苑傳李尤所著詩賦銘誄頌七歎哀典凡二十八篇誥爾雅誥誓謹也注皆所以約勤謹戒衆文章縁起誥漢司隸從事馮衍作誓文章縁起誓漢蔡邕作艱誓問對問覽吕不韋傳不韋使其客人人著所聞集論以為八覽六論十二紀二十餘萬言號曰吕氏春秋略漢藝文志劉歆總羣書而奏其七略篇漢藝文志凡將一篇司馬相如作急就一篇黄門令史游作元尚一篇將作大匠李長作章藝文志蒼頡七章者秦丞相李斯所作也爰歴六章者車府令趙髙所作也博學七章者太史令胡毋敬所作也曲鼓吹曲一曰短簫鐃歌蔡邕禮樂志短簫鐃歌軍樂也黄帝岐伯所作以建威揚徳風敵勸士也晉書樂志武帝令傅𤣥製鼓吹曲二十二篇以代魏曲操風俗通閉塞憂愁而作命其曲曰操操者言遇災遭害困厄窮迫雖怨恨失意猶守禮義不懼不懾樂道而不失其操者也弄琴書蔡邕雅好琴道入青溪訪鬼谷先生所居山有五曲一曲製一弄引古今注箜篌引朝鮮津卒霍里子髙妻麗玉所作也吟古今樂錄張永元嘉技録有吟歎四曲一曰大雅吟諷七諷謠爾雅徒歌謂之謠穆天子傳有白雲謠黄澤謠詠辨樂論神農教民食穀有豐年之詠夏侯湛作離親詠諧隱第十五芮良夫之詩云自有肺腸俾民卒狂夫心險如山口壅若川怨怒之情不一歡謔之言無方昔華元棄甲城者發睅目之謳臧紇喪師國人造侏儒之歌並嗤戲形貌内怨為俳也又蠶蠏鄙諺貍首淫哇茍可箴戒載於禮典故知諧辭讔言亦無棄矣諧之言皆也辭淺㑹俗皆悦笑也昔齊威元作宣許改酣樂而淳于説甘酒楚襄讌集而宋玉賦好色意在㣲諷有足觀者及優旃之諷漆城優孟之諫葬馬並譎辭飾説抑止昏暴是以子長編史列傳滑稽以其辭雖傾回意歸義正也但本體不雅一作雜其流易弊於是東方枚臯餔糟啜醨無所匡正而詆嫚媟元作媒謝改弄故其自稱為賦迺亦俳也見視如倡亦有悔矣至魏文元作大因俳説以著笑元作茂孫改書薛綜憑宴㑹而發嘲調雖抃推疑誤席而無益時用矣然而懿文之士未免枉轡潘岳醜婦之屬束晳賣餅之類尤而一作相效之葢以百數魏晉滑稽盛相驅扇遂乃應瑒之鼻方於盜削卵張華之形比乎握舂杵曾是莠言有虧徳音豈非溺者之妄笑元作茂朱改胥靡之狂歌歟讔者隱也遯辭以隱意譎譬以指事也昔還社元作楊求拯元作極於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌佩玉而呼庚癸伍舉刺荆王以大鳥齊客譏薛公以海魚莊姬託辭於龍尾臧文謬書於羊裘隱語之用被於紀傳大者興治濟身其次弼違曉惑葢意生於權譎而事出於機急與夫諧辭可相表裏者也漢世隱書十有八篇歆固編文録之歌末昔楚莊齊威性好隱語至東方曼倩尤巧辭述但謬辭詆戲無益規補自魏代巳來頗非俳優而君子嘲一本無嘲字隱化為謎語謎也者迴互其辭使昏迷也或體目文字或圖象品物纖巧以弄思元作忠謝改淺察以􅃷辭義欲婉而正辭欲隱而顯荀卿蠶賦巳兆其體至魏文陳思約而宻之髙貴鄉公博舉品物雖有小巧用乖逺大夫觀古之為隱理周要務豈為童稚之戲謔搏髀而抃笑哉然文辭之有諧讔譬九流之有小説葢稗官所采以廣視聽若效而不巳則髠袒而入室旃孟之石交乎贊曰古之嘲隱振危釋憊雖有絲麻無棄菅蒯㑹義適時頗益諷誡空戲滑稽徳音大壊芮良夫詩桑柔傳芮伯刺厲王之詩左傳周芮良夫之詩心險莊子孔子曰凡人心險於山川口壅國語召公曰防民之口甚於防川川壅而潰傷人必多民亦如之華元左傳宋華元獲於鄭宋以兵車文馬贖之宋城華元為植城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來臧紇左傳臧紇救鄫侵邾敗於狐駘國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾蠶蠏檀弓成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蠏有匡范則冠而蟬有緌兄則死而子臯為之衰貍首檀弓原壤之母死孔子助之沐槨原壤登朩歌曰貍首之斑然執女手之巻然説甘酒滑稽列傳齊威王好為長夜之飲置酒後宫召淳于髠賜之酒問曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉故曰酒極則亂樂極則悲萬事盡然言不可極極之而哀以諷諫焉王曰善乃罷長夜之飲賦好色文選大夫登徒子侍於楚襄王短宋玉玉著登徒子好色賦王稱善諷漆城滑稽列傳秦二世欲漆其城優㫋曰善漆城蕩蕩宼來不能上即欲就之易為漆耳顧難為䕃室於是二世笑之以其故止諫葬馬滑稽列傳楚莊王有所愛馬死欲以棺槨大夫禮葬之優孟曰以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之諸侯聞之皆知大王賤人而貴馬也於是王乃使以馬屬太官無令天下久聞也滑稽史記滑稽列傳注崔浩云滑音骨稽流酒器也轉注吐酒終日不巳言出口成章辭不窮竭若滑稽之吐酒故揚雄酒賦云䲭夷滑稽腹大如壺盡日盛酒人復藉沽是也又姚察云滑稽猶俳諧也滑讀如字稽音計也言諧語滑利其計智疾出故云滑稽東方枚臯枚臯傳自言為賦不如相如又言為賦迺俳見視如倡自悔類倡也故其賦有詆諆東方朔又自詆諆其文餔糟啜醨楚辭衆人皆醉何不餔其糟而啜其釃薛綜薛綜傳綜字敬文仕呉守謁者僕射蜀使張奉來聘綜謿之曰有犬為獨無犬為蜀横目勾身蟲入其腹束晳束晳傳束嘗為勸農及麫諸賦文頗鄙俗時人薄之溺者左傳吳王曰溺人必笑吾將有問也胥靡書傳使胥靡刑人築䕶此道説賢而隱代胥靡築之以供食疏胥相也靡隨也古者相隨坐輕刑之名又漢書注師古曰聨繫使相隨而服役之故謂之胥靡猶今之役囚徒以鎖聯綴耳眢井麥麴左傳楚子圍蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之佩玉庚癸左傳哀公十三年夏公㑹單平公晉定公呉夫差於黄池呉申叔儀乞糧於公孫有山氏曰佩玉蘂兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰梁則無矣麤則有之若登首山以呼曰庚癸乎副諾杜注庚西方主糓癸北方主水大鳥楚世家莊王即位三年不出號令伍舉曰願有進隱曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣海魚戰國策靖郭君將城薛曰毋為客通齊人有請者曰臣請三言而巳矣因見之客趨而進曰海大魚君曰客有於此客曰君不聞大魚乎􅃠不能止鉤不能牽蕩而失水則螻蟻得意焉今夫齊亦君之水也君長齊奚以薛為夫齊雖隆薛之城到於天猶之無益也君曰善乃輟城薛龍尾列女傳楚莊姬上隱語於王曰大魚失水有龍無尾墻欲内崩而王不視王問之對曰魚失水離國五百里也龍無尾年三十無太子也墻崩不視禍將成而王不改也羊裘列女傳臧文仲使於齊齊拘之文仲㣲使人遺公書謬其辭曰斂小器投諸台食獵犬組羊裘琴之合甚思之母見書而泣曰吾子拘而有朩治矣漢世隱書漢藝文志隱書十八篇師古曰劉向别録云隱書者疑其言以相問對者以慮思之可以無不諭性好隱語滑稽列傳齊威王之時喜隱索隱曰喜隱謂好隱語曼倩東方朔傳舍人恚曰朔擅詆欺天子從官當棄市上問朔何故詆之對曰臣非敢詆之乃與為隱耳舍人不服因曰臣願復問朔隱語朔應聲輙對變詐鋒出莫能窮者謎古詩所鮑照有井字謎蠶賦賦苑荀卿蠶賦通篇皆形似之言至末語始云夫是之謂蠶理髙貴鄉公晉陽秋髙貴鄉公神明爽儁徳音宣朗景王曰上何如主也鍾㑹對曰才同陳思武類太祖景王曰若如卿言社稷之福也九流漢藝文志有儒家者流道家者流隂陽家者流法家者流名家者流墨家者流縱横家者流雜家者流農家者流小説家者流諸子十家其可觀者九家而巳稗官漢藝文志小説家者流葢出於稗官街談巷語道聽塗説之所造也如淳曰王者欲知閭巷風俗故立稗官使稱説之師古曰稗官小官漢名臣奏唐林請省置吏公卿大夫至都官稗官各減什三是也石交史記棄仇讐而得石交文心雕龍輯注巻三
