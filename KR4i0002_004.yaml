body:
  text: 文心雕龍輯注卷四詹事府詹事加吏部侍郎銜黃叔琳撰史傳第十六開闢草昧嵗紀綿邈居今識古其載籍乎軒轅之世史有倉頡主文之職其來久矣曲禮曰史載筆左右史者使也執筆左右八字元脫按胡孝轅本補使之記也元作巳按胡本改古元脫孫補者左史記事者右史記言者言經則尚書事經則春秋唐虞流於典謨商夏被於誥誓自汪本作洎周命維新姬公定法紬三正以班歷貫四時以聨事諸侯建邦各有國史彰善疸惡樹之風聲自平王微弱政不及雅憲章散紊彞倫攸斁昔者二字從御覽增夫子閔王道之缺傷斯文之墜靜居以歎鳯臨衢而泣麟於是就太師以正雅頌因魯史以修春秋舉得失以表黜陟徴存亡以摽勸戒褒見一字貴踰軒冕貶在片言誅深斧鉞然睿旨存亡二字衍幽隱胡本作祕經文婉約邱明同時實得微言乃原始要終創為傳體傳者轉也轉受經旨以授於後實聖文之羽翮記籍之冠冕也及至從橫之世及字從御覽增史職猶存秦並七王而戰國有䇿蓋録而弗敘故即簡而為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及太史談世惟執簡子長繼志元作至胡改甄序帝績比堯稱典則位雜中賢法孔題經則文非元聖故取式吕覽通號曰紀紀綱之號亦宏稱也元脫謝補故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實録無隱之旨博雅宏辨之才愛竒反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀司馬遷之辭思實過半其十志該富讚序𢎞麗儒雅彬彬信有遺味至於宗經矩聖之典端緒豐贍之功遺親攘美之罪徴賄鬻筆之愆公理辨之究矣觀夫左氏綴事附經間出於文為約而氏族難明及史遷各傳人始區詳而易覽述者宗焉及孝惠委機吕后攝政班史立紀違經失元脫朱補實何則庖犧以來未聞女帝者也漢運所值難為後法牝雞無晨武王首誓婦無與國齊桓著盟宣后亂秦吕氏危漢豈唯政事難假亦名號宜慎矣張衡司史而惑同遷固元帝王元作年二孫改后欲為立紀謬亦甚矣尋子𢎞雖偽要當孝惠之嗣孺子誠微實繼平帝之體二子可紀何有於二后哉至於後漢紀傳發源東觀袁張所製偏駁不倫薛謝之作疏謬少信若司馬彪之詳實若字從御覽增華嶠之凖當則其冠也及魏代三雄記傳互出陽秋魏略之屬江表吳録之類或激抗難徴或元脫謝補疏濶寡要唯陳夀三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續未而不終干寶述紀以審正得御覽作明序孫盛陽秋以約舉為能按春秋經傳舉例發凡自史漢以下莫有準的至鄧璨元作􅀈朱改晉紀始立條例又擺落一作撮略從御覽改漢魏憲章殷周雖湘川曲學亦有心典謨及安元作交朱改國立例乃鄧氏之規焉原犬載籍之作也必貫乎百氏元作姓被之千載表徴盛衰殷鑒興廢使一代之制共日月而長存王霸之迹並天地而久大是以在漢之初史職為盛郡國文計先集太史之府欲其詳悉於體國必閲石室啓金匱抽裂帛檢殘竹欲其博練於稽古也是立義選言宜依經以樹則勸戒與奪必附聖以居宗然後銓評昭整苛濫不作矣然紀傳為式編年綴事文非泛論按實而書嵗逺則同異難密事積則起訖易疏斯固總會之為難也或有同歸一事而數人分功兩記則失於復重偏舉則病於不周此又銓配之未易也故張衡摘史班之舛濫傅玄譏後漢之尤煩皆此類也若夫追述逺代代逺多偽公羊髙云傳聞異辭荀况稱録逺略近蓋文疑則闕貴信史也然俗皆愛竒莫顧實理傳聞而欲偉其事録逺而欲詳其迹於是棄同即異穿鑿傍説舊史所無我書則傳此訛濫之本源而述逺之巨蠧也至於記編同時時元脫胡補同多詭雖定哀微辭而世情利害勳榮之家雖庸夫而盡飾迍敗之士雖令德而常嗤理欲二字衍吹霜喣一作噴從御覽改露寒暑筆端此又同時之枉可為歎息者也為字從御覽增故元作欲朱改述逺則誣矯如彼記近則回邪如此析理居正唯素臣元作心今改乎若乃尊賢隱諱固尼父之聖旨蓋纖瑕不能玷瑾瑜也姦慝懲戒實良史之直筆農夫見莠其必鋤也若斯之科亦萬代一凖焉至於尋繁領雜之術務信棄竒之要明白頭訖之序品酌事例之條曉其大綱則衆理可貫然史之為任乃彌綸一代負海內之責而嬴是非之尤秉筆荷擔莫此之勞遷固通矣而歷詆後世若任情失正文其殆哉贊曰史肇軒黃體備周孔世歷斯編善惡偕總騰褒裁貶萬古魂動辭宗丘明直歸南董倉頡敘世本注黃帝之世始立史官倉頡沮誦居其職矣左右史玉藻動則左史書之言則右史書之言經則尚書王肅曰上所言下為史所書故曰尚書事經則春秋諸侯年表孔子西觀周室論史記舊聞興於魯而次春秋以制義法王道備人事浹左邱明因孔子史記具論其語成左氏春秋虞卿上采春秋下觀近世為虞氏春秋吕不韋集六國時事為吕氏春秋三正書甘誓怠棄三正注三正子丑寅之正也四時杜預春秋序記事者以事繫日以日繫月以月繫時以時繫年史之所記必表年以名首事年有四時故錯舉以為所記之泣麟孔叢子叔孫氏之車子曰鉏商樵於野而獲獸焉衆莫之識以為不祥棄之五父之衢孔子往觀泣曰麟也麟出而死吾道窮矣創為傳體春秋序左丘明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重戰國有䇿戰國䇿劉向序國䇿或曰國事或曰短長或曰事語或曰長書或曰修書臣向以為戰國時遊士輔所用之國為之䇿謀宜為戰國䇿其事繼春秋以後訖楚漢之起二百四十五年間之事皆定以殺青書可繕寫得三十三篇楚漢春秋史記索隱陸賈撰記項氏與漢髙祖初起之事名楚漢春秋世惟執簡太史公自序司馬喜生談談為太史公仕於建元元封之間有子曰遷太史公發憤且卒執遷手而泣曰余先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於子乎汝復為太史則續吾祖矣談卒三嵗而遷為太史令子長繼志司馬遷傳太史公仍父子相繼纂其職曰余維先人罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上紀軒轅下至於兹著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律歷改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇為太史公書遷字子長吕覽注見雜文篇實録無隱司馬遷傳贊劉向揚雄皆稱遷有良史之材服其善序事理其文直其事核不虛美不隱惡故謂之實録愛竒揚子法言多愛不忍子長也仲尼多愛愛義也子長多愛愛竒也史記敘傳但美其長不愛其短故曰愛竒條例檀超傳超與江淹掌史職上表立條例叔皮論之班彪傳彪字叔皮斟酌前史而譏正得失其略論曰遷之所紀採經托傳分散百家之事甚多疏略論學術則崇黃老而薄五經序貨殖則輕仁義而羞貧窮道遊俠則賤守節而貴俗功此其大敝傷道也又曰一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一述漢漢書敘傳固探纂前記綴輯所聞以述漢書起於髙祖終於孝平王莽之誅十有二世一百三十年綜其行事為春秋考紀表志傳凡百篇十志律歷禮樂刑法食貨郊祀天文五行地理溝洫藝文遺親攘美史記必稱父談太史公漢書多踵彪所作後傳而曾不及之徴賄鬻筆陳夀傳丁儀丁廙有盛名於魏夀謂其子曰可覓千斛米見與當為尊公作佳傳丁不與之竟不為立傳公理後漢書仲長統字公理著論曰昌言略曰數子之言當世得失皆究矣然多謬通方之訓好申一隅之説委機攝政漢外戚傳惠帝以戚夫人事因病嵗餘不能起日飲為淫樂不聽政七年而崩乃立孝惠後宫子為帝太后臨朝稱制立紀漢書髙后紀第三牝雞見書牧誓婦無與國穀梁傳葵邱之盟曰毋使婦人與國事亂秦胸奴列傳秦昭王時義渠戎王與宣太后亂有二子危漢髙后紀太后以惠帝無子取後宫美人子名之以為太子惠帝崩太子立為皇帝年幼太后臨朝稱制乃立兄子吕台産祿台子通四人為王封諸吕六人為列侯四年夏少帝自知非皇后子出怨言皇太后幽之永巷立恆山王𢎞為皇帝太后崩祿産謀作亂悉捕諸吕皆斬之大臣相與陰謀以為少帝及三弟為王者皆非孝惠子復共誅之尊立文帝元后張衡傳衡以為王莽本傳但應載篡事而已至於編年月紀災祥宜為元后本紀子𢎞吕氏本紀惠帝二年常山王不疑薨以其弟襄成侯山為常山王更名義孝惠崩太子立為帝太后以帝病久不巳不能繼嗣帝廢位立常山王義為帝更名曰𢎞孺子王莽傳平帝崩時元帝世絶而宣帝曾孫有見王五人莾惡其長大曰兄弟不得相為後乃選元孫中最幼廣戚侯子嬰年二嵗託以為卜相最吉立之東觀東觀漢記一百四十三卷起光武至靈帝劉珍等撰袁張後漢書一百一卷袁山松撰後漢南記五十八卷張瑩撰薛謝後漢記一百卷薛瑩撰後漢書一百三十卷無帝紀謝承撰司馬彪司馮彪傳彪討論衆書綴其所聞起於世祖終於孝獻編年二百録世十二通綜上下方貫庶事為紀志傳凡八十篇號曰續漢書華嶠華嶠傳嶠以漢紀煩穢慨然有改作之意起於光武終於孝獻為帝紀十二卷皇后紀二卷十典十卷傳七十卷及三譜序傳目録凡九十七卷嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名漢後書奏之詔朝臣會議時中書監荀勗令和嶠太常張華侍中王濟咸以嶠文質事核有遷固之規實録之風藏之祕府三雄潘嶽詩三雄鼎足注三雄即三國之主陽秋魏陽秋異同八卷孫夀著魏略魏略五十卷魚豢著江表虞漙傳溥撰江表傳卒後子勃上於元帝詔藏於祕書吳録吳録三十卷張勃撰三志陳夀傳夀撰魏吳蜀三國志張華深善之謂夀曰當以晉書相付耳著作晉書元康二年詔著作舊屬中書令祕書既典文籍宜改為祕書著作於是改隸祕書著作郎一人謂之大著作専掌史任肇始晉紀四卷陸機撰續末王韶之傳韶之私撰晉安帝陽秋及成時人謂宜居史職即除著作佐郎使續後事干寶干寶傳寶字令升王導薦之元帝領國史著晉紀自宣帝訖於愍帝凡二十卷其書簡略直而能婉咸稱良史孫盛孫盛傳盛字安國纍遷祕書監著晉陽秋詞直而理正咸稱良史舉例發凡春秋序發凡以言例注如隱公七年凡諸侯同盟於是稱名之類有五十條皆以凡字發明類例鄧粲鄧粲傳荆州刺史桓沖請為别駕粲以父騫有忠信言而世無知者乃著元明紀十篇湘川鄧粲長沙人先集太史漢儀注太史公武帝置天下計書先上太史副上丞相石室金匱太史公自序遷為太史令紬史記石室金匱之書詮評謝承曰詮陳夀曰評張衡張衡傳衡條上司馬遷班固所敘與典籍不合者十餘事傅玄傅玄傳玄雖顯貴而著述不廢撰論經國九流及三史故事評斷得失各為區例名為傅子公羊髙漢藝文志公羊傳十一卷注公羊子齊人師古曰名髙傳曰所見異辭所聞異辭所傳聞又異辭定哀微辭史記孔子著春秋隱桓之間則章至定哀之際則微謂其切當世之文而罔褒忌諱之辭也素臣春秋序説者以仲尼自衛反魯修春秋立素王邱明為素臣南董齊南史氏晉董狐諸子第十七諸子者入道見志之書太上立德其次立言百姓之羣居苦紛雜而莫顯君子之處世疾名德之不章唯英才特達則炳曜埀文騰其姓氏懸諸日月焉昔風后元脫曹補力牧伊尹咸其流也篇述者蓋上古遺語而戰伐所記者也至鬻熊知道而文王咨詢餘文遺事録為鬻子子自肇始莫先於兹及伯陽識禮而仲尼訪問爰序道德以冠百氏然則鬻惟文友李實孔師聖賢並世而經子異流矣逮及七國力政俊乂蜂起孟軻膺儒以罄折莊周述道以翺翔墨翟執儉確之教尹文課名實之符野老治國於地利騶子養政於天文申商刀鋸以制理鬼谷脣吻以䇿勳尸佼元作狡栁改兼總於雜術青史曲綴以街談承流而枝附者不可勝算並飛辨以馳術饜祿而餘榮矣暨於暴秦烈火勢炎昆岡而煙燎之毒不及諸子逮漢成留一作普思子政讎挍於是七略芬菲九流鱗萃殺青所編百有八十餘家矣迄至魏晉作者間出讕讕與同元作朱改言兼存璅語必録類聚而求亦充箱照軫矣然繁辭謝補雖積而本體易總述道言治枝條五經其純粹者入矩踳駮者出規禮記月令取乎吕氏之紀三年問喪寫乎荀子之書此純粹之類也若乃湯之問棘云蚊睫有雷霆之聲惠施對梁王云蝸角有伏尸之戰列子有移山跨海之談淮南有傾天折地之説此踳駮之類也是以世疾諸混同一作洞虛誕按歸藏之經大明迂怪乃稱羿斃十日嫦娥奔月殷湯疑作易如兹况諸子乎至如商韓六蝨五蠧棄孝廢仁轘藥之禍非虛至也公孫之白馬孤犢辭巧理拙魏牟比之梟鳥非妄貶也昔東平求諸子史記而漢朝不與蓋以史記多兵謀而諸子雜詭術也然洽聞之士宜撮綱要覽華而食實棄邪而採正極睇參差亦學家之壯觀也研夫孟荀所述理懿而辭雅管晏屬篇事核而言練列御寇之書氣偉而采竒鄒子之説心奢而辭壯墨翟隨巢意顯而語質尸佼尉繚術通而文鈍鶡冠綿綿亟發深言鬼谷眇眇每環奧義情辨以澤文子擅其能辭約而精尹文得其要慎到析密理之巧韓非著博喻之富吕氏鑒逺而體周淮南泛採而文麗斯則得百氏之華采而辭氣疑脫文之大略也若夫陸賈典語賈誼新書揚雄法言劉向説苑王符潛夫崔實政論仲長昌言杜夷幽求咸一作或敘經典或明政術雖標論名歸乎諸子何者博明萬事為子適辨一理為論彼皆蔓延雜説故入諸子之流夫自六國以前去聖未逺故能越世髙談自開户牖兩漢以後體勢漫弱雖明乎雖乎二字元作難於朱改坦途而類多依採此逺近之漸變也嗟夫身與時舛志共道申標心於萬古之上而送懷於千載之下金石靡矣聲其銷乎贊曰大夫處世懷寶挺秀辨雕萬物智周宇宙立德何隱含道必授條流殊述若有區囿風后漢藝文志風后十三篇注圖二卷黃帝臣依託也力牧藝文志力牧二十二篇注六國時所作託之力牧力牧黃帝相伊尹藝文志伊尹五十一篇注湯相又伊尹説二十七篇注其語淺薄似依託也鬻熊子略鬻子年九十見文王王曰老矣鬻子曰使臣捕獸逐麋巳老矣使臣坐䇿國事尚少也文王師焉著書二十二篇名曰鬻子伯陽史記老子者姓李氏名耳字伯陽孔子適周問禮於老子謂弟子曰老子其猶龍耶老子居周久之見周之衰遂去至關關令尹喜曰子將隱矣強為我著書乃著書上下篇言道德之意五千餘言而去孟軻史記孟軻鄒人也受業子思之門人述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇莊周史記莊子名周其學本歸於老子之言故著書十餘萬言大抵率寓言也楚威王厚幣迎之許以為相周笑曰無汚我我寧遊戲汚瀆之中自快無為有國者所羈墨翟史記墨翟宋之大夫善守禦為節用藝文志墨子七十一篇儉確太史公自序墨者亦尚堯舜道言其德行曰堂髙三尺土階三等茅茨不翦采椽不刮食土簋啜土刑糲粱之食藜藿之羮夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此萬民為之率使天下法若此尹文劉向别録尹文子學本莊老其書自道以至名自名以至法以名為根以法為柄凡二卷僅五千言藝文志尹文子一篇注説齊宣王先公孫龍師古曰劉向云與宋鈃俱遊稷下野老藝文志野老十七篇注應劭曰年老居田野相民之耕種故曰野老騶子史記齊有三騶子騶衍深觀陰陽消息而作怪迂之變終始大聖之篇十餘萬言藝文志鄒子四十九篇注名衍齊人為燕昭王師居稷下號談天衍申史記申不害相韓昭侯學本黃老而主刑名著書二篇號曰申子商商君傳衛鞅既破魏還秦封之於商十五邑號為商君藝文志商君二十九篇鬼谷蘇秦傳東事師於齊而習之於鬼谷先生注扶風池陽潁川陽城並有鬼谷墟蓋是其人所居因為號又曰鬼谷子書云蘇秦欲神祕其道故假名鬼谷尸佼藝文志尸子二十篇注名佼魯人秦相商君師之鞅死佼逃入蜀青史藝文志青史子五十七篇注古史官記事也讎校藝文志成帝使謁者陳農求遺書於天下詔光祿大夫劉向等校之每一書巳向輒條其篇目撮其旨意録而奏之魏都賦讎校篆籀七略藝文志劉向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總羣書而奏其七略故有輯略六藝略諸子略詩賦略兵書略術數略方技略九流注見正緯篇殺青吳祐傳殺青簡以寫經書注以火炙簡令汗取其青易書復不蠧謂之殺青百有八十餘家藝文志凡諸子百八十九家四千三百二十四篇讕言藝文志讕言十篇注不知作者廣韻讕言逸言也充箱韓詩外傳成王之時有三苗貫桑而生同為一秀大幾滿車長幾充箱照軫田敬仲完世家梁王曰寡人國小尚有徑寸之珠照車前後各十二乘者十枚月令禮記月令第六孔頴達正義鄭目録云名曰月令者以其紀十二月政之所行也吕不韋集諸儒所著為十二月紀合十餘萬言名為吕氏春秋篇首皆有月令與此篇同三年問喪荀子禮論前半禇先生補史記禮書採入其後半皆言喪禮三年之喪一段與禮記三年問同文蚊睫列子江浦之麼蟲名曰焦螟羣飛而集於蚊睫弗相觸也徐以氣聽砰然聞之若雷霆之聲惠施藝文志惠子一篇注名施與莊子並時蝸角莊子有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反按此係戴晉人語今云惠施誤也列子藝文志列子八篇注名御寇先莊子莊子稱之移山列子太行王屋二山方七百里髙萬仭愚公懲出入之迂也聚室而謀移之跨海列子渤海中有五山岱輿員嶠方壺瀛洲蓬萊龍伯之國有大人舉足不盈數步而暨五山之所淮南漢書淮南王安為人好書招致賓客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言傾天折地淮南天文訓昔者共工與顓頊爭為帝怒而觸不周之山天柱折地維絶歸藏帝王世紀殷人因黃帝易曰歸藏皇甫謐曰歸藏易以純坤為首坤為地萬物莫不歸而藏於其中故曰歸藏羿斃十日注見辨騷篇奔月歸藏易嫦娥以西王母不死之藥服之遂奔月為月精韓史記韓非者韓之諸公子也喜刑名法術之學為人口吃而善著書作孤憤五蠧內外儲説林説難十餘萬言六蝨商子農商官三者國之常食官也農闢地商致物官法民三官生蝨六曰嵗曰食曰美曰好曰志曰行六者有朴必削五蠧韓非子五蠧篇學者言古者帶劍者近御者及商工之民此五者邦之蠧也轘左傳杜預注車裂曰轘商君傳秦孝公卒太子立公子虔之徒告商君欲反秦惠王車裂商君以徇藥史記秦攻韓韓王遣非使秦李斯使人遺非藥使自殺公孫列子公孫龍誑魏王曰白馬非馬孤犢未嘗有母按列子所述魏公子牟正深悅公孫龍之辨所謂承其餘竅者也莊子秋水篇則異是龍問牟吾自以為至達巳今聞莊子之言無所開吾喙何也公子牟有塪井之蛙謂東海之鱉之喻是梟烏當作井蛙矣東平漢書東平思王字宣帝子成帝時來朝上疏求諸子及太史公書大將軍王鳯以諸子書或反經術或明鬼神太史公書有戰國縱橫之謀不許管晏藝文志晏子八篇注名嬰諡平仲管子八十六篇注名夷吾隨巢藝文志隨巢子六篇注墨翟弟子尉繚藝文志尉繚二十九篇注六國時師古曰尉姓繚名也鶡冠藝文志鶡冠子一篇注楚人居深山以鶡為冠文子藝文志文子九篇注老子弟子與孔子同時而稱周平王問似依託者也慎到史記慎到學黃老道德之術因發明序其指意著十二論吕氏注見雜文篇陸賈史記髙帝謂陸生曰試為我著秦所以失天下吾所以得之者何及古成敗之國陸生乃粗述存亡之徴凡著十二篇每奏一篇髙帝未嘗不稱善左右呼萬嵗號其書曰新語賈誼藝文志賈誼五十八篇法言揚雄傳雄見諸子各以其知舛馳雖小辨終破大義故人時有問雄者常用法應之撰以為十三卷象論語號曰法言説苑漢書劉向採傳記行事著新序説苑凡五十篇潛夫王符傳符耿介不同於俗隱居著書以譏當時失得不欲章顯其名故號曰潛夫論政論崔實傳實字子真明於政體論當世便事數十條名曰政論指切時要言辨而確當世稱之昌言注見史傳篇幽求晉書杜夷字行齊廬江人懷帝時舉方正著幽求子二十篇論説第十八聖哲元作世朱按玉海改彞訓曰經述經敘理曰論論者倫也倫理無爽則聖意不墜無爽元作有無聖字上無則字從御覽改昔仲尼微言門人追記故仰其經目稱為論語蓋羣論立名始於兹矣自論語巳前經無論字六韜二論後人追題乎詳觀論體條流多品陳政則與議説合契釋經則與傳注參體辨史則與贊評齊行銓文則與敘引共紀故議者宜言説者説語傳者轉師注者主解贊者明意評者平理序者次事引者􅏷辭八名區分一揆宗論論也者彌綸羣言而研精元脫朱補一理者也是以莊周齊物以論為名不韋春秋六論昭列至石渠論藝白虎通講聚述聖言通經論家之正體也及班彪王命嚴尤元作允朱改三將敷述昭情善入史體魏之初霸術兼名法傅嘏王粲校練名理迄至正始務欲守文何晏之徒始盛玄論於是聃周當路與尼父爭塗矣詳觀蘭石之才性仲宣之去代叔夜之辨聲太初之本元輔嗣之兩例平叔之二論並師心獨見鋒頴精密蓋人倫之英也至如李康運命同論衡而過之陸機辨亡元作正謝改效過秦而不及然亦其美矣次及宋岱元作代郭象元作蒙朱據舊本改鋭思於幾神之區夷甫裴頠交辨於有無之域並獨步當時流聲後代然滯有者全繫於形用貴無者専守於寂寥徒鋭偏解莫詣正理動極神源其般若之絶境乎逮江左羣談惟玄是務雖有日新而多抽前緒矣至如張衡譏世韻似俳説孔融孝亷但談嘲戲曹植辨道體同書抄言不持正論如其巳汪本作才不持論寧如其巳原夫論之為體所以辨正然否窮於有數追於無形兩於字從汪本改迹一作鑽堅求通鈎深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通辭忌枝碎必使心與理合彌縫莫見其隙辭共心密敵人不知所乘斯其要也是以論如御覽作辟析薪貴能破理斤利者越理而橫斷辭辨者反義而取通覽文雖巧而檢迹如妄唯君子能通天下之志安可以曲論哉若夫注釋為詞解散論體雜文雖異總會是同若秦延君元作君延楊改之注堯典十餘萬字朱普之解尚書三十萬言所以通人惡煩羞元作差朱改學章句若毛公之訓詩安國之傳書鄭君之釋禮王弼之解易要約明暢可為元作謂式矣説者悅也兑為口舌故言咨悅懌過悅必偽故舜驚讒説説之善者伊尹以論味隆殷太公以辨釣興周及燭武行而紓鄭端朩出而存魯亦其美也暨戰國爭雄辨士雲踊從橫參謀長短角勢轉丸騁其巧辭飛鉗伏其精術一人之辨重於九鼎之寶三寸之古強於百萬之師六印磊落以佩五都隱賑而封至漢定秦楚辨士弭節酈君既斃於齊鑊蒯子幾入乎漢鼎雖復陸賈籍甚張釋傅會杜欽文辨婁護脣舌頡頏萬乘之階抵噓公卿之席並順風以託勢莫能逆波而泝洄矣夫説貴撫會弛張相隨不專緩頰亦在刀筆范雎之言事李斯之止逐客並煩情入機動言中務雖批逆鱗而功成計合此上書之善説也至於鄒陽之説吳梁喻巧而理至故雖危而無咎矣敬通之説元脫孫補鮑鄧事緩而文繁所以歷騁元作聘栁改而罕遇元作過也凡説之樞要必使時利而義貞進有契於成務退無阻於榮身自非譎敵則唯忠與信披肝膽以獻主飛文敏以濟辭此説之本也而陸氏直稱説煒曄以譎誑何哉贊曰理形於言敘理成論詞深人天致逺方寸隂陽莫二鬼神靡遁説爾飛鉗呼吸沮勸六韜漢藝文志周史六韜六篇注惠襄之間或曰顯王時或曰孔子問焉師古曰即今之六韜也蓋言取天下及軍旅之事按六韜有霸典文論文師武論齊物莊周著齊物論六論吕不韋輯吕氏春秋有開春慎行貴值不茍似順士容六論石渠翟酺傳孝宣論六經於石渠注宣帝詔諸儒講五經於殿中兼平公羊穀梁同異上親臨決焉時更崇穀梁故言此六經也石渠閣名白虎章帝紀建初四年詔諸生諸儒會白虎觀講議五經同異帝親臨稱制臨決如孝宣甘露石渠故事作白虎議奏王命班彪傳隗囂擁衆天水問彪曰往者周亡戰國並爭天下分裂意者縱橫之事復起於今乎彪既疾囂言又傷時方艱乃著王命論三將王葬傳大司馬嚴尤非莽攻伐四夷數諫不從著古名將樂毅白起不用之意及言邊事凡三篇以風諫莽通志嚴尤三將軍論一卷傅嘏魏志傅嘏字蘭石常論才性同異鍾會集而論之王粲魏志王粲著詩賦論議垂六十篇聃周史記老子者姓李氏名耳字伯陽諡曰聃著書上下篇言道德之意五千餘言莊子者名周著書十餘萬言大抵率寓言也叔夜嵇康傳康字叔夜作聲無哀樂論略曰以殊方異俗歌哭不同使錯而用之或聞哭而歡或聞歌而感斯非音聲之無常哉太初魏志夏侯玄字太初注玄嘗著樂毅張良及本無肉刑論按本元本無未知孰是輔嗣魏志鍾會與山陽王弼並知名弼好論儒道辭才逸辨注易及老子注弼字輔嗣平叔魏志何晏好老莊言作道德經注晏字平叔運命李康著運命論論衡王充傳充以為俗儒守文多失其真乃閉門潛思著論衡八十五篇辨亡陸機傳機以祖父世為將相有大勳於江表深慨孫皓舉而棄之乃論權所以得皓所以亡又欲述其祖父功業作辨亡論二篇過秦賈誼著過秦論宋岱通志晉荆州刺史宋岱通易論一卷郭象郭象傳象字子玄好老莊能清言間居以文論自娛著碑論十二篇夷甫王衍傳衍字夷甫好清談魏正始中何晏王弼等祖述老莊立論以為天地萬物皆以無為為本衍甚重之惟裴頠以為非著論以譏之交辨有無晉諸公贊自魏太常夏侯玄等皆著道德論後進庾敳之徒希慕簡曠裴成公疾世俗尚虛無之理作崇有二論以折之時人莫能難惟夷甫來理如小屈時人即以王理難裴理還復伸般若曇霍傳霍持一錫杖令人跪曰此是波若眼廣韻般若梵語謂智慧也辨道曹植著辨道論二篇筌蹄莊子雜篇筌者所以在魚得魚而忘筌蹄者所以在得而忘蹄注筌魚笱也蹄網也秦延君漢儒林傳張山拊事小夏侯建為博士論石渠授信都秦恭延君恭增師法至百萬言桓談新論秦延君但説粵若稽古即三萬言朱普儒林傳尚書歐陽氏學平當授九江朱普公文桓榮傳榮習歐陽尚書事博士九江朱普毛公儒林傳毛公趙人也治詩為河間獻王博士安國儒林傳孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得十餘篇蓋尚書兹多於是矣鄭君鄭玄傳鄭玄好學注儀禮禮記答臨孝存周禮難凡百餘萬言口舌易彖兑説也説卦傳兑為口舌論味吕氏春秋伊尹説湯以至味曰凡味之本水最為始五味三材九沸九變火之為紀時疾時徐滅腥去臊除羶必以其勝無失其理調和之事必以甘酸苦辛鹹光後多少其齊甚微皆有自起辨釣吕氏春秋吕尚坐茅以漁文王勞而問取尚曰魚求於餌乃牽其緡人食於祿乃服於君以餌取魚以祿取人以小釣釣川而擒其魚以中釣釣國而擒其萬國諸侯紓鄭左傳秦晉圍鄭鄭伯使燭之武夜縋而出説秦伯秦伯與鄭盟晉亦去之存魯仲尼弟子傳端朩賜字子貢至齊説田常曰名存亡魯實困疆齊智者不疑也轉丸鬼谷子有轉丸篇文闕目存飛鉗鬼谷子著飛箝篇九鼎三寸平原君傳平原君曰毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌強於百萬之師六印蘇秦傳秦喟然歎曰使我有雒陽負郭田二頃吾豈能佩六國相印乎五都張儀傳秦惠王封儀五邑隱賑爾雅賑富也法謂隱賑富有蜀都賦扂邑隱賑酈君酈生傳淮隂侯聞酈生伏軾下齊七十餘城乃夜度兵襲齊齊王田廣以為酈生賣巳遂烹酈生蒯子淮陰侯傳信方斬之曰吾悔不用蒯通之計乃為兒女子所詐髙祖捕通欲烹之通曰秦失其鹿天下共逐之欲為陛下所為者甚衆顧力不能耳又可盡烹之耶乃釋通之罪陸賈陸賈傳陸生遊漢廷公卿間名聲籍甚張釋張釋之傳釋之言便宜事文帝曰卑之無甚髙論令今可施行也於是釋之言秦漢間事文帝稱善杜欽杜欽傳帝舅大將軍王鳯以外戚輔政求賢知自助奏請欽為大將軍軍武庫令後為議郎以病免徴詣大將軍幕府國家政謀鳯常與欽慮之京兆尹王章言鳯專權蔽主之過欽令鳯上疏謝罪乞骸骨文指甚哀鳯心慙稱病篤欲遂退欽復説鳯起視事章死詔獄衆庶寃之以譏朝廷欽欲救其過復説鳯舉直言極諫其補過將美皆此類也脣舌漢遊俠傳樓護字君卿與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿脣舌言其見信用也抵噓疑作抵戲杜周傳贊業因勢而抵陒注陒音詭一説陒讀與戲同音許宜反險也言擊其危險之處鬼谷有抵戲篇也緩頰魏豹傳漢王聞魏豹反謂酈生曰緩頰往説魏豹能下之吾以萬戶封若注緩頰徐言譬喻也刀筆蕭相國世家太史公曰蕭相國何於秦時為刀筆吏劉盆子傳注古者記事於簡䇿謬誤者以刀削而除之故曰刀筆范雎范睢傳王稽載睢入秦説昭王廢王后逐穰侯拜為相李斯李斯傳斯西説泰秦王拜斯為客卿會韓人鄭國來間秦以作注溉渠巳而覺秦宗室大臣請一切逐客斯上書秦王乃除逐客之令逆鱗韓非説難龍喉下有逆鱗徑尺嬰之則必殺人人主亦有逆鱗説者能無嬰人主之逆鱗則幾矣鄒陽鄒陽傳吳王濞隂有邪謀陽奏書諫為其事尚隱惡指斥言故先引秦為喻因道胡越齊趙淮南之難然後乃致其意吳王不內其言去之梁羊勝公孫詭等疾陽惡之孝王孝王怒下陽吏將殺之乃從獄中上書書奏孝王立出之敬通馮衍傳衍字敬通更始二年遣鮑永行大將軍事安集北方衍因以計説永永素重衍乃以衍為立漢將軍劉峻廣絶交論注馮衍與鄧禹書曰衍以為寫神輸意則聊城之説碧雞之辨不足難也詔䇿第十九皇帝御宇其言也神淵默黼扆而響盈四表唯詔䇿乎昔軒轅唐虞同稱為命命之為義制性之本也其在三代事兼誥誓誓以訓戎誥以敷政命喻自天故授官元作管錫胤易之姤象后以施命誥四方誥命動民若天下之有風矣降及七國並稱曰令令者使也秦并天下改命曰制漢初定儀則則命有四品疑衍一則字以定儀為讀一曰䇿書二曰制書三曰詔書四曰戒敕敕戒州部詔誥百官制施赦命策封王侯䇿者簡也制者裁也詔者告也敕者正也詩云畏此簡書易稱君子以制度數禮稱明君之詔書稱敕天之命並本經典以立名目逺詔近命習秦制也記稱絲綸所以應接羣后虞重納言周貴喉舌故兩漢詔誥職在尚書王言之大動入史䇿其出如綍不反若汗是以淮南有英才武帝使相如視草隴右多文士光武加意於書辭豈直取美當時亦敬慎來葉矣觀文景以前詔體浮新武帝崇儒選言𢎞奧䇿封三王文同訓典勸元作觀謝改戒淵雅垂範後代及制誥嚴助即云厭承明廬蓋寵才之恩也孝宣璽書賜太守陳遂賜太守元作貴博士考漢書改汪本作責博進陳遂亦故舊之厚也逮光武撥亂留意斯文而造次喜怒時或偏濫詔賜鄧禹稱司徒為堯敕責侯霸稱黃鉞一下若斯之類實乖憲章暨明帝崇學雅元作惟朱改詔間出安和政弛禮閣鮮才每為詔敕假手外請建安之末文理代興潘勗九錫典雅逸羣衛覬元作凱孫改禪誥符命炳耀弗可加巳自魏晉誥䇿職在中書劉放張華互管斯任施命發號洋洋盈耳魏文帝下詔辭義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以溫嶠文清故引入元脫朱按御覽補中書自斯以後體憲元作慮朱改風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封䇿則氣含風雨之潤敕戒恆誥則筆吐星漢之華治戎燮伐則聲有洊雷之威眚災肆赦則文有春露之滋明罰敕法則辭有秋霜之烈此詔䇿之大略也戒敕為文實詔之切者周穆命郊元作鄧朱考穆天子傳改父受敕憲此其事也魏武稱作敕戒當指事而語一作誥從御覽改勿得依違曉治要矣及晉武敕戒備告百官敕都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三罔元作同許改極漢髙祖之敕太子東方朔之戒子亦顧命之作也及馬援巳下各貽家戒班姬女戒足稱母師也教者效也言出而民效也契敷五教故王侯稱教昔鄭𢎞之守南陽條教為後所述乃事緒明也孔融之守北海文教麗而罕於理乃治體乖也若諸葛孔明之詳約庾稚恭之明斷並理得而辭中教一作辭從御覽改之善也自教以下則又有命詩云有命在天明為重也周禮曰師氏詔王為輕命今詔重而命輕者古今之變也贊曰皇王施令寅嚴宗誥我有絲言兆民尹好輝音峻舉鴻風逺蹈騰義飛辭渙其大號皇帝獨斷漢天子正號曰皇帝皇帝至尊之稱皇者煌也盛德煌煌無所不照帝者諦也能行天道事天審諦黼扆禮記天子負黼扆南鄉而立書傳黼屛風畫為斧文置户牖間誓以訓戎書甘誓湯誓泰誓牧誓費誓秦誓是也誥以敷政書召誥洛誥是也命以授官書微子之命蔡仲之命畢命冏命是也制䇿詔戒獨斷天子之言曰制詔其命令一曰䇿書二曰制書三曰詔書四曰戒書䇿書䇿者簡也以命諸侯王三公制書帝者制度之命也其文曰制詔三公赦令贖令之屬是也詔書者詔誥也有三品其文曰告某官官如故事是為詔書戒書戒敕刺史太守及三邊營官被敕文曰有詔敕某官是為戒敕也世皆名此為䇿書失之逺矣絲綸緇衣王言如絲其出如綸王言如綸其出如綍尚書漢官儀尚書唐虞官也龍作納言詩云惟仲山甫王之喉舌秦改稱尚書漢亦尊此官典機密也反汗楚元王傳劉向曰易曰渙汗其大號言號令如汗汗出而不反者也今出善冷未能踰時而反是反汗也視草淮南王傳武帝以安辨博善為文辭每為報書及賜帝召司馬相如等視草乃遣加意隗囂傳囂賓客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭答尤加意焉䇿封三王三王世家有齊王䇿燕王䇿廣陵王䇿太史公曰封立三王天子恭讓羣臣守義文辭爛然甚可觀也褚先生曰孝武帝之時同日拜三子為王為作䇿以申戒之厭承明廬嚴助傳助以對䇿擢中大夫上問所欲對願為會稽太守武帝賜書曰制詔會稽太守君厭承明之廬勞侍從之事出為郡吏注承明廬在石渠閣外陳遂遊俠傳陳遵祖父遂宣帝微時與有故相隨博奕數負進及宣帝即位用遂稍遷至太原太守乃賜遂璽書曰制詔太原太守官尊祿厚可以償博進矣稱堯鄧禹傳帝以關中未定而鄧禹久不進兵下敕曰司徒堯也亡賊桀也宜以時進討鎮慰西京係百姓之心黃鉞光武賜侯霸璽書崇山幽都何可偶黃鉞一下無處所欲以身試法耶禮閣蕭惠基傳王儉朝宗貴望惠基同在禮閣非公事不私覿焉潘勗文章志潘勗字元茂相魏公九錫䇿命朂所作也九錫韓詩外傳諸侯有德天子錫之一錫車馬再錫衣服三錫虎賁四錫樂器五錫納陛六錫朱戶七錫弓矢八錫鈇鉞九錫秬鬯魏志建安十八年使御史大夫郗慮持節䇿命曹操為魏公加九錫衛覬禪誥衛覬傳覬還漢朝為侍郎勸贊禪代之義為文誥之詔中書劉放傳黃初初改祕書為中書以放為監王獻之啓琅琊王為中書監表中書職掌詔命非輕才所能獨任自晉建國常命宰相參領中興以來益重其任故能王言彌媺德音四塞者也劉放劉放傳放善為書檄三祖詔命多放所為張華張華傳華遷長史兼中書郎朝議表奏多見施用威福蔣濟傳文帝詔夏侯尚曰卿腹心重將特當任使作威作福殺人活人尚以示濟帝問濟天下風教何如對曰但見亡國之語耳帝作色問故濟具以答因曰作威作福書之明戒天子無戲言唯陛下察之於是帝遣追取前詔崇才晉明帝紀欽賢愛客雅好文辭當時名臣自王導庾亮輩溫嶠桓彞阮放等咸見親待文清晉書太寧初詔溫嶠曰卿既以令望忠允之懷著於周旋且文清而旨逺宜居深密欲即以為中書令朝端亦咸以為宜重離易離卦彖曰離麗也重明以麗乎正象曰明兩作離大人以繼明照於四方洊雷易震卦象曰洊雷震程傳洊重襲也上下皆震故為洊雷雷重仍則威益盛敕憲穆天子傳丙寅天子屬官效器乃命正公郊父受敕憲用伸囗八駿之乘以飲於枝洔之中在三國語民生於三事之如一父生之師教之君食之故一事之惟其所在則致死焉敕太子漢髙祖手敕太子吾遭亂世當秦禁學自喜謂讀書無益洎踐祚以來時方省書乃使人知作者之意追思昔所行多不是又云汝見蕭曹張陳諸公侯吾同時人倍年於汝者皆拜戒子東方朔傳贊朔戒其子以尚容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢馬援馬援傳援誡兄子嚴敦書曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也汝曹知吾惡之甚矣所以復言者施襟結䄜申父母之戒欲使汝曹不忘之耳班姬後漢列女傳扶風曹世叔妻者班彪之女也名昭博學髙才作女誡七篇有助內訓鄭𢎞鄭𢎞傳𢎞為南陽太守條教法度為後所述孔融九州春秋孔融守北海教令辭氣溫雅可玩而誦論事考實難可施行諸葛孔明諸葛亮傳陳夀等言論者或怪亮文彩不豔而過於丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不得及逺也然其聲教遺言皆經事綜物公誠之心形於文墨足以知其人之意理而有輔於當世庾稚恭庾翼傳翼字稚恭代亮鎮武昌勞謙匪懈戎政嚴明輕命按周官師氏職無此文檄移第二十震雷始於曜電出師先乎威聲故觀電而懼雷壯聽聲而懼兵威兵先乎聲其來巳久昔有虞始戒於國夏后初誓於軍殷誓軍門之外周將交刃而誓之故知帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令令有文告之辭即檄之本源也及春秋征伐自諸侯出懼敵弗服故兵出須名振此威風暴彼昏亂劉獻公之所謂告之以文辭董之以武師元作師武者也齊桓征楚詰元作告苞汪本作菁茅之闕晉厲伐秦責箕郜之焚管仲吕相奉辭先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皎也宣露於外皎然明白也張儀檄楚書以尺二明白之文或稱露布播諸視聽也夫兵以定亂莫敢自専天子親戎則稱恭行天罰諸侯御師則云肅將王誅故分閫推轂奉辭伐罪非唯致果為毅亦且厲辭為武使聲如衝元作衡風所擊元作繫氣似欃槍所掃奮其武怒總其罪人懲其惡稔之時顯其貫盈之數搖姦宄之膽訂信慎之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗囂之檄亡新布元作有其三逆文不雕飾而辭切事明隴右文士得檄之體矣陳琳之檄豫州元脫壯有骨鯁雖姦閹攜養章密太甚發丘摸金誣過其虐然抗辭書釁皎然露骨元作固孫改又一本作暴露矣敢指曹公之鋒幸哉免袁黨之戮也鍾會檄蜀徴驗甚明桓公檄胡觀釁尤切並壯筆也凡檄之大體或述此休明或敘彼苛虐指天時審人事算強弱角權勢摽蓍龜於前驗懸鞶鑑於巳然雖本國信實參兵詐譎詭以馳旨煒曄以騰説凡此衆條莫或違之者也故其植義揚辭務在剛健插羽以示迅不可使辭緩露板以宣衆不可使義隱必事昭而理辨氣盛而辭斷此其要也若曲趣密巧無所取才矣又州郡徴吏亦稱為檄固明舉之義也移者易也移風易俗令往而民隨者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常辭剛而義辨文移之首也陸機之移百官言約而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順元作煩曹改命資移所以洗濯民心堅同元作用曹改符契意用小異而體義大同與檄參伍故不重論也贊曰三驅弛剛九伐先話鞶鑑吉凶蓍龜成敗推壓鯨鯢抵落蜂蠆移寶一作實易俗草偃風邁戒兵誓師司馬法有虞氏戒於國中欲民體其命也夏后氏誓於軍中欲民先成其慮也殷誓於軍門之外欲民先意以待事也周將交刃而誓之以致民志也威讓文告國語周穆王將征犬戎祭公謀父諫曰先王耀德不觀兵有威讓之令有文告之辭文辭武師左傳晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣包茅左傳齊侯以諸侯之師伐楚管仲曰爾貢包茅不入王祭不供無以縮酒寡人是徴箕郜左傳晉侯使吕相絶秦曰入我河縣焚我箕郜我是以有輔氏之聚檄楚張儀傳儀嘗從楚相飲相亡璧意儀盜之掠笞數百張儀既相秦為文檄告楚相曰始吾從若飲我不盜而璧若笞我若善守汝國我顧且盜而城徐廣曰檄一作咫尺之檄漢胸奴傳漢遺單于書以尺一牘中行説令單于以尺二寸牘及印封皆令廣長大露布魏武帝述志令露布天下文章緣起漢露布賈𢎞為馬超伐曹操所作封氏聞見記露布者謂不封檢露而宣布欲四方速知亦謂之露版者魏武奏事云有警急輒露版插羽是也分閫推轂馮唐傳唐對曰臣聞上古王者遣將也跪而推轂曰閫以內寡人制之閫以外將軍制之致果左傳殺敵為果致果為毅衝風韓安國傳安國曰衝風之衰不能起毛羽注衝風疾風之衝突者也欃槍天官書紫宫左三星曰天槍所見之國不可舉事用兵司馬相如賦攬欃槍以為旌兮張揖曰彗星為欃槍百尺之衝國䇿蘇子説齊閔王曰百尺之衝折之袵席之上詩皇矣注衝衝車也從旁衝突者也萬雉之城公羊傳雉者何五板而堵五堵而雉百雉而城一曰城髙一丈曰堵三堵曰雉班固西都賦建金城之萬雉三逆隗囂傳囂移檄告郡國曰故新都侯王莽慢侮天地悖道逆理昔秦始皇毁壞諡法以一二數欲至萬世而莽下三萬六千嵗之歷言身當盡此度是其逆天之大罪也分裂郡國斷截地絡發冡河東攻劫丘壟此其逆地之大罪也攻戰之所敗苛法之所陷飢饉之所夭疾疫之所及以萬萬計其死者則露尸不掩生者則奔亡流散婦女流離係虜此其逆人之大罪也隴右文士詳詔䇿篇陳琳陳琳傳琳避難冀州袁紹使典文章嘗為紹檄酷詆曹操袁氏敗琳歸操操謂曰卿昔為本初移書但可罪狀孤而巳何乃上及父祖耶琳謝罪操愛其才而不咎姦閹攜養陳琳檄司空曹操祖父中常侍騰與左悺徐璜並作妖孽父嵩乞丐攜養因臟假位操贅閹遺醜本無懿德發丘摸金陳琳檄操又特置發丘中郎將摸金校尉所過隳突無骸不露鍾會鍾會傳會移檄蜀將吏士民曰蜀相牡見禽於秦公孫述授首於漢此皆諸賢所備聞也明者見危於無形智者規禍於未萌豈晏安鴆毒懷祿而不變哉桓公桓溫檄胡文胡賊石勒暴肆華夏齊民塗炭至使六合殊風九鼎乖越寡人不德忝荷戎重先順者獲賞後伏者蒙誅此之風範想所聞也州郡徴吏王遜傳遜為寧州刺史未到州遙舉董聨為秀才建寧功曹周悅謂聨非才不下版檄劉訏傳本州刺史張稷辟為主簿主者檄召訏乃挂檄於樹而逃難蜀司馬相如傳相如使蜀蜀長老多言通西南夷之不為用相如欲諫業巳建之不敢乃著書藉蜀父老為辭而已詰難之以風天子且因宣其使指令百姓皆知天子意移太常楚元王傳劉歆欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之移百官按成都王穎傳頴表請誅羊元之皇甫商等檄長沙王乂使就第乃與王顒將張方伐京都以陸機為前鋒都督陸機至洛與成都王箋曰王室多故羊元之等乘寵凶豎皇甫商同惡相求共為亂階云云或機此時有移百官文後代失傳耳三驅易比九五王用三驅九伐周禮大司馬以九伐之法正邦國鯨鯢左傳古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀杜注鯨鯢大魚名以喻不義之人吞食小國蜂蠆左傳臧文仲曰君無謂邾小蜂蠆有毒而况國乎文心雕龍輯注卷四
