body:
  text: 文心雕龍輯注巻六詹事府詹事加吏部侍郎銜黄叔琳撰神思第二十六古人云形在江海之上心存魏闕之下神思之謂也文之思也其神逺矣故寂然凝慮思接千載悄焉動容視通萬里吟詠之間吐納珠玉之聲眉睫之前巻舒風雲之色其思理之致乎故思理為妙神與物遊神居胸臆而志氣統其闗鍵物沿耳目而辭令管其樞機樞機方通則物無隱貌闗鍵將塞則神有遯心是以陶鈞文思貴在虚靜疏瀹五藏澡雪精神積學以儲寳酌理以富才研閲以窮照馴致以懌一作繹辭然後使𤣥解之宰尋聲律而定墨獨照之匠闚意象而運斤此蓋馭文之首術謀篇之大端夫神思方運萬塗競萌規矩虚位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣方其搦翰氣倍辭前暨乎篇成半折心始何則意翻空而易竒言徴實而難巧也是以意授於思言授於意宻則無際疎則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心養術無務苦慮含章司契不必勞情也人之稟才遲速異分文之制體大小殊功相如含筆而腐毫揚雄輟翰而驚夢桓譚疾感於苦思王充氣竭於思慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚臯應詔而成賦子建援牘如口誦仲宣舉筆似宿搆阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒歧路鑒在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才疎而徒速以斯成器未之前聞是以臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博見一作聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣若情數詭雜體變遷貿拙辭或孕於巧義庸事或萌於新意視布於麻雖云未費杼軸獻功焕然乃珍至於思表纎㫖文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其㣲矣乎贊曰神用象通情變所孕物以貌求心以理應汪作勝刻鏤聲律萌芽比興結慮司契垂帷制勝江海魏闕莊子中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何闗鍵老子善閉無闗鍵而不可開小爾雅鍵謂之鑰陶鈞鄒陽傳陽上書曰聖王制世御俗獨化於陶鈞之上注陶家名轉者為鈞蓋取周回調鈞耳言聖王制馭天下亦猶陶人轉鈞定墨禮玉藻卜人定龜史定墨司契陸機文賦意司契而為匠相如枚臯傳臯為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於臯揚雄驚夢桓譚新論成帝幸甘泉詔揚子雲作賦倦卧夢其五臟出在地以手收内桓譚苦思桓譚新論余少時見揚子雲之麗文髙論而猥欲迨及嘗激一事而作小賦用精思太劇而立感動發病彌日廖王充王充傳充閉門營思著論衡二十餘萬言年漸七十志力衰耗乃造性書十六篇裁節嗜欲頤神自守口誦楊修答臨淄侯曹子建牋嘗親見執事握牘持筆有所造作若成誦在心借書於手曾不斯須少留思慮宿搆王粲傳粲字仲宣善屬文舉筆便成無所改定時人常以為宿搆然正復精意殫思亦不能加也阮瑀據鞍典略太祖嘗使阮瑀作書與韓遂瑀於馬上具草書成呈之太祖擥筆欲有所定而竟不能增損禰衡草奏禰衡傳劉表嘗與諸文人共草章奏時衡出還見之開省未周因毁以抵地從求筆札須㬰立成辭義可觀表益重之應機立斷劉向新序所以尚干將莫邪者貴其立斷也陳琳答東阿王牋拂鐘無聲應機立斷伊摯吕氏春秋湯得伊尹明日設朝而見之説湯以至味曰鼎中之變精妙㣲纎口弗能言志弗能喻輪扁莊子輪扁謂桓公曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間體性第二十七夫情動而言形理發而文見蓋沿隱以至顯因内而符外者也然才有庸儁氣有剛柔學有淺深習有雅鄭並情性所鑠陶染所凝是以筆區雲譎文苑波詭者矣故辭理庸儁莫能翻其才風趣剛柔寧或改其氣事義淺深未聞乖其學體式雅鄭鮮有反其習各師成心其異如面若總其歸塗則數窮八體一曰典雅二曰逺奥三曰精約四曰顯附五曰繁縟六曰壯麗七曰新竒八曰輕靡典雅者鎔式經誥方軌儒門者也逺奥者馥采典文經理𤣥宗者也精約者覈字省句剖析毫釐者也顯附者辭直義暢切理厭心者也繁縟者博喻釀采煒煜枝派者也壯麗者髙論宏裁卓爍異采者也新竒者擯古競今危側趣詭者也輕靡者浮文弱植縹緲附俗者也故雅與竒反奥與顯殊繁與約舛壯與輕乖文辭根葉苑囿其中矣若夫八體屢遷功以學成才力居中肇自血氣氣以實志志以定言吐納英華莫非情性是以賈生俊發故文潔而體清長卿傲誕故理侈而辭溢子雲沈寂故志隱而味深子政簡易故趣昭而事博孟堅雅懿故裁宻而思靡平子淹通故慮周而藻宻仲宣躁鋭故穎出而才果公幹氣褊故言壯而情駭嗣宗俶儻故響逸而調逺叔夜儁俠故興髙而采烈安仁輕敏故鋒發而韻流士衡矜重故情繁而辭隱觸類以推表裏必符豈非自然之恒資才氣之大略哉夫才有天資學慎始習斵梓染絲功在初化器成綵定難可翻移故童子雕瑑必先雅製沿根討葉思轉自圓八體雖殊㑹通合數得其環中則輻輳相成故宜摹體以定習因性以練才文之司南用此道也贊曰才性異區文辭繁詭辭為膚根志實骨髓雅麗黼黻淫巧朱紫習亦凝一作疑真功㳂漸靡簡易劉向傳向字子政為人簡易無威儀斵梓周書若作梓材既勤樸斵染絲墨子墨子見染絲者而歎曰染于蒼則蒼染于黄則黄故染不可不慎也環中莊子樞始得其環中以應無窮司南韓子先王立司南以端朝夕注司南即指南車也以喻國之正法風骨第二十八詩摠六義風冠其首斯乃化感之本源志氣之符契也是以怊悵述情必始乎風沈吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清一作生焉若豐藻克贍風骨不飛則振采失鮮負聲無力是以綴慮裁篇務盈守氣剛健既實輝光乃新其為文用譬征鳥之使翼也故練於骨者析辭必精深乎風者述情必顯捶字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徴也思不環周索莫元作課楊改乏氣元作風楊改則無風之騐也昔潘勗錫魏思摹經典羣才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚為辭宗乃其風力遒也能鑒斯要可以定文兹術或違無務繁采故魏文稱文以氣為主氣之清濁有體不可力强而致故其論孔融則云體氣髙妙論徐幹則云時有齊氣論劉楨則云一本下有時字有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之㫖也夫翬翟備色而翾翥百步肌豐而力沈也鷹隼乏采而翰飛戾天骨勁而氣猛也文章才力有似于此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻耀而髙翔固文筆之鳴鳯也若夫鎔鑄一作冶經典之範翔集子史之術洞曉情變曲昭文體然後能孚注作莩甲新意雕畫竒辭昭體故意新而不亂曉變故辭竒而不黷若骨采未圓風辭未練而跨略舊規馳騖新作雖獲巧意危敗亦多豈空結竒字紕繆而成經矣周書云辭尚體要弗惟好異蓋防文濫也然文術多門各適所好明者弗授學者弗師於是習華隨侈流遁忘反若能確乎正式使文明以健則風清骨峻篇體光華能研諸慮何逺之有哉贊曰情與氣偕辭共體並文明以健珪璋乃騁蔚彼風力嚴此骨鯁才鋒峻立符采克炳剛健易彖曰大畜剛健篤實輝光日新其徳征鳥禮記月令征鳥厲疾錫魏見詔䇿篇賦仙司馬相如傳相如以為列僊之儒居山澤間形容甚臞此非帝王之僊意也乃遂奏大人賦天子大悦飄飄有凌雲氣遊天地之間意魏文文以氣為主云云魏文帝典論論文語也孔融徐幹魏文帝集典論論文王粲長於辭賦徐幹時有齊氣然非粲之匹也孔融體氣髙妙有過人者然不能持論理不勝辭至於雜以嘲戲及其所善揚班儔也劉楨逸氣魏志劉楨字公幹文帝書與呉質曰公幹有逸氣伹未遒耳孚甲詩疏楊之莩甲早於衆木昬姻失時曾木之不如也後漢章帝詔方春生養萬物莩甲宜助萌陽以育時物竒字揚雄傳劉棻嘗從雄學作竒字通變第二十九夫設文之體有常變文之數無方何以明其然耶凡詩賦書記名理相因此有常之體也文辭氣力通變則久此無方之數也名理有常體必資於故實通變無方數必酌於新聲故能騁無窮之路飲不竭之源然綆短者銜渴足疲者輟塗非文理之數盡乃變通之術疎耳故論文之方譬諸草朩根幹麗土而同性臭味晞陽而異品矣是以九代詠歌志合文則元作財許無念改黄歌斷竹質之至也唐歌在昔則廣於黄世虞歌卿雲則文於唐時夏歌雕牆縟於虞代商周篇什麗於夏年至於序志述時其揆一也暨楚之騷文矩式周人漢之賦頌影寫楚世魏之䇿元作薦許無念改一本作篇制顧慕漢風晉之辭章瞻望魏采㩁而論之則黄唐淳而質虞夏質而辨商周麗而雅楚漢侈而豔魏晉淺而綺宋初訛而新從質及訛彌近彌澹何則競今疎古風味一作末氣衰也今才穎之士刻意學文多略漢篇師範宋集雖古今備閲然近附而逺疎矣夫青生於藍絳生於蒨雖踰本色不能復化桓君山云予見新進麗文美而無採及見劉揚言辭常輒有得此其騐也故練青濯絳必歸藍蒨矯訛翻淺還宗經誥斯斟酌乎質文之間而櫽括乎雅俗之際可與言通變矣夫誇張聲貌則漢初巳極自兹厥後循環相因雖軒翥出轍而終入籠内枚乗七發云通望兮東海虹洞兮蒼天相如上林云視之無端察之無涯日出東沼月生西陂馬融廣成云天地虹洞固元作因按頌文改無端涯大明出東月生西陂揚雄校獵云出入日月天與地沓張衡西京云日月於是乎出入象扶桑於濛汜此並廣寓極状而五家如一諸如此類莫不相循參伍因革通變之數也是以規略文統宜宏大體先博覽以精閲總綱紀而攝契然後拓衢路置闗鍵長轡逺馭從容按節憑情以㑹通負氣以適變采如宛虹之奮鬐光元作毛曹改若長離之振翼迺穎脱之文矣若乃齷齪於偏解矜激乎一致此庭間之迴驟豈萬里之逸步哉贊曰文律運周日新其業變則其疑作可久通則不乏趨時必果乗機無怯一作跲望今制竒參古定法綆短莊子綆短者不可以汲深斷竹吴越春秋范蠡進善射者陳音越王請音而問曰孤聞子善射道何所生音曰臣聞弩生於弓弓生於彈彈起於古之孝子不忍見父母為禽獸所食故作彈以守之故歌曰斷竹續竹飛土逐宍按所歌者本黄帝時竹彈謠卿雲尚書大傳舜將禪禹百工相和而歌卿雲帝歌曰卿雲爛兮糺縵縵兮日月光華旦復旦兮公伯咸進稽首而和歌曰明明上天爛然是陳日月光華𢎞予一人雕牆書五子之歌峻宇雕牆青藍荀子青出之藍而深扵藍絳蒨爾雅茹藘注今之蒨也可以染絳疏今染絳蒨也一名茹藘一名茅蒐詩疏廣要注本草茜根可以染絳一名蒨隱括家語自極於隱括之中宛虹西京賦瞰宛虹之長鬐注宛謂屈曲也鬐虹鬛也長離張衡思元賦前長離使拂羽兮注長離南方朱雀也穎脱平原君傳毛遂曰臣今日請處囊中耳使遂蚤得處囊中乃脱穎而出非特其末見而巳齷齪張衡西京賦獨儉嗇以齷齪注齷齪小節也司馬相如難蜀父老委瑣齷齪注齷齪局促也庭間迴驟楚辭哀時命騁騏驥于中庭兮焉能極夫逺道定勢第三十夫情致異區文變殊術莫不因情立體即體成勢也勢者乗利而為制也如機發矢直澗曲湍元作文王性凝按本贊改回自然之趣也圓者規體其勢也自轉方者矩形其勢也自安文章體勢如斯而已是以模經為式者自入典雅之懿効騷元作驗王改命篇者必歸豔逸之華綜意淺切者類乏醞藉斷一作斵辭辨約者率乖繁縟譬激水不漪槁木無隂自然之勢也是以繪事圖色文辭盡情色糅而犬馬殊形情交而雅俗異勢鎔範所擬各有司匠雖無嚴郛難得踰越然淵乎文者並摠羣勢竒正雖反必兼解以俱通剛柔雖殊必隨時而適用若愛典而惡華則兼通之理偏似夏人爭弓矢執一不可以獨射也若雅鄭而共篇則摠一之勢離是楚人鬻矛譽楯兩難得而俱售也是以括囊雜體功一作切從御覽改在銓别宫商朱紫隨勢各配章表奏議則準的乎典雅一作雅頌從御覽改賦頌歌詩則羽儀乎清麗符檄書移則楷式於明斷史論序注則師範於覈要箴銘碑誄則體制於𢎞深連珠七辭則從事於巧豔此循體而成勢隨變而立功者也雖復契㑹相參節文互雜譬五色之錦各以本采為地矣桓譚稱文家各有所慕或好浮華而不知實覈或美衆多而不見要約陳思亦云世之作者或好煩文博採深沈其㫖者或好離言辨白分毫析釐者所習不同所務各異言勢殊也劉楨云文之體指實强弱使其辭巳盡而勢有餘天下一人耳不可得也公幹所談頗亦兼氣然文之任勢勢有剛柔不必壯言慷慨乃稱勢也又陸雲自稱往日論文先辭而後情尚勢而不取悦澤及張公論文則欲宗其言夫情固先辭勢實須澤可謂先迷後能從善矣自近代辭人率好詭巧原其為體訛勢所變厭􅀈舊式故穿鑿取新察其訛意似難而實無他術也反正而已故文反正為乏元作支辭反正為竒效竒之法必顛倒文句元作向王改上字而抑下中辭而出外回互不常則新色耳夫通衢夷坦而多行捷徑者趨近故也正文明白而常務反言者適俗故也然宻㑹者以意新得巧茍異者以失體成怪舊練之才則執正以馭竒新學之鋭則逐竒而失正勢流不反則文體遂弊秉兹情術可無思耶贊曰形生勢成始末相承湍迴似規矢激如繩因利騁節情采自凝枉轡學步力止襄謝云當作壽陵醞藉薛廣徳傳廣徳為人溫雅有醞藉注醞言如醞釀也藉有所薦藉也郛説文郛郭也西京賦經城洫營郭郛鬻矛譽楯韓子客曰人有鬻矛與楯者譽其楯之堅物莫能陷也俄而又譽其矛曰吾矛之利於物無不陷也有應之曰以子之矛陷子之楯何如其人弗能應也欲宗其言陸清河集與兄平原書往日論文先辭而後情尚潔而不取悦澤嘗憶兄道張公父子論文實欲自得今日便欲宗其言反正左傳文反正為乏文心雕龍輯注巻六
